<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrowWhite" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fff"/>
    </marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="580" fill="url(#bgGrad)" rx="18"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#fff" font-size="22" font-weight="bold">CocoaBench：多能力组合的开放评测设计</text>
  <text x="450" y="66" text-anchor="middle" fill="#8899bb" font-size="13">只定义"做什么"和"怎么验"，不限定"用什么工具"</text>

  <!-- Left: Task Instruction block -->
  <rect x="40" y="100" width="230" height="120" rx="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="155" y="130" text-anchor="middle" fill="#60a5fa" font-size="15" font-weight="bold">📋 任务指令</text>
  <text x="155" y="156" text-anchor="middle" fill="#cbd5e1" font-size="12">"找到某电商网站上</text>
  <text x="155" y="174" text-anchor="middle" fill="#cbd5e1" font-size="12">满足条件的商品最终价格"</text>
  <text x="155" y="205" text-anchor="middle" fill="#94a3b8" font-size="11" font-style="italic">153个任务 · 9大领域</text>

  <!-- Arrow from instruction to Agent -->
  <line x1="270" y1="160" x2="330" y2="160" stroke="#60a5fa" stroke-width="2.5" marker-end="url(#arrowWhite)"/>

  <!-- Center: Agent decides (big block) -->
  <rect x="335" y="88" width="230" height="250" rx="16" fill="#162033" stroke="#a78bfa" stroke-width="2.5" filter="url(#glow)"/>
  <text x="450" y="118" text-anchor="middle" fill="#c4b5fd" font-size="16" font-weight="bold">🤖 Agent 自主决策</text>
  <text x="450" y="140" text-anchor="middle" fill="#7c8aaa" font-size="11">不绑定运行时 · 自由组合能力</text>

  <!-- Three capability bubbles inside agent -->
  <!-- Vision -->
  <rect x="355" y="158" width="190" height="36" rx="10" fill="#1e3a2f" stroke="#34d399" stroke-width="1.5"/>
  <text x="370" y="181" fill="#6ee7b7" font-size="22">👁</text>
  <text x="400" y="181" fill="#a7f3d0" font-size="13" font-weight="bold">视觉理解</text>
  <text x="528" y="181" text-anchor="end" fill="#6ee7b7" font-size="11">83%任务</text>

  <!-- Search -->
  <rect x="355" y="204" width="190" height="36" rx="10" fill="#1e2a3f" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="370" y="227" fill="#93c5fd" font-size="22">🔍</text>
  <text x="400" y="227" fill="#bfdbfe" font-size="13" font-weight="bold">网络搜索</text>
  <text x="528" y="227" text-anchor="end" fill="#93c5fd" font-size="11">86%任务</text>

  <!-- Coding -->
  <rect x="355" y="250" width="190" height="36" rx="10" fill="#2a1e3f" stroke="#c084fc" stroke-width="1.5"/>
  <text x="370" y="273" fill="#d8b4fe" font-size="22">⌨</text>
  <text x="400" y="273" fill="#e9d5ff" font-size="13" font-weight="bold">编程计算</text>
  <text x="528" y="273" text-anchor="end" fill="#d8b4fe" font-size="11">56%任务</text>

  <!-- "98% need ≥2" badge -->
  <rect x="375" y="298" width="150" height="26" rx="13" fill="#f59e0b" opacity="0.9"/>
  <text x="450" y="316" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="bold">98% 需要 ≥2 种组合</text>

  <!-- Arrow from Agent to Result -->
  <line x1="565" y1="210" x2="625" y2="210" stroke="#a78bfa" stroke-width="2.5" marker-end="url(#arrowWhite)"/>
  <text x="595" y="198" text-anchor="middle" fill="#8899bb" font-size="10">输出结果</text>

  <!-- Right: Verification block -->
  <rect x="630" y="130" width="230" height="160" rx="14" fill="#1e3a2a" stroke="#34d399" stroke-width="2"/>
  <text x="745" y="162" text-anchor="middle" fill="#6ee7b7" font-size="15" font-weight="bold">✅ 结果代理验证</text>
  <text x="745" y="188" text-anchor="middle" fill="#a7f3d0" font-size="12">自动评测脚本</text>
  <text x="745" y="210" text-anchor="middle" fill="#a7f3d0" font-size="12">只检查最终输出</text>

  <!-- Check icon area -->
  <rect x="670" y="225" width="150" height="48" rx="8" fill="#0f2920" stroke="#22c55e" stroke-width="1" stroke-dasharray="4"/>
  <text x="745" y="248" text-anchor="middle" fill="#4ade80" font-size="13">价格 = ¥299.00?</text>
  <text x="745" y="266" text-anchor="middle" fill="#22c55e" font-size="14" font-weight="bold">✓ PASS</text>

  <!-- Bottom: Comparison strip -->
  <rect x="60" y="380" width="780" height="75" rx="12" fill="#111a2e" stroke="#475569" stroke-width="1"/>

  <!-- vs label -->
  <text x="450" y="405" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="bold">对比传统基准</text>

  <!-- Old benchmarks -->
  <rect x="85" y="418" width="150" height="28" rx="8" fill="#3b1c1c" stroke="#ef4444" stroke-width="1.2"/>
  <text x="160" y="437" text-anchor="middle" fill="#fca5a5" font-size="12">OSWorld → 只测GUI</text>

  <rect x="260" y="418" width="170" height="28" rx="8" fill="#3b1c1c" stroke="#ef4444" stroke-width="1.2"/>
  <text x="345" y="437" text-anchor="middle" fill="#fca5a5" font-size="12">SWE-bench → 只测代码</text>

  <!-- CocoaBench -->
  <rect x="470" y="414" width="350" height="34" rx="10" fill="#1a3a1e" stroke="#4ade80" stroke-width="2"/>
  <text x="645" y="436" text-anchor="middle" fill="#86efac" font-size="14" font-weight="bold">CocoaBench → 多能力自由组合 🎯</text>

  <!-- Bottom insight -->
  <text x="450" y="500" text-anchor="middle" fill="#f59e0b" font-size="15" font-weight="bold">核心洞察：最强Agent系统成功率仅 45.1%</text>
  <text x="450" y="524" text-anchor="middle" fill="#8899bb" font-size="12">真实场景的能力组合远比单项测试更难</text>

  <!-- Decorative dots -->
  <circle cx="30" cy="30" r="4" fill="#3b82f6" opacity="0.3"/>
  <circle cx="870" cy="30" r="4" fill="#a78bfa" opacity="0.3"/>
  <circle cx="30" cy="555" r="4" fill="#34d399" opacity="0.3"/>
  <circle cx="870" cy="555" r="4" fill="#f59e0b" opacity="0.3"/>
</svg>