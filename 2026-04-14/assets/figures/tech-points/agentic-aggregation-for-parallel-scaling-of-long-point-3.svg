<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4ade80"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="450" y="46" text-anchor="middle" fill="#f1f5f9" font-size="26" font-weight="bold">跨轨迹合成超越单条最优</text>
  <text x="450" y="72" text-anchor="middle" fill="#94a3b8" font-size="14">AggAgent: 像拼图一样从不完整轨迹中合成正确答案</text>

  <!-- ===== LEFT: Puzzle pieces (trajectories) ===== -->
  <!-- Trajectory 1 -->
  <g filter="url(#shadow)">
    <rect x="40" y="120" width="230" height="100" rx="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="155" y="148" text-anchor="middle" fill="#60a5fa" font-size="15" font-weight="bold">🧩 轨迹 A</text>
    <text x="155" y="172" text-anchor="middle" fill="#cbd5e1" font-size="12">第68步: 发现2019年政策报告</text>
    <text x="155" y="192" text-anchor="middle" fill="#f87171" font-size="11">❌ 最终答案错误</text>
    <rect x="48" y="200" width="214" height="6" rx="3" fill="#334155"/>
    <rect x="48" y="200" width="140" height="6" rx="3" fill="#3b82f6" opacity="0.7"/>
    <text x="195" y="208" fill="#94a3b8" font-size="8">线索 65%</text>
  </g>

  <!-- Trajectory 2 -->
  <g filter="url(#shadow)">
    <rect x="40" y="240" width="230" height="100" rx="14" fill="#1e3a5f" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="155" y="268" text-anchor="middle" fill="#a78bfa" font-size="15" font-weight="bold">🧩 轨迹 B</text>
    <text x="155" y="292" text-anchor="middle" fill="#cbd5e1" font-size="12">第22步: 筹款金额 £3,240</text>
    <text x="155" y="312" text-anchor="middle" fill="#f87171" font-size="11">❌ 最终答案错误</text>
    <rect x="48" y="320" width="214" height="6" rx="3" fill="#334155"/>
    <rect x="48" y="320" width="90" height="6" rx="3" fill="#a78bfa" opacity="0.7"/>
    <text x="145" y="328" fill="#94a3b8" font-size="8">线索 40%</text>
  </g>

  <!-- Trajectory 3 -->
  <g filter="url(#shadow)">
    <rect x="40" y="360" width="230" height="80" rx="14" fill="#1e3a5f" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="155" y="390" text-anchor="middle" fill="#fbbf24" font-size="15" font-weight="bold">🧩 轨迹 C~H ...</text>
    <text x="155" y="414" text-anchor="middle" fill="#f87171" font-size="11">❌ 各自不完整</text>
  </g>

  <!-- Big label: all wrong -->
  <text x="155" y="476" text-anchor="middle" fill="#f87171" font-size="16" font-weight="bold">8条轨迹均未答对 ❌</text>
  <text x="155" y="496" text-anchor="middle" fill="#94a3b8" font-size="12">Pass@8 理论上限 = 0</text>

  <!-- ===== CENTER: AggAgent ===== -->
  <g filter="url(#shadow)">
    <rect x="370" y="210" width="190" height="200" rx="20" fill="#0f4c3a" stroke="url(#glow)" stroke-width="2.5"/>
    <text x="465" y="252" text-anchor="middle" fill="#4ade80" font-size="20" font-weight="bold">AggAgent</text>
    <text x="465" y="278" text-anchor="middle" fill="#86efac" font-size="12">🔍 交叉引用线索</text>
    <text x="465" y="300" text-anchor="middle" fill="#86efac" font-size="12">🔗 跨轨迹关联</text>
    <text x="465" y="322" text-anchor="middle" fill="#86efac" font-size="12">🧠 推理合成</text>

    <!-- Puzzle merge icon -->
    <g transform="translate(430, 340)">
      <rect x="0" y="0" width="28" height="28" rx="5" fill="#3b82f6" opacity="0.8"/>
      <rect x="22" y="0" width="28" height="28" rx="5" fill="#a78bfa" opacity="0.8"/>
      <rect x="11" y="22" width="28" height="28" rx="5" fill="#fbbf24" opacity="0.6"/>
      <text x="25" y="62" text-anchor="middle" fill="#94a3b8" font-size="9">拼图合成</text>
    </g>
  </g>

  <!-- ===== RIGHT: Correct answer ===== -->
  <g filter="url(#shadow)">
    <rect x="650" y="240" width="210" height="140" rx="18" fill="#14532d" stroke="#4ade80" stroke-width="2.5"/>
    <text x="755" y="280" text-anchor="middle" fill="#4ade80" font-size="22" font-weight="bold">✅ 正确答案</text>
    <text x="755" y="310" text-anchor="middle" fill="#d1fae5" font-size="15" font-weight="600">"Clare Stainthorp"</text>
    <text x="755" y="338" text-anchor="middle" fill="#86efac" font-size="11">不存在于任何单条轨迹的输出中</text>
    <text x="755" y="362" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">超越 Pass@8 上限 🚀</text>
  </g>

  <!-- ===== Arrows ===== -->
  <!-- Trajectories → AggAgent -->
  <line x1="270" y1="170" x2="375" y2="260" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)" opacity="0.8"/>
  <line x1="270" y1="290" x2="370" y2="300" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrow)" opacity="0.8"/>
  <line x1="270" y1="400" x2="375" y2="370" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" opacity="0.8"/>

  <!-- AggAgent → Answer -->
  <line x1="560" y1="310" x2="645" y2="310" stroke="#4ade80" stroke-width="3" marker-end="url(#arrowGreen)"/>

  <!-- ===== Bottom comparison bar ===== -->
  <g transform="translate(50, 530)">
    <rect width="800" height="70" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>

    <!-- Selection mode -->
    <rect x="20" y="12" width="350" height="46" rx="8" fill="#371520" stroke="#f87171" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="195" y="32" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="bold">❌ 选择模式 (Selection)</text>
    <text x="195" y="50" text-anchor="middle" fill="#94a3b8" font-size="11">只能从8条中选一条 → 受限于 Pass@8</text>

    <!-- Synthesis mode -->
    <rect x="400" y="12" width="380" height="46" rx="8" fill="#052e16" stroke="#4ade80" stroke-width="1.5"/>
    <text x="590" y="32" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="bold">✅ 合成模式 (Synthesis) — AggAgent</text>
    <text x="590" y="50" text-anchor="middle" fill="#94a3b8" font-size="11">跨轨迹拼合线索 → 突破 Pass@8 上限</text>
  </g>

  <!-- Decorative sparkle -->
  <circle cx="830" cy="210" r="3" fill="#4ade80" opacity="0.6">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="680" cy="180" r="2" fill="#22d3ee" opacity="0.5">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>