<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="safeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="dangerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="bold">安全对齐仅在"门口"生效</text>
  <text x="450" y="68" text-anchor="middle" fill="#94a3b8" font-size="14">Safety Check Only Fires at Step 1 — Then Shuts Off</text>

  <!-- Timeline bar background -->
  <rect x="80" y="105" width="740" height="8" rx="4" fill="#334155"/>

  <!-- Step markers on timeline -->
  <!-- Step 1 - green -->
  <circle cx="160" cy="109" r="12" fill="url(#safeGrad)" filter="url(#glow)"/>
  <text x="160" y="113" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">1</text>
  <!-- Step 2 -->
  <circle cx="310" cy="109" r="10" fill="#ef4444" opacity="0.3"/>
  <text x="310" y="113" text-anchor="middle" fill="#fca5a5" font-size="11">2</text>
  <!-- Step 3-5 -->
  <circle cx="460" cy="109" r="10" fill="#ef4444" opacity="0.5"/>
  <text x="460" y="113" text-anchor="middle" fill="#fca5a5" font-size="10">3-5</text>
  <!-- Step 6-8 -->
  <circle cx="610" cy="109" r="10" fill="#ef4444" opacity="0.7"/>
  <text x="610" y="113" text-anchor="middle" fill="#fca5a5" font-size="10">6-8</text>
  <!-- Result -->
  <circle cx="740" cy="109" r="12" fill="url(#dangerGrad)" filter="url(#glow)"/>
  <text x="740" y="113" text-anchor="middle" fill="#fff" font-size="9" font-weight="bold">💥</text>

  <!-- Green zone bracket -->
  <rect x="130" y="88" width="60" height="3" rx="1" fill="#22c55e" opacity="0.7"/>
  <text x="160" y="84" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="bold">✓ 安全检查</text>

  <!-- Red zone bracket -->
  <rect x="280" y="88" width="490" height="3" rx="1" fill="#ef4444" opacity="0.4"/>
  <text x="525" y="84" text-anchor="middle" fill="#f87171" font-size="10" font-weight="bold">✗ 无安全检查 — "保安已下班"</text>

  <!-- ====== MAIN VISUAL: Security Guard Metaphor ====== -->

  <!-- STEP 1 PANEL: Guard at door -->
  <rect x="50" y="145" width="240" height="280" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="50" y="145" width="240" height="36" rx="16" fill="#22c55e" opacity="0.15"/>
  <rect x="50" y="175" width="240" height="2" fill="#22c55e" opacity="0.2"/>
  <text x="170" y="168" text-anchor="middle" fill="#4ade80" font-size="14" font-weight="bold">Step 1：门口检查</text>

  <!-- Guard icon -->
  <circle cx="120" cy="235" r="28" fill="#1e3a5f" stroke="#22c55e" stroke-width="2"/>
  <text x="120" y="243" text-anchor="middle" font-size="28">🛡️</text>

  <!-- User instruction bubble -->
  <rect x="160" y="210" width="115" height="50" rx="10" fill="#0f2030" stroke="#475569" stroke-width="1"/>
  <text x="218" y="230" text-anchor="middle" fill="#cbd5e1" font-size="11">"查看Sarah的</text>
  <text x="218" y="246" text-anchor="middle" fill="#cbd5e1" font-size="11">漏洞修复邮件"</text>

  <!-- Verdict -->
  <rect x="90" y="280" width="160" height="32" rx="8" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1"/>
  <text x="170" y="301" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="bold">✓ 指令无害，放行</text>

  <!-- Small note -->
  <text x="170" y="340" text-anchor="middle" fill="#64748b" font-size="11">指令本身完全正常</text>
  <text x="170" y="358" text-anchor="middle" fill="#64748b" font-size="11">安全检查一次性通过</text>
  <text x="170" y="385" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="bold">之后不再复查 ⚠️</text>

  <!-- Arrow from panel 1 to panel 2 -->
  <path d="M295 285 L325 285" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrowGray)"/>
  <defs>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#475569"/>
    </marker>
  </defs>

  <!-- STEP 3-8 PANEL: Danger zone -->
  <rect x="330" y="145" width="260" height="280" rx="16" fill="#1e293b" stroke="#7f1d1d" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="330" y="145" width="260" height="36" rx="16" fill="#ef4444" opacity="0.12"/>
  <rect x="330" y="175" width="260" height="2" fill="#ef4444" opacity="0.2"/>
  <text x="460" y="168" text-anchor="middle" fill="#f87171" font-size="14" font-weight="bold">Step 3-8：无人看守</text>

  <!-- Danger actions -->
  <rect x="355" y="195" width="210" height="42" rx="8" fill="#7f1d1d" opacity="0.3" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="460" y="213" text-anchor="middle" fill="#fca5a5" font-size="12">📥 下载 dep-update.py</text>
  <text x="460" y="228" text-anchor="middle" fill="#ef4444" font-size="10">(实为恶意脚本)</text>

  <path d="M460 240 L460 255" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrowGray)"/>

  <rect x="355" y="258" width="210" height="42" rx="8" fill="#7f1d1d" opacity="0.3" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="460" y="276" text-anchor="middle" fill="#fca5a5" font-size="12">💻 打开终端执行脚本</text>
  <text x="460" y="291" text-anchor="middle" fill="#ef4444" font-size="10">python3 dep-update.py</text>

  <path d="M460 303 L460 318" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrowGray)"/>

  <rect x="355" y="321" width="210" height="38" rx="8" fill="#dc2626" opacity="0.25" stroke="#ef4444" stroke-width="1.5"/>
  <text x="460" y="345" text-anchor="middle" fill="#ff6b6b" font-size="13" font-weight="bold">💥 系统被入侵</text>

  <!-- No guard icon -->
  <text x="460" y="400" text-anchor="middle" fill="#64748b" font-size="11">🛡️ → 💤 保安已"下班"</text>

  <!-- Arrow from panel 2 to panel 3 -->
  <path d="M595 285 L625 285" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrowGray)"/>

  <!-- STATS PANEL -->
  <rect x="630" y="145" width="220" height="280" rx="16" fill="#1e293b" stroke="#475569" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="630" y="145" width="220" height="36" rx="16" fill="#f59e0b" opacity="0.1"/>
  <rect x="630" y="175" width="220" height="2" fill="#f59e0b" opacity="0.2"/>
  <text x="740" y="168" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="bold">攻击成功率</text>

  <!-- Claude stat -->
  <rect x="655" y="195" width="170" height="55" rx="10" fill="#0f2030" stroke="#475569" stroke-width="1"/>
  <text x="740" y="215" text-anchor="middle" fill="#94a3b8" font-size="11">Claude 4.5 Sonnet</text>
  <text x="740" y="240" text-anchor="middle" fill="#ef4444" font-size="24" font-weight="bold">73%</text>

  <!-- Multi-agent stat -->
  <rect x="655" y="265" width="170" height="55" rx="10" fill="#0f2030" stroke="#7f1d1d" stroke-width="1.5"/>
  <text x="740" y="285" text-anchor="middle" fill="#94a3b8" font-size="11">多智能体系统</text>
  <text x="740" y="310" text-anchor="middle" fill="#ff4444" font-size="24" font-weight="bold">92.7%</text>

  <!-- Bar chart: rejection timing -->
  <text x="740" y="345" text-anchor="middle" fill="#94a3b8" font-size="11">拒绝时机分布</text>

  <!-- Step 1 bar -->
  <rect x="665" y="355" width="12" height="50" rx="2" fill="#22c55e" opacity="0.8"/>
  <text x="671" y="415" text-anchor="middle" fill="#64748b" font-size="9">S1</text>

  <!-- Step 2 bar -->
  <rect x="690" y="395" width="12" height="10" rx="2" fill="#22c55e" opacity="0.4"/>
  <text x="696" y="415" text-anchor="middle" fill="#64748b" font-size="9">S2</text>

  <!-- Step 3+ bars -->
  <rect x="715" y="400" width="12" height="5" rx="2" fill="#ef4444" opacity="0.3"/>
  <text x="721" y="415" text-anchor="middle" fill="#64748b" font-size="9">S3</text>

  <rect x="740" y="402" width="12" height="3" rx="2" fill="#ef4444" opacity="0.2"/>
  <text x="746" y="415" text-anchor="middle" fill="#64748b" font-size="9">S4</text>

  <rect x="765" y="403" width="12" height="2" rx="1" fill="#ef4444" opacity="0.15"/>
  <text x="771" y="415" text-anchor="middle" fill="#64748b" font-size="9">S5+</text>

  <!-- Baseline for bar chart -->
  <line x1="660" y1="405" x2="785" y2="405" stroke="#475569" stroke-width="0.5"/>

  <!-- Bottom insight bar -->
  <rect x="50" y="450" width="800" height="70" rx="14" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" opacity="0.9"/>
  <text x="450" y="478" text-anchor="middle" fill="#fbbf24" font-size="16" font-weight="bold">🔑 核心发现：安全对齐 ≈ 一次性门禁，不是持续监控</text>
  <text x="450" y="502" text-anchor="middle" fill="#94a3b8" font-size="13">良性指令在 Step 1 轻松通过 → 后续危险操作无人拦截 → 攻击成功</text>

  <!-- Decorative corner accents -->
  <rect x="0" y="0" width="4" height="60" rx="2" fill="#22c55e" opacity="0.3"/>
  <rect x="896" y="540" width="4" height="60" rx="2" fill="#ef4444" opacity="0.3"/>

  <!-- OS-BLIND badge -->
  <rect x="700" y="540" width="150" height="28" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="775" y="559" text-anchor="middle" fill="#64748b" font-size="11">📊 OS-BLIND Benchmark</text>
</svg>