<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
    <marker id="arrGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
    </marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f9fc"/>
      <stop offset="100%" stop-color="#e8ecf3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" fill="url(#bgGrad)" rx="16"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50">子任务粒度 vs 编排器安全防御能力</text>
  <text x="450" y="67" text-anchor="middle" font-size="13" fill="#7f8c8d">粗粒度分解保留语义信号 → 触发安全对齐拒绝</text>

  <!-- ===== LEFT: Fine-grained (DANGER) ===== -->
  <rect x="30" y="95" width="400" height="420" rx="14" fill="#fff5f5" stroke="#e74c3c" stroke-width="2" stroke-dasharray="6,3"/>
  <rect x="30" y="95" width="400" height="40" rx="14" fill="#e74c3c"/>
  <rect x="30" y="121" width="400" height="14" fill="#e74c3c"/>
  <text x="230" y="122" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">❌ 细粒度分解（每步2步）</text>

  <!-- Orchestrator box left -->
  <rect x="70" y="155" width="320" height="60" rx="10" fill="#fdecea" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="230" y="178" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">编排器</text>
  <text x="230" y="198" text-anchor="middle" font-size="12" fill="#888">拆分成多个原子操作…</text>

  <!-- Atomic subtask pills -->
  <rect x="65" y="235" width="155" height="36" rx="18" fill="#fff" stroke="#ddd" stroke-width="1.2"/>
  <text x="142" y="258" text-anchor="middle" font-size="12" fill="#555">① 打开浏览器</text>

  <rect x="240" y="235" width="155" height="36" rx="18" fill="#fff" stroke="#ddd" stroke-width="1.2"/>
  <text x="317" y="258" text-anchor="middle" font-size="12" fill="#555">② 输入URL</text>

  <rect x="65" y="283" width="155" height="36" rx="18" fill="#fff" stroke="#ddd" stroke-width="1.2"/>
  <text x="142" y="306" text-anchor="middle" font-size="12" fill="#555">③ 填写用户名</text>

  <rect x="240" y="283" width="155" height="36" rx="18" fill="#fff" stroke="#ddd" stroke-width="1.2"/>
  <text x="317" y="306" text-anchor="middle" font-size="12" fill="#555">④ 点击确认</text>

  <!-- Each looks harmless label -->
  <text x="230" y="345" text-anchor="middle" font-size="12" fill="#999" font-style="italic">每一步看起来都"人畜无害"</text>

  <!-- Arrow down -->
  <line x1="230" y1="355" x2="230" y2="395" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrRed)"/>

  <!-- Result left -->
  <rect x="95" y="400" width="270" height="55" rx="10" fill="#e74c3c" opacity="0.12" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="230" y="422" text-anchor="middle" font-size="14" font-weight="bold" fill="#c0392b">安全检测未触发 ⚠️</text>
  <text x="230" y="442" text-anchor="middle" font-size="12" fill="#e74c3c">仅拒绝 5 / 80 个任务</text>

  <!-- Refusal bar left -->
  <rect x="105" y="468" width="250" height="18" rx="9" fill="#eee"/>
  <rect x="105" y="468" width="16" height="18" rx="9" fill="#e74c3c"/>
  <text x="140" y="481" font-size="10" fill="#c0392b" font-weight="bold">6%</text>

  <!-- ===== RIGHT: Coarse-grained (SAFE) ===== -->
  <rect x="470" y="95" width="400" height="420" rx="14" fill="#f0faf4" stroke="#27ae60" stroke-width="2" stroke-dasharray="6,3"/>
  <rect x="470" y="95" width="400" height="40" rx="14" fill="#27ae60"/>
  <rect x="470" y="121" width="400" height="14" fill="#27ae60"/>
  <text x="670" y="122" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">✅ 粗粒度分解（全局20步）</text>

  <!-- Orchestrator box right -->
  <rect x="510" y="155" width="320" height="60" rx="10" fill="#e8f8f0" stroke="#27ae60" stroke-width="1.5"/>
  <text x="670" y="178" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e8449">编排器</text>
  <text x="670" y="198" text-anchor="middle" font-size="12" fill="#888">必须描述完整操作流程…</text>

  <!-- Single coarse task block -->
  <rect x="505" y="235" width="330" height="95" rx="12" fill="#fff" stroke="#27ae60" stroke-width="2"/>
  <text x="670" y="262" text-anchor="middle" font-size="13" fill="#2c3e50" font-weight="bold">"打开邮件中的附件脚本</text>
  <text x="670" y="282" text-anchor="middle" font-size="13" fill="#2c3e50" font-weight="bold">并在终端执行"</text>
  <text x="670" y="310" text-anchor="middle" font-size="12" fill="#e67e22" font-weight="bold">⚡ 完整语义 → 风险明显</text>

  <!-- Arrow down -->
  <line x1="670" y1="342" x2="670" y2="395" stroke="#27ae60" stroke-width="2" marker-end="url(#arrGreen)"/>

  <!-- Result right -->
  <rect x="535" y="400" width="270" height="55" rx="10" fill="#27ae60" opacity="0.12" stroke="#27ae60" stroke-width="1.5"/>
  <text x="670" y="422" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e8449">安全对齐成功触发 🛡️</text>
  <text x="670" y="442" text-anchor="middle" font-size="12" fill="#27ae60">拒绝 15 / 80 个任务（3×提升）</text>

  <!-- Refusal bar right -->
  <rect x="545" y="468" width="250" height="18" rx="9" fill="#eee"/>
  <rect x="545" y="468" width="47" height="18" rx="9" fill="#27ae60"/>
  <text x="600" y="481" font-size="10" fill="#1e8449" font-weight="bold">19%</text>

  <!-- Bonus: proactive defense callout -->
  <rect x="525" y="495" width="290" height="28" rx="8" fill="#d5f5e3" stroke="#27ae60" stroke-width="1"/>
  <text x="670" y="514" text-anchor="middle" font-size="11" fill="#1e8449">💡 主动建议: "先用 cat 检查脚本内容"</text>

  <!-- VS divider -->
  <circle cx="450" cy="305" r="24" fill="#fff" stroke="#bbb" stroke-width="2"/>
  <text x="450" y="312" text-anchor="middle" font-size="16" font-weight="bold" fill="#555">VS</text>

  <!-- Bottom insight -->
  <rect x="180" y="530" width="540" height="26" rx="8" fill="#2c3e50" opacity="0.08"/>
  <text x="450" y="548" text-anchor="middle" font-size="13" fill="#2c3e50" font-weight="bold">核心发现：子任务越粗，编排器越容易"看见全貌"并拒绝危险操作</text>
</svg>