<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffa502"/>
      <stop offset="100%" stop-color="#e67e22"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7bed9f"/>
      <stop offset="100%" stop-color="#2ed573"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bg)" rx="18"/>

  <!-- Title -->
  <text x="450" y="48" text-anchor="middle" fill="#fff" font-size="26" font-weight="bold">CocoaBench：Agent 三大核心失败模式</text>
  <text x="450" y="76" text-anchor="middle" fill="#8899bb" font-size="15">712条失败轨迹分析 → 大脑 / 手 / 眼睛 都有短板</text>

  <!-- Central Agent Icon -->
  <circle cx="450" cy="310" r="62" fill="#253554" stroke="#4a6fa5" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="450" y="298" text-anchor="middle" fill="#cdd8ee" font-size="14" font-weight="bold">🤖</text>
  <text x="450" y="298" text-anchor="middle" fill="#fff" font-size="36">🤖</text>
  <text x="450" y="328" text-anchor="middle" fill="#8899bb" font-size="13">AI Agent</text>
  <text x="450" y="345" text-anchor="middle" fill="#5a7aa8" font-size="11">成功率仅 45.1%</text>

  <!-- E1: Reasoning (Brain) - Left -->
  <g filter="url(#shadow)">
    <rect x="40" y="160" width="240" height="280" rx="16" fill="#1e2d4a" stroke="url(#g1)" stroke-width="2.5"/>
    <!-- Header bar -->
    <rect x="40" y="160" width="240" height="52" rx="16" fill="url(#g1)" opacity="0.9"/>
    <rect x="40" y="196" width="240" height="16" fill="url(#g1)" opacity="0.9"/>
    <!-- Percentage circle -->
    <circle cx="80" cy="186" r="20" fill="rgba(0,0,0,0.3)"/>
    <text x="80" y="192" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">53%</text>
    <text x="170" y="180" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">🧠 推理与规划</text>
    <text x="170" y="200" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="12">E1 · Agent 的"大脑"</text>

    <!-- Sub items -->
    <text x="65" y="245" fill="#ff8a80" font-size="13">●</text>
    <text x="80" y="245" fill="#dde4f0" font-size="13">错误推理 — 策略根本不对</text>
    <text x="65" y="280" fill="#ff8a80" font-size="13">●</text>
    <text x="80" y="280" fill="#dde4f0" font-size="13">精度不足 — 差一点点</text>
    <text x="65" y="315" fill="#ff8a80" font-size="13">●</text>
    <text x="80" y="315" fill="#dde4f0" font-size="13">格式错误 — 答对但写错</text>

    <!-- Example box -->
    <rect x="56" y="345" width="208" height="80" rx="8" fill="rgba(255,107,107,0.1)" stroke="rgba(255,107,107,0.3)" stroke-width="1"/>
    <text x="66" y="363" fill="#ff9a8a" font-size="10" font-weight="bold">💡 典型案例</text>
    <text x="66" y="380" fill="#8899bb" font-size="10">8-puzzle任务：算出最优解</text>
    <text x="66" y="394" fill="#8899bb" font-size="10">但忽略"从干净状态执行"</text>
    <text x="66" y="408" fill="#8899bb" font-size="10">→ 子问题对了，约束忽略了</text>
  </g>

  <!-- E2: Tool & Execution (Hands) - Right Top -->
  <g filter="url(#shadow)">
    <rect x="620" y="120" width="240" height="190" rx="16" fill="#1e2d4a" stroke="url(#g2)" stroke-width="2.5"/>
    <rect x="620" y="120" width="240" height="52" rx="16" fill="url(#g2)" opacity="0.9"/>
    <rect x="620" y="156" width="240" height="16" fill="url(#g2)" opacity="0.9"/>
    <circle cx="660" cy="146" r="20" fill="rgba(0,0,0,0.3)"/>
    <text x="660" y="152" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">19%</text>
    <text x="750" y="140" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">🖐️ 工具与执行</text>
    <text x="750" y="160" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="12">E2 · Agent 的"手"</text>

    <text x="640" y="200" fill="#ffbe76" font-size="13">●</text>
    <text x="655" y="200" fill="#dde4f0" font-size="13">无限循环 — 死循环不自救</text>
    <text x="640" y="230" fill="#ffbe76" font-size="13">●</text>
    <text x="655" y="230" fill="#dde4f0" font-size="13">反爬障碍 — 被网站挡住</text>
    <text x="640" y="260" fill="#ffbe76" font-size="13">●</text>
    <text x="655" y="260" fill="#dde4f0" font-size="13">工具结果幻觉</text>

    <rect x="636" y="275" width="208" height="24" rx="6" fill="rgba(255,165,2,0.1)" stroke="rgba(255,165,2,0.3)" stroke-width="1"/>
    <text x="646" y="291" fill="#8899bb" font-size="10">💡 Nonogram: 51轮裁剪图片，从未求解</text>
  </g>

  <!-- E3: Vision (Eyes) - Right Bottom -->
  <g filter="url(#shadow)">
    <rect x="620" y="350" width="240" height="170" rx="16" fill="#1e2d4a" stroke="url(#g3)" stroke-width="2.5"/>
    <rect x="620" y="350" width="240" height="52" rx="16" fill="url(#g3)" opacity="0.85"/>
    <rect x="620" y="386" width="240" height="16" fill="url(#g3)" opacity="0.85"/>
    <circle cx="660" cy="376" r="20" fill="rgba(0,0,0,0.3)"/>
    <text x="660" y="382" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">28%</text>
    <text x="750" y="370" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">👁️ 视觉理解</text>
    <text x="750" y="390" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="12">E3 · Agent 的"眼睛"</text>

    <text x="640" y="430" fill="#7bed9f" font-size="13">●</text>
    <text x="655" y="430" fill="#dde4f0" font-size="13">视觉细节遗漏</text>
    <text x="640" y="460" fill="#7bed9f" font-size="13">●</text>
    <text x="655" y="460" fill="#dde4f0" font-size="13">视觉知识不足</text>
    <text x="640" y="490" fill="#7bed9f" font-size="13">●</text>
    <text x="655" y="490" fill="#dde4f0" font-size="13">视觉感知缺失</text>
  </g>

  <!-- Arrows from Agent to modules -->
  <!-- To E1 (left) -->
  <path d="M 390 295 Q 330 260 280 270" fill="none" stroke="#ff6b6b" stroke-width="2.5" stroke-dasharray="6,4" opacity="0.7"/>
  <polygon points="283,264 273,272 285,276" fill="#ff6b6b" opacity="0.7"/>

  <!-- To E2 (right top) -->
  <path d="M 505 280 Q 560 240 620 240" fill="none" stroke="#ffa502" stroke-width="2.5" stroke-dasharray="6,4" opacity="0.7"/>
  <polygon points="616,234 626,240 616,246" fill="#ffa502" opacity="0.7"/>

  <!-- To E3 (right bottom) -->
  <path d="M 505 340 Q 560 390 620 420" fill="none" stroke="#2ed573" stroke-width="2.5" stroke-dasharray="6,4" opacity="0.7"/>
  <polygon points="616,414 626,422 618,426" fill="#2ed573" opacity="0.7"/>

  <!-- Bottom insight bar -->
  <rect x="100" y="560" width="700" height="42" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="450" y="586" text-anchor="middle" fill="#8899bb" font-size="14">
    <tspan fill="#ff8a80">弱模型</tspan> 在错误推理、格式错误、死循环上失败率显著更高 → <tspan fill="#7bed9f">推理能力是最大瓶颈</tspan>
  </text>
</svg>