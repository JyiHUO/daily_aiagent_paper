<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="strongGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="weakGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" fill="url(#bgGrad)" rx="16"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="bold">编程能力是强 Agent 的关键策略</text>
  <text x="450" y="66" text-anchor="middle" fill="#94a3b8" font-size="13">CocoaBench · 工具调用策略对比</text>

  <!-- === LEFT SIDE: Strong Agent === -->
  <g filter="url(#shadow)">
    <rect x="40" y="95" width="380" height="370" rx="16" fill="#0d2818" stroke="#10b981" stroke-width="2" opacity="0.95"/>
  </g>
  <text x="230" y="128" text-anchor="middle" fill="#10b981" font-size="19" font-weight="bold">🏆 强 Agent（GPT-5.4）</text>
  <text x="230" y="150" text-anchor="middle" fill="#6ee7b7" font-size="13">成功率 36.6%</text>

  <!-- Step 1: Browse -->
  <rect x="70" y="170" width="320" height="70" rx="12" fill="#1e3a2f" stroke="#34d399" stroke-width="1.5"/>
  <text x="100" y="195" fill="#fbbf24" font-size="28">🌐</text>
  <text x="140" y="197" fill="#e2e8f0" font-size="15" font-weight="bold">Step 1: 浏览器获取信息</text>
  <text x="140" y="218" fill="#94a3b8" font-size="12">browser-navigate → 快速抓取数据</text>

  <!-- Arrow down -->
  <polygon points="230,245 220,245 230,265 240,245" fill="#10b981"/>

  <!-- Step 2: Code -->
  <rect x="70" y="270" width="320" height="90" rx="12" fill="#1a3328" stroke="#10b981" stroke-width="2.5" filter="url(#glow)"/>
  <text x="100" y="300" fill="#60a5fa" font-size="28">💻</text>
  <text x="140" y="302" fill="#e2e8f0" font-size="15" font-weight="bold">Step 2: 代码处理分析</text>
  <text x="140" y="323" fill="#94a3b8" font-size="12">code-execute → 清洗、计算、格式化</text>

  <!-- Code bar -->
  <rect x="90" y="340" width="280" height="10" rx="5" fill="#1f2937"/>
  <rect x="90" y="340" width="179" height="10" rx="5" fill="url(#strongGrad)"/>
  <text x="280" y="349" fill="#e2e8f0" font-size="10" font-weight="bold">64% 编程工具调用</text>

  <!-- Output -->
  <rect x="120" y="380" width="220" height="36" rx="8" fill="#064e3b" stroke="#34d399" stroke-width="1"/>
  <text x="230" y="403" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="bold">✅ 结构化精准输出</text>

  <!-- Strategy label -->
  <text x="230" y="445" text-anchor="middle" fill="#a7f3d0" font-size="12" font-style="italic">策略: 信息获取 → 代码处理（分离）</text>

  <!-- === RIGHT SIDE: Weak Agent === -->
  <g filter="url(#shadow)">
    <rect x="480" y="95" width="380" height="370" rx="16" fill="#2d1215" stroke="#ef4444" stroke-width="2" opacity="0.95"/>
  </g>
  <text x="670" y="128" text-anchor="middle" fill="#ef4444" font-size="19" font-weight="bold">⚠️ 弱 Agent（Kimi-k2.5）</text>
  <text x="670" y="150" text-anchor="middle" fill="#fca5a5" font-size="13">成功率 11.8%</text>

  <!-- Loop block -->
  <rect x="510" y="170" width="320" height="210" rx="12" fill="#2a1618" stroke="#f87171" stroke-width="1.5"/>
  <text x="540" y="200" fill="#fbbf24" font-size="28">🌐</text>
  <text x="580" y="202" fill="#e2e8f0" font-size="15" font-weight="bold">反复在浏览器中操作</text>

  <!-- Loop arrows -->
  <g fill="none" stroke="#f87171" stroke-width="1.5" stroke-dasharray="5,3">
    <path d="M 600,220 L 600,245"/>
    <path d="M 600,265 L 600,290"/>
    <path d="M 600,310 L 600,335"/>
  </g>

  <!-- Sub actions -->
  <rect x="535" y="225" width="260" height="32" rx="6" fill="#3b1a1e"/>
  <text x="550" y="246" fill="#fca5a5" font-size="12">🖱️ browser-click → 手动点击查看</text>

  <rect x="535" y="265" width="260" height="32" rx="6" fill="#3b1a1e"/>
  <text x="550" y="286" fill="#fca5a5" font-size="12">👁️ image-read → 视觉识别数据</text>

  <rect x="535" y="305" width="260" height="32" rx="6" fill="#3b1a1e"/>
  <text x="550" y="326" fill="#fca5a5" font-size="12">🖱️ browser-click → 再次操作...</text>

  <!-- Cycle icon -->
  <text x="808" y="285" fill="#f87171" font-size="30">🔄</text>

  <!-- Code bar -->
  <rect x="530" y="398" width="280" height="10" rx="5" fill="#1f2937"/>
  <rect x="530" y="398" width="74" height="10" rx="5" fill="url(#weakGrad)"/>
  <text x="614" y="407" fill="#e2e8f0" font-size="10" font-weight="bold">26.4% 编程工具调用</text>

  <!-- Output -->
  <rect x="560" y="420" width="220" height="36" rx="8" fill="#450a0a" stroke="#f87171" stroke-width="1"/>
  <text x="670" y="443" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="bold">❌ 耗时且易出错</text>

  <!-- Strategy label -->
  <text x="670" y="445" text-anchor="middle" fill="#a7f3d0" font-size="1" opacity="0"/>

  <!-- VS divider -->
  <line x1="450" y1="120" x2="450" y2="440" stroke="#475569" stroke-width="1" stroke-dasharray="6,4"/>
  <circle cx="450" cy="280" r="22" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
  <text x="450" y="286" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="bold">VS</text>

  <!-- Bottom insight -->
  <rect x="140" y="490" width="620" height="50" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="450" y="514" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="bold">💡 核心洞察：编程不只是技能，更是高效执行复杂任务的核心策略</text>
  <text x="450" y="532" text-anchor="middle" fill="#64748b" font-size="11">先搜索获取 → 再代码处理 = 减少交互步数 + 结构化推理 + 高准确率</text>
</svg>