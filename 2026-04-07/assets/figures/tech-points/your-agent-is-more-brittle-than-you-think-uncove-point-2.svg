<svg xmlns="http://www.w3.org/2000/svg" width="960" height="620" viewBox="0 0 960 620">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
    <style>
      .title{font:700 30px sans-serif; fill:#0f172a}
      .subtitle{font:500 16px sans-serif; fill:#475569}
      .label{font:700 18px sans-serif; fill:#0f172a}
      .small{font:600 15px sans-serif; fill:#334155}
      .tiny{font:700 14px sans-serif; fill:#475569}
      .numBad{font:800 28px sans-serif; fill:#dc2626}
      .numWorse{font:800 34px sans-serif; fill:#b91c1c}
      .muted{fill:#f8fafc; stroke:#cbd5e1; stroke-width:2}
      .panel{fill:#ffffff; stroke:#cbd5e1; stroke-width:2}
      .warn{fill:#fff7ed; stroke:#fdba74; stroke-width:2}
      .danger{fill:#fef2f2; stroke:#fca5a5; stroke-width:2}
      .chip{fill:#eef2ff; stroke:#c7d2fe; stroke-width:1.5}
      .shadow{filter:url(#none)}
    </style>
  </defs>

  <rect width="960" height="620" fill="#f8fafc"/>

  <text x="480" y="50" text-anchor="middle" class="title">表层防御几乎失效</text>
  <text x="480" y="78" text-anchor="middle" class="subtitle">动态 Agent 中，外层“补丁”常挡不住间接注入</text>

  <!-- Left panel -->
  <rect x="50" y="120" rx="20" ry="20" width="380" height="420" class="panel"/>
  <text x="90" y="160" class="label">表层防御</text>

  <rect x="85" y="190" rx="14" ry="14" width="140" height="52" class="chip"/>
  <text x="155" y="223" text-anchor="middle" class="small">警告 / 改写</text>

  <rect x="245" y="190" rx="14" ry="14" width="140" height="52" class="chip"/>
  <text x="315" y="223" text-anchor="middle" class="small">关键词 / 审查</text>

  <rect x="120" y="285" rx="16" ry="16" width="240" height="88" class="warn"/>
  <text x="240" y="320" text-anchor="middle" class="label">外部内容照常进入</text>
  <text x="240" y="348" text-anchor="middle" class="tiny">恶意指令混在工具返回里</text>

  <path d="M 240 245 L 240 280" stroke="#475569" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <rect x="120" y="425" rx="16" ry="16" width="240" height="78" class="danger"/>
  <text x="240" y="458" text-anchor="middle" class="label">Agent 仍被带偏</text>
  <text x="240" y="485" text-anchor="middle" class="tiny">多步执行里逐渐起效</text>

  <path d="M 240 375 L 240 418" stroke="#dc2626" stroke-width="4" fill="none" marker-end="url(#arrowRed)"/>

  <!-- Right panel -->
  <rect x="470" y="120" rx="20" ry="20" width="440" height="420" class="panel"/>
  <text x="510" y="160" class="label">实测结果</text>

  <!-- Qwen 2.5 -->
  <rect x="505" y="190" rx="18" ry="18" width="170" height="150" class="muted"/>
  <text x="590" y="220" text-anchor="middle" class="small">Qwen-2.5-14B</text>
  <text x="590" y="265" text-anchor="middle" class="numBad">97.40%</text>
  <text x="590" y="290" text-anchor="middle" class="tiny">无防御</text>

  <path d="M 690 245 L 760 245" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <rect x="775" y="190" rx="18" ry="18" width="100" height="62" class="warn"/>
  <text x="825" y="228" text-anchor="middle" class="tiny">Warning</text>
  <rect x="775" y="278" rx="18" ry="18" width="100" height="62" class="warn"/>
  <text x="825" y="316" text-anchor="middle" class="tiny">LLM Judge</text>

  <text x="725" y="286" text-anchor="middle" class="numWorse">99.65%</text>
  <text x="725" y="338" text-anchor="middle" class="numWorse">100%</text>

  <!-- divider -->
  <line x1="500" y1="370" x2="880" y2="370" stroke="#e2e8f0" stroke-width="2"/>

  <!-- Qwen 3 -->
  <rect x="505" y="395" rx="18" ry="18" width="170" height="110" class="muted"/>
  <text x="590" y="425" text-anchor="middle" class="small">Qwen-3-14B</text>
  <text x="590" y="468" text-anchor="middle" class="numBad">81.94%</text>
  <text x="590" y="493" text-anchor="middle" class="tiny">无防御</text>

  <path d="M 690 450 L 760 450" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <rect x="775" y="390" rx="18" ry="18" width="100" height="50" class="warn"/>
  <text x="825" y="422" text-anchor="middle" class="tiny">Sandwich</text>
  <rect x="775" y="455" rx="18" ry="18" width="100" height="50" class="warn"/>
  <text x="825" y="487" text-anchor="middle" class="tiny">Spotlight</text>

  <text x="725" y="427" text-anchor="middle" class="numBad">82.99%</text>
  <text x="725" y="492" text-anchor="middle" class="numWorse">88.72%</text>

  <!-- Bottom takeaway -->
  <rect x="170" y="560" rx="16" ry="16" width="620" height="42" fill="#0f172a"/>
  <text x="480" y="587" text-anchor="middle" style="font:700 18px sans-serif; fill:#ffffff">只改“输入表面” ≠ 真正拦住注入</text>
</svg>