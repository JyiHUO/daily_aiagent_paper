<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4A5568"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/>
    </marker>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; }
      .title { font-size: 34px; font-weight: 700; fill: #111827; }
      .subtitle { font-size: 18px; fill: #4B5563; }
      .label { font-size: 20px; font-weight: 700; fill: #111827; }
      .small { font-size: 18px; fill: #374151; }
      .tiny { font-size: 16px; fill: #6B7280; }
    </style>
  </defs>

  <rect width="1200" height="720" fill="#F8FAFC"/>

  <text x="600" y="58" text-anchor="middle" class="title">GUIDE：把长轨迹评测拆成小上下文</text>
  <text x="600" y="90" text-anchor="middle" class="subtitle">不是一次看完整条轨迹，而是先切段，再逐段诊断</text>

  <!-- Left: monolithic evaluation -->
  <rect x="60" y="150" rx="24" ry="24" width="280" height="470" fill="#FFF1F2" stroke="#FCA5A5" stroke-width="2"/>
  <text x="200" y="195" text-anchor="middle" class="label" fill="#B91C1C">整体一把判</text>

  <rect x="95" y="235" rx="16" ry="16" width="210" height="85" fill="#FFFFFF" stroke="#FCA5A5" stroke-width="2"/>
  <g transform="translate(118,255)">
    <rect x="0" y="0" width="34" height="18" rx="4" fill="#FDE68A"/>
    <rect x="42" y="0" width="34" height="18" rx="4" fill="#93C5FD"/>
    <rect x="84" y="0" width="34" height="18" rx="4" fill="#A7F3D0"/>
    <rect x="126" y="0" width="34" height="18" rx="4" fill="#F9A8D4"/>
    <rect x="10" y="28" width="150" height="8" rx="4" fill="#E5E7EB"/>
    <rect x="10" y="44" width="175" height="8" rx="4" fill="#E5E7EB"/>
  </g>
  <text x="200" y="340" text-anchor="middle" class="small">整条长轨迹</text>

  <path d="M200 360 L200 425" stroke="#9CA3AF" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="95" y="435" rx="18" ry="18" width="210" height="105" fill="#FFFFFF" stroke="#FCA5A5" stroke-width="2"/>
  <circle cx="150" cy="487" r="22" fill="#FECACA"/>
  <path d="M140 477 L160 497 M160 477 L140 497" stroke="#B91C1C" stroke-width="5" stroke-linecap="round"/>
  <text x="228" y="480" text-anchor="middle" class="small">只给结果</text>
  <text x="228" y="505" text-anchor="middle" class="tiny">失败，但不知错在哪</text>

  <!-- Middle separator arrow -->
  <path d="M380 385 C450 385, 470 385, 540 385" stroke="#CBD5E1" stroke-width="6" fill="none" marker-end="url(#arrow)"/>
  <text x="460" y="360" text-anchor="middle" class="small" fill="#64748B">换成分层诊断</text>

  <!-- Right: GUIDE -->
  <rect x="560" y="120" rx="28" ry="28" width="580" height="530" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2.5"/>
  <text x="850" y="165" text-anchor="middle" class="label" fill="#1D4ED8">GUIDE</text>

  <!-- stage 1 -->
  <rect x="600" y="210" rx="22" ry="22" width="145" height="300" fill="#FFFFFF" stroke="#93C5FD" stroke-width="2"/>
  <text x="672.5" y="245" text-anchor="middle" class="small" font-weight="700">切段</text>
  <rect x="630" y="275" width="85" height="34" rx="10" fill="#FDE68A"/>
  <rect x="630" y="323" width="85" height="34" rx="10" fill="#93C5FD"/>
  <rect x="630" y="371" width="85" height="34" rx="10" fill="#A7F3D0"/>
  <text x="672.5" y="456" text-anchor="middle" class="tiny">语义子任务</text>

  <!-- stage 2 -->
  <rect x="777" y="210" rx="22" ry="22" width="145" height="300" fill="#FFFFFF" stroke="#93C5FD" stroke-width="2"/>
  <text x="849.5" y="245" text-anchor="middle" class="small" font-weight="700">逐段诊断</text>
  <g transform="translate(803,278)">
    <rect x="0" y="0" width="92" height="42" rx="12" fill="#FEF3C7" stroke="#F59E0B"/>
    <text x="46" y="27" text-anchor="middle" class="tiny">完成?</text>
    <rect x="0" y="58" width="92" height="42" rx="12" fill="#DBEAFE" stroke="#3B82F6"/>
    <text x="46" y="85" text-anchor="middle" class="tiny">错因</text>
    <rect x="0" y="116" width="92" height="42" rx="12" fill="#DCFCE7" stroke="#10B981"/>
    <text x="46" y="143" text-anchor="middle" class="tiny">修正</text>
  </g>

  <!-- stage 3 -->
  <rect x="954" y="210" rx="22" ry="22" width="145" height="300" fill="#FFFFFF" stroke="#93C5FD" stroke-width="2"/>
  <text x="1026.5" y="245" text-anchor="middle" class="small" font-weight="700">汇总</text>
  <g transform="translate(983,292)">
    <rect x="0" y="0" width="88" height="88" rx="18" fill="#E0F2FE" stroke="#38BDF8" stroke-width="2"/>
    <circle cx="44" cy="44" r="24" fill="#BFDBFE"/>
    <path d="M32 44 L40 52 L58 34" stroke="#1D4ED8" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="1026.5" y="430" text-anchor="middle" class="tiny">任务级结论</text>

  <!-- arrows inside guide -->
  <path d="M745 360 L777 360" stroke="#2563EB" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <path d="M922 360 L954 360" stroke="#2563EB" stroke-width="4" marker-end="url(#arrowBlue)"/>

  <!-- Example callout -->
  <rect x="630" y="545" rx="18" ry="18" width="440" height="78" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="2"/>
  <text x="650" y="575" class="small">例：第 2 段点错用户 → 直接定位在这一段</text>
  <text x="650" y="603" class="tiny">不再只有“整任务失败”</text>
</svg>