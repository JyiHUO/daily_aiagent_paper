<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4B5563"/>
    </marker>
    <style>
      .title{font:700 34px Arial,Helvetica,sans-serif; fill:#111827}
      .subtitle{font:600 20px Arial,Helvetica,sans-serif; fill:#374151}
      .label{font:700 22px Arial,Helvetica,sans-serif; fill:#111827}
      .small{font:600 18px Arial,Helvetica,sans-serif; fill:#374151}
      .tiny{font:700 16px Arial,Helvetica,sans-serif; fill:#6B7280}
      .box{stroke:#CBD5E1; stroke-width:2}
      .arrow{stroke:#4B5563; stroke-width:4; fill:none; marker-end:url(#arrow)}
      .soft{fill:#F8FAFC}
      .good{fill:#DCFCE7}
      .bad{fill:#FEE2E2}
      .blue{fill:#DBEAFE}
      .yellow{fill:#FEF3C7}
    </style>
  </defs>

  <rect width="1200" height="720" fill="#FFFFFF"/>

  <text x="600" y="58" text-anchor="middle" class="title">关键不在“大工具”</text>
  <text x="600" y="92" text-anchor="middle" class="subtitle">而在 覆盖 + 可组合</text>

  <!-- Left panel -->
  <rect x="70" y="140" rx="28" ry="28" width="470" height="500" class="box bad"/>
  <text x="305" y="180" text-anchor="middle" class="label">少量大而全工具</text>
  <text x="305" y="212" text-anchor="middle" class="tiny">看起来强，但常卡住</text>

  <!-- big tools -->
  <rect x="125" y="260" rx="18" ry="18" width="160" height="90" fill="#FCA5A5" stroke="#EF4444" stroke-width="2.5"/>
  <text x="205" y="314" text-anchor="middle" class="small">超级工具 A</text>

  <rect x="325" y="260" rx="18" ry="18" width="160" height="90" fill="#FCA5A5" stroke="#EF4444" stroke-width="2.5"/>
  <text x="405" y="314" text-anchor="middle" class="small">超级工具 B</text>

  <rect x="225" y="385" rx="18" ry="18" width="160" height="90" fill="#FCA5A5" stroke="#EF4444" stroke-width="2.5"/>
  <text x="305" y="439" text-anchor="middle" class="small">超级工具 C</text>

  <!-- task path broken -->
  <circle cx="135" cy="545" r="20" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="2"/>
  <circle cx="245" cy="545" r="20" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="2"/>
  <circle cx="355" cy="545" r="20" fill="#FECACA" stroke="#EF4444" stroke-width="2"/>
  <circle cx="465" cy="545" r="20" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="2"/>
  <line x1="155" y1="545" x2="225" y2="545" class="arrow"/>
  <line x1="265" y1="545" x2="335" y2="545" class="arrow"/>
  <line x1="375" y1="545" x2="445" y2="545" stroke="#EF4444" stroke-width="4" stroke-dasharray="8 8"/>
  <text x="305" y="595" text-anchor="middle" class="small" fill="#B91C1C">覆盖缺口</text>

  <!-- Right panel -->
  <rect x="660" y="140" rx="28" ry="28" width="470" height="500" class="box good"/>
  <text x="895" y="180" text-anchor="middle" class="label">一组可拼的小工具</text>
  <text x="895" y="212" text-anchor="middle" class="tiny">常见步骤都能搭起来</text>

  <!-- small tools grid -->
  <rect x="720" y="250" rx="16" ry="16" width="110" height="62" class="blue box"/>
  <text x="775" y="288" text-anchor="middle" class="small">搜索</text>

  <rect x="855" y="250" rx="16" ry="16" width="110" height="62" class="blue box"/>
  <text x="910" y="288" text-anchor="middle" class="small">打开页</text>

  <rect x="990" y="250" rx="16" ry="16" width="110" height="62" class="blue box"/>
  <text x="1045" y="288" text-anchor="middle" class="small">跳转</text>

  <rect x="720" y="340" rx="16" ry="16" width="110" height="62" class="yellow box"/>
  <text x="775" y="378" text-anchor="middle" class="small">更新</text>

  <rect x="855" y="340" rx="16" ry="16" width="110" height="62" class="yellow box"/>
  <text x="910" y="378" text-anchor="middle" class="small">读取</text>

  <rect x="990" y="340" rx="16" ry="16" width="110" height="62" class="yellow box"/>
  <text x="1045" y="378" text-anchor="middle" class="small">提交</text>

  <!-- composed path -->
  <circle cx="735" cy="545" r="20" fill="#BBF7D0" stroke="#16A34A" stroke-width="2"/>
  <circle cx="835" cy="545" r="20" fill="#BBF7D0" stroke="#16A34A" stroke-width="2"/>
  <circle cx="935" cy="545" r="20" fill="#BBF7D0" stroke="#16A34A" stroke-width="2"/>
  <circle cx="1035" cy="545" r="20" fill="#BBF7D0" stroke="#16A34A" stroke-width="2"/>
  <line x1="755" y1="545" x2="815" y2="545" class="arrow"/>
  <line x1="855" y1="545" x2="915" y2="545" class="arrow"/>
  <line x1="955" y1="545" x2="1015" y2="545" class="arrow"/>
  <text x="885" y="595" text-anchor="middle" class="small" fill="#166534">多工具组合更稳</text>

  <!-- center comparison arrow -->
  <path d="M 550 390 C 600 390, 610 390, 650 390" class="arrow"/>

  <!-- bottom takeaway -->
  <rect x="300" y="655" rx="18" ry="18" width="600" height="42" fill="#F3F4F6"/>
  <text x="600" y="682" text-anchor="middle" class="small">像积木，不像万能锤</text>
</svg>