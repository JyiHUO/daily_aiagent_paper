<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#4B5563"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#10B981"/>
    </marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#EF4444"/>
    </marker>
    <style>
      .title{font:700 34px sans-serif; fill:#111827}
      .sub{font:500 18px sans-serif; fill:#6B7280}
      .label{font:700 22px sans-serif; fill:#111827}
      .small{font:600 18px sans-serif; fill:#374151}
      .tiny{font:600 16px sans-serif; fill:#4B5563}
      .good{fill:#10B981}
      .bad{fill:#EF4444}
      .muted{fill:#9CA3AF}
    </style>
  </defs>

  <rect width="1200" height="720" fill="#F8FAFC"/>

  <text x="600" y="58" text-anchor="middle" class="title">复杂工具未必好</text>
  <text x="600" y="88" text-anchor="middle" class="sub">把稳定动作封装进工具，把页面判断留给 Agent</text>

  <!-- Left panel -->
  <rect x="70" y="130" rx="28" ry="28" width="480" height="500" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="2"/>
  <text x="310" y="175" text-anchor="middle" class="label bad">高复杂度工具</text>
  <text x="310" y="202" text-anchor="middle" class="small">一把梭：搜索 + 筛选 + 定位 + 点击</text>

  <!-- giant tool -->
  <rect x="155" y="245" rx="24" ry="24" width="310" height="110" fill="#F87171" opacity="0.95"/>
  <text x="310" y="310" text-anchor="middle" font-size="28" font-weight="700" fill="white">search-and-mark-onsale</text>

  <!-- brittle web states -->
  <rect x="115" y="430" rx="18" ry="18" width="130" height="95" fill="white" stroke="#FCA5A5" stroke-width="2"/>
  <rect x="535" y="430" rx="18" ry="18" width="0" height="0" fill="none"/>
  <rect x="285" y="430" rx="18" ry="18" width="130" height="95" fill="white" stroke="#FCA5A5" stroke-width="2"/>
  <rect x="455" y="430" rx="18" ry="18" width="130" height="95" fill="white" stroke="#FCA5A5" stroke-width="2"/>

  <rect x="130" y="447" width="100" height="10" rx="5" fill="#E5E7EB"/>
  <rect x="130" y="468" width="72" height="10" rx="5" fill="#FCA5A5"/>
  <rect x="130" y="490" width="88" height="10" rx="5" fill="#E5E7EB"/>

  <rect x="300" y="447" width="100" height="10" rx="5" fill="#E5E7EB"/>
  <rect x="300" y="468" width="52" height="10" rx="5" fill="#FCA5A5"/>
  <rect x="300" y="490" width="94" height="10" rx="5" fill="#E5E7EB"/>

  <rect x="470" y="447" width="100" height="10" rx="5" fill="#E5E7EB"/>
  <rect x="470" y="468" width="83" height="10" rx="5" fill="#FCA5A5"/>
  <rect x="470" y="490" width="60" height="10" rx="5" fill="#E5E7EB"/>

  <line x1="310" y1="355" x2="180" y2="420" stroke="#EF4444" stroke-width="4" marker-end="url(#arrowRed)"/>
  <line x1="310" y1="355" x2="350" y2="420" stroke="#EF4444" stroke-width="4" marker-end="url(#arrowRed)"/>
  <line x1="310" y1="355" x2="520" y2="420" stroke="#EF4444" stroke-width="4" marker-end="url(#arrowRed)"/>

  <circle cx="220" cy="550" r="18" fill="#EF4444"/>
  <path d="M211 541 L229 559 M229 541 L211 559" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <circle cx="390" cy="550" r="18" fill="#EF4444"/>
  <path d="M381 541 L399 559 M399 541 L381 559" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <circle cx="560" cy="550" r="18" fill="#EF4444"/>
  <path d="M551 541 L569 559 M569 541 L551 559" stroke="white" stroke-width="4" stroke-linecap="round"/>

  <text x="310" y="590" text-anchor="middle" class="tiny">依赖特定页面状态</text>

  <!-- Right panel -->
  <rect x="650" y="130" rx="28" ry="28" width="480" height="500" fill="#ECFDF5" stroke="#86EFAC" stroke-width="2"/>
  <text x="890" y="175" text-anchor="middle" class="label good">中低复杂度工具</text>
  <text x="890" y="202" text-anchor="middle" class="small">工具做确定动作，Agent 看页面再决定</text>

  <!-- agent -->
  <circle cx="760" cy="300" r="58" fill="#D1FAE5" stroke="#10B981" stroke-width="3"/>
  <circle cx="742" cy="290" r="6" fill="#065F46"/>
  <circle cx="778" cy="290" r="6" fill="#065F46"/>
  <path d="M740 320 Q760 336 780 320" fill="none" stroke="#065F46" stroke-width="4" stroke-linecap="round"/>
  <text x="760" y="375" text-anchor="middle" class="small">Agent</text>

  <!-- tools -->
  <rect x="845" y="240" rx="16" ry="16" width="180" height="54" fill="#34D399"/>
  <rect x="845" y="314" rx="16" ry="16" width="180" height="54" fill="#6EE7B7"/>
  <rect x="845" y="388" rx="16" ry="16" width="180" height="54" fill="#A7F3D0"/>

  <text x="935" y="274" text-anchor="middle" font-size="22" font-weight="700" fill="#064E3B">search</text>
  <text x="935" y="348" text-anchor="middle" font-size="22" font-weight="700" fill="#064E3B">navigate</text>
  <text x="935" y="422" text-anchor="middle" font-size="22" font-weight="700" fill="#064E3B">open-item</text>

  <line x1="818" y1="286" x2="842" y2="270" stroke="#10B981" stroke-width="4" marker-end="url(#arrowGreen)"/>
  <line x1="818" y1="300" x2="842" y2="340" stroke="#10B981" stroke-width="4" marker-end="url(#arrowGreen)"/>
  <line x1="812" y1="320" x2="842" y2="412" stroke="#10B981" stroke-width="4" marker-end="url(#arrowGreen)"/>

  <!-- stable outcomes -->
  <rect x="735" y="490" rx="18" ry="18" width="310" height="90" fill="white" stroke="#86EFAC" stroke-width="2"/>
  <line x1="790" y1="535" x2="850" y2="535" stroke="#10B981" stroke-width="6" stroke-linecap="round"/>
  <line x1="885" y1="535" x2="945" y2="535" stroke="#10B981" stroke-width="6" stroke-linecap="round"/>
  <line x1="980" y1="535" x2="1010" y2="535" stroke="#10B981" stroke-width="6" stroke-linecap="round"/>
  <circle cx="770" cy="535" r="16" fill="#10B981"/>
  <path d="M762 535 L768 541 L779 528" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="865" cy="535" r="16" fill="#10B981"/>
  <path d="M857 535 L863 541 L874 528" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="960" cy="535" r="16" fill="#10B981"/>
  <path d="M952 535 L958 541 L969 528" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="890" y="570" text-anchor="middle" class="tiny">更稳，更能泛化</text>

  <!-- center divider arrow -->
  <path d="M575 380 C620 380, 620 380, 650 380" fill="none" stroke="#4B5563" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="612" y="352" text-anchor="middle" class="small">别把整任务写死</text>
</svg>