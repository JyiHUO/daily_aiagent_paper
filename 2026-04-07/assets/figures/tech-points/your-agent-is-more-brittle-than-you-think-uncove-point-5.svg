<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#4b5563"/>
    </marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#dc2626"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#16a34a"/>
    </marker>
    <style>
      .title{font:700 28px Arial,Helvetica,sans-serif; fill:#111827}
      .label{font:700 18px Arial,Helvetica,sans-serif; fill:#111827}
      .small{font:600 15px Arial,Helvetica,sans-serif; fill:#374151}
      .tiny{font:700 14px Arial,Helvetica,sans-serif; fill:#374151}
    </style>
  </defs>

  <rect width="960" height="600" fill="#f8fafc"/>

  <text x="480" y="52" text-anchor="middle" class="title">把检测点前移到 tool input</text>

  <!-- Left panel: late detection -->
  <rect x="50" y="95" width="390" height="445" rx="24" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
  <text x="245" y="128" text-anchor="middle" class="label">晚检：function call</text>

  <rect x="95" y="180" width="120" height="82" rx="16" fill="#fee2e2" stroke="#f87171" stroke-width="2"/>
  <text x="155" y="215" text-anchor="middle" class="small">外部内容</text>
  <text x="155" y="238" text-anchor="middle" class="tiny">藏指令</text>

  <rect x="260" y="170" width="125" height="102" rx="18" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2"/>
  <text x="322.5" y="215" text-anchor="middle" class="small">Agent</text>
  <text x="322.5" y="238" text-anchor="middle" class="tiny">已被带偏</text>

  <line x1="215" y1="221" x2="260" y2="221" stroke="#4b5563" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="250" y="365" width="145" height="86" rx="18" fill="#fecaca" stroke="#dc2626" stroke-width="2.5"/>
  <text x="322.5" y="400" text-anchor="middle" class="small">调用危险工具前</text>
  <text x="322.5" y="423" text-anchor="middle" class="tiny">才检查</text>

  <line x1="322.5" y1="272" x2="322.5" y2="365" stroke="#dc2626" stroke-width="4" marker-end="url(#arrowRed)"/>

  <circle cx="126" cy="405" r="34" fill="#fff" stroke="#dc2626" stroke-width="3"/>
  <path d="M111 390 L141 420 M141 390 L111 420" stroke="#dc2626" stroke-width="5" stroke-linecap="round"/>
  <text x="126" y="458" text-anchor="middle" class="tiny" fill="#dc2626">太晚</text>

  <!-- Right panel: early detection -->
  <rect x="520" y="95" width="390" height="445" rx="24" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="715" y="128" text-anchor="middle" class="label">早检：tool input</text>

  <rect x="560" y="180" width="120" height="82" rx="16" fill="#fee2e2" stroke="#f87171" stroke-width="2"/>
  <text x="620" y="215" text-anchor="middle" class="small">外部内容</text>
  <text x="620" y="238" text-anchor="middle" class="tiny">藏指令</text>

  <rect x="705" y="174" width="96" height="94" rx="18" fill="#dcfce7" stroke="#22c55e" stroke-width="2.5"/>
  <text x="753" y="214" text-anchor="middle" class="small">安全门</text>
  <text x="753" y="237" text-anchor="middle" class="tiny">先拦截</text>

  <rect x="815" y="180" width="65" height="82" rx="16" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2"/>
  <text x="847.5" y="228" text-anchor="middle" class="small">Agent</text>

  <line x1="680" y1="221" x2="705" y2="221" stroke="#16a34a" stroke-width="4" marker-end="url(#arrowGreen)"/>
  <line x1="801" y1="221" x2="815" y2="221" stroke="#16a34a" stroke-width="4" marker-end="url(#arrowGreen)"/>

  <path d="M753 268 L753 335" stroke="#16a34a" stroke-width="4" marker-end="url(#arrowGreen)"/>
  <rect x="680" y="345" width="146" height="88" rx="18" fill="#ffffff" stroke="#22c55e" stroke-width="2.5"/>
  <text x="753" y="380" text-anchor="middle" class="small">丢弃 / 重查 / 人审</text>

  <circle cx="847" cy="405" r="34" fill="#fff" stroke="#16a34a" stroke-width="3"/>
  <path d="M832 405 L843 416 L863 392" fill="none" stroke="#16a34a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="847" y="458" text-anchor="middle" class="tiny" fill="#16a34a">更早</text>

  <!-- Center compare -->
  <rect x="390" y="250" width="180" height="96" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="480" y="288" text-anchor="middle" class="small">Qwen3-14B</text>
  <text x="480" y="320" text-anchor="middle" class="label" fill="#111827">53% → 97%</text>

  <line x1="440" y1="298" x2="390" y2="298" stroke="#dc2626" stroke-width="3.5" marker-end="url(#arrowRed)"/>
  <line x1="520" y1="298" x2="570" y2="298" stroke="#16a34a" stroke-width="3.5" marker-end="url(#arrowGreen)"/>
</svg>