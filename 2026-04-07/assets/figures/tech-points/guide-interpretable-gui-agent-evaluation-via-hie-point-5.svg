<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#4B5563"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#2563EB"/>
    </marker>
    <style>
      .title{font:700 34px sans-serif; fill:#111827}
      .subtitle{font:500 18px sans-serif; fill:#6B7280}
      .label{font:700 20px sans-serif; fill:#111827}
      .small{font:600 17px sans-serif; fill:#374151}
      .tiny{font:600 15px sans-serif; fill:#4B5563}
      .box{fill:#FFFFFF; stroke:#D1D5DB; stroke-width:2}
      .bluebox{fill:#EFF6FF; stroke:#93C5FD; stroke-width:2.5}
      .greenbox{fill:#ECFDF5; stroke:#86EFAC; stroke-width:2.5}
      .redbox{fill:#FEF2F2; stroke:#FCA5A5; stroke-width:2.5}
      .graybox{fill:#F9FAFB; stroke:#D1D5DB; stroke-width:2}
      .dash{stroke:#9CA3AF; stroke-width:2.5; stroke-dasharray:8 7; fill:none}
      .arrow{stroke:#4B5563; stroke-width:3; fill:none; marker-end:url(#arrow)}
      .arrowBlue{stroke:#2563EB; stroke-width:4; fill:none; marker-end:url(#arrowBlue)}
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="720" fill="#FFFFFF"/>

  <text x="70" y="75" class="title">GUIDE：把评测变成调试工具</text>
  <text x="70" y="108" class="subtitle">不是只判成败，而是指出错在哪一段，方便直接改 Agent</text>

  <!-- Left: black-box evaluation -->
  <g>
    <rect x="70" y="165" rx="24" ry="24" width="300" height="430" class="graybox"/>
    <text x="100" y="210" class="label">传统整体打分</text>

    <rect x="105" y="255" rx="18" ry="18" width="230" height="70" class="box"/>
    <text x="142" y="300" class="small">长轨迹</text>
    <line x1="220" y1="325" x2="220" y2="360" class="arrow"/>

    <rect x="105" y="360" rx="18" ry="18" width="230" height="95" class="redbox"/>
    <text x="145" y="401" class="small">一次性判断</text>
    <text x="156" y="428" class="tiny">上下文一锅端</text>

    <line x1="220" y1="455" x2="220" y2="495" class="arrow"/>

    <rect x="105" y="495" rx="18" ry="18" width="230" height="70" class="redbox"/>
    <text x="160" y="539" class="small">只给“失败”</text>
  </g>

  <!-- Middle: GUIDE -->
  <g>
    <rect x="435" y="145" rx="28" ry="28" width="430" height="470" class="bluebox"/>
    <text x="610" y="188" text-anchor="middle" class="label" fill="#1D4ED8">GUIDE 分层诊断</text>

    <rect x="485" y="230" rx="18" ry="18" width="330" height="78" class="box"/>
    <text x="650" y="278" text-anchor="middle" class="small">切成子任务</text>

    <line x1="650" y1="308" x2="650" y2="350" class="arrowBlue"/>

    <rect x="485" y="350" rx="18" ry="18" width="330" height="108" class="greenbox"/>
    <text x="650" y="395" text-anchor="middle" class="small">逐段找根因</text>
    <text x="650" y="425" text-anchor="middle" class="tiny">找错对象 / 没验终态 / 恢复判断错</text>

    <line x1="650" y1="458" x2="650" y2="500" class="arrowBlue"/>

    <rect x="485" y="500" rx="18" ry="18" width="330" height="80" class="greenbox"/>
    <text x="650" y="548" text-anchor="middle" class="small">修正建议</text>
  </g>

  <!-- Right: actionable loop -->
  <g>
    <rect x="930" y="195" rx="24" ry="24" width="220" height="370" class="graybox"/>
    <text x="1040" y="240" text-anchor="middle" class="label">开发迭代</text>

    <rect x="970" y="285" rx="16" ry="16" width="140" height="62" class="box"/>
    <text x="1040" y="324" text-anchor="middle" class="small">Planner</text>

    <rect x="970" y="370" rx="16" ry="16" width="140" height="62" class="box"/>
    <text x="1040" y="409" text-anchor="middle" class="small">Perception</text>

    <rect x="970" y="455" rx="16" ry="16" width="140" height="62" class="box"/>
    <text x="1040" y="494" text-anchor="middle" class="small">Verifier</text>
  </g>

  <!-- Main arrows -->
  <path d="M370 380 C410 380, 410 380, 455 380" class="dash" marker-end="url(#arrow)"/>
  <path d="M865 540 C900 540, 905 540, 930 540" class="arrowBlue"/>

  <!-- Example callout -->
  <g>
    <rect x="455" y="630" rx="18" ry="18" width="610" height="58" fill="#FFF7ED" stroke="#FDBA74" stroke-width="2"/>
    <circle cx="490" cy="659" r="15" fill="#F97316"/>
    <text x="490" y="665" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">例</text>
    <text x="525" y="666" class="small" fill="#9A3412">“提交失败” 被定位成前面选错订单 → 加二次确认</text>
  </g>
</svg>