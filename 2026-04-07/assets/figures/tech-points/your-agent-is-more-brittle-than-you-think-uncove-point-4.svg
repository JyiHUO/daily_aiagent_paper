<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef4ff"/>
    </linearGradient>
    <linearGradient id="agentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="repeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#ddd6fe"/>
    </linearGradient>
    <linearGradient id="safeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="blockGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fee2e2"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#94a3b8" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#64748b"/>
    </marker>
    <marker id="arrowRed" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#dc2626"/>
    </marker>
    <marker id="arrowGreen" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#16a34a"/>
    </marker>
    <style>
      .title{font:700 34px "Arial","Helvetica",sans-serif; fill:#0f172a}
      .label{font:600 20px "Arial","Helvetica",sans-serif; fill:#1e293b}
      .small{font:600 17px "Arial","Helvetica",sans-serif; fill:#334155}
      .tiny{font:700 16px "Arial","Helvetica",sans-serif; fill:#475569}
      .num{font:700 18px "Arial","Helvetica",sans-serif; fill:#7c3aed}
    </style>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)"/>

  <text x="600" y="70" text-anchor="middle" class="title">RepE：在工具调用前看“内部状态”</text>

  <!-- Main flow -->
  <rect x="90" y="190" rx="28" ry="28" width="250" height="220" fill="url(#agentGrad)" stroke="#93c5fd" stroke-width="2" filter="url(#shadow)"/>
  <text x="215" y="245" text-anchor="middle" class="label">Agent 读外部内容</text>
  <rect x="130" y="280" rx="14" ry="14" width="170" height="84" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="215" y="318" text-anchor="middle" class="small">网页 / 邮件 / 记录</text>
  <text x="215" y="347" text-anchor="middle" class="tiny">恶意指令可藏在里面</text>

  <rect x="425" y="165" rx="30" ry="30" width="350" height="270" fill="url(#repeGrad)" stroke="#c4b5fd" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="220" text-anchor="middle" class="label">RepE 断路器</text>

  <!-- inner detector -->
  <ellipse cx="600" cy="315" rx="118" ry="62" fill="#ffffff" stroke="#a78bfa" stroke-width="2.5"/>
  <path d="M520 315 C548 278, 575 352, 600 315 C625 278, 652 352, 680 315" fill="none" stroke="#7c3aed" stroke-width="4" stroke-linecap="round"/>
  <circle cx="547" cy="315" r="5" fill="#7c3aed"/>
  <circle cx="600" cy="315" r="5" fill="#7c3aed"/>
  <circle cx="653" cy="315" r="5" fill="#7c3aed"/>
  <text x="600" y="388" text-anchor="middle" class="small">隐藏状态像不像“被劫持”</text>

  <text x="600" y="455" text-anchor="middle" class="num">AUC ≈ 0.996</text>

  <rect x="885" y="135" rx="24" ry="24" width="220" height="180" fill="url(#safeGrad)" stroke="#86efac" stroke-width="2" filter="url(#shadow)"/>
  <text x="995" y="195" text-anchor="middle" class="label">低风险</text>
  <circle cx="995" cy="245" r="34" fill="#ffffff" stroke="#22c55e" stroke-width="3"/>
  <path d="M980 246 L992 258 L1013 233" fill="none" stroke="#16a34a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="995" y="292" text-anchor="middle" class="small">放行工具</text>

  <rect x="885" y="375" rx="24" ry="24" width="220" height="180" fill="url(#blockGrad)" stroke="#fca5a5" stroke-width="2" filter="url(#shadow)"/>
  <text x="995" y="435" text-anchor="middle" class="label">高风险</text>
  <circle cx="995" cy="485" r="34" fill="#ffffff" stroke="#ef4444" stroke-width="3"/>
  <path d="M980 470 L1010 500 M1010 470 L980 500" stroke="#dc2626" stroke-width="6" stroke-linecap="round"/>
  <text x="995" y="532" text-anchor="middle" class="small">中止 / 人工确认</text>

  <!-- Arrows -->
  <path d="M340 300 C380 300, 395 300, 425 300" fill="none" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M775 280 C825 255, 842 245, 885 225" fill="none" stroke="#16a34a" stroke-width="4" marker-end="url(#arrowGreen)"/>
  <path d="M775 350 C825 390, 842 425, 885 465" fill="none" stroke="#dc2626" stroke-width="4" marker-end="url(#arrowRed)"/>

  <!-- callout comparison -->
  <rect x="105" y="515" rx="22" ry="22" width="670" height="160" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/>
  <text x="190" y="573" text-anchor="middle" class="label" fill="#64748b">表层过滤</text>
  <text x="190" y="620" text-anchor="middle" class="small" fill="#64748b">看词</text>

  <line x1="330" y1="540" x2="330" y2="650" stroke="#e2e8f0" stroke-width="3"/>

  <text x="545" y="573" text-anchor="middle" class="label" fill="#7c3aed">RepE</text>
  <text x="545" y="620" text-anchor="middle" class="small" fill="#7c3aed">看状态</text>

  <path d="M235 610 C260 585, 280 645, 300 610" fill="none" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <rect x="470" y="590" rx="18" ry="18" width="150" height="42" fill="#f5f3ff" stroke="#a78bfa" stroke-width="2"/>
  <path d="M490 611 C510 590, 525 632, 545 611 C565 590, 580 632, 600 611" fill="none" stroke="#7c3aed" stroke-width="4" stroke-linecap="round"/>

  <text x="935" y="655" text-anchor="middle" class="small" fill="#475569">在危险动作前断开</text>
</svg>