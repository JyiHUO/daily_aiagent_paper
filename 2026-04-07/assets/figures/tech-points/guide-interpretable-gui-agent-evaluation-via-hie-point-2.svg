<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#4B5563"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#2563EB"/>
    </marker>
    <style>
      .title{font:700 30px Arial, Helvetica, sans-serif; fill:#111827}
      .subtitle{font:400 16px Arial, Helvetica, sans-serif; fill:#6B7280}
      .label{font:700 20px Arial, Helvetica, sans-serif; fill:#111827}
      .small{font:600 16px Arial, Helvetica, sans-serif; fill:#374151}
      .tiny{font:600 15px Arial, Helvetica, sans-serif; fill:#4B5563}
    </style>
  </defs>

  <rect width="1200" height="700" fill="#F8FAFC"/>

  <text x="70" y="70" class="title">GUIDE：子任务级诊断</text>
  <text x="70" y="100" class="subtitle">不只判对错，而是给出“哪里错、为什么、怎么改”</text>

  <!-- Left: sub-task evidence -->
  <g>
    <rect x="70" y="150" rx="24" ry="24" width="300" height="430" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text x="100" y="195" class="label">子任务片段</text>

    <rect x="100" y="225" rx="14" ry="14" width="240" height="60" fill="#EEF2FF" stroke="#C7D2FE"/>
    <text x="120" y="262" class="small">目标：进入作者主页</text>

    <rect x="100" y="305" rx="14" ry="14" width="240" height="70" fill="#F9FAFB" stroke="#D1D5DB"/>
    <text x="120" y="335" class="small">动作序列</text>
    <text x="120" y="360" class="tiny">click user #2</text>

    <rect x="100" y="395" rx="14" ry="14" width="105" height="95" fill="#EFF6FF" stroke="#93C5FD"/>
    <rect x="217" y="395" rx="14" ry="14" width="123" height="95" fill="#EFF6FF" stroke="#93C5FD"/>
    <text x="120" y="448" class="small">过程图</text>
    <text x="245" y="448" class="small">结果图</text>

    <path d="M222 442 L200 442" stroke="#9CA3AF" stroke-width="3" marker-end="url(#arrow)"/>
  </g>

  <!-- Center: diagnosis engine -->
  <g>
    <rect x="450" y="205" rx="28" ry="28" width="300" height="320" fill="#DBEAFE" stroke="#60A5FA" stroke-width="3"/>
    <text x="520" y="255" class="label" fill="#1D4ED8">GUIDE 诊断器</text>

    <circle cx="600" cy="335" r="72" fill="#FFFFFF" stroke="#93C5FD" stroke-width="3"/>
    <path d="M560 335 L640 335 M600 295 L600 375" stroke="#60A5FA" stroke-width="5" stroke-linecap="round"/>
    <circle cx="600" cy="335" r="26" fill="none" stroke="#2563EB" stroke-width="5"/>

    <text x="518" y="445" class="small" fill="#1E3A8A">多模态联合判断</text>
  </g>

  <!-- Right: structured output -->
  <g>
    <rect x="830" y="150" rx="24" ry="24" width="300" height="430" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text x="860" y="195" class="label">结构化诊断</text>

    <rect x="860" y="225" rx="14" ry="14" width="240" height="70" fill="#FEF3C7" stroke="#F59E0B"/>
    <text x="885" y="268" class="small">verdict: partial / fail</text>

    <rect x="860" y="315" rx="14" ry="14" width="240" height="95" fill="#FEE2E2" stroke="#F87171"/>
    <text x="885" y="350" class="small">error: 点错用户 #2</text>
    <text x="885" y="376" class="tiny">根因可解释</text>

    <rect x="860" y="430" rx="14" ry="14" width="240" height="100" fill="#DCFCE7" stroke="#4ADE80"/>
    <text x="885" y="468" class="small">fix: 应点用户 #1</text>
    <text x="885" y="494" class="tiny">直接指导修复</text>
  </g>

  <!-- arrows -->
  <path d="M370 365 C405 365, 420 365, 450 365" fill="none" stroke="#4B5563" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M750 365 C785 365, 800 365, 830 365" fill="none" stroke="#2563EB" stroke-width="5" marker-end="url(#arrowBlue)"/>

  <!-- bottom comparison -->
  <g>
    <rect x="170" y="615" rx="14" ry="14" width="260" height="50" fill="#E5E7EB"/>
    <text x="208" y="646" class="small">旧评测：只给一个对/错</text>

    <rect x="520" y="615" rx="14" ry="14" width="430" height="50" fill="#DBEAFE"/>
    <text x="565" y="646" class="small" fill="#1E40AF">GUIDE：像老师批卷，给故障单</text>
  </g>
</svg>