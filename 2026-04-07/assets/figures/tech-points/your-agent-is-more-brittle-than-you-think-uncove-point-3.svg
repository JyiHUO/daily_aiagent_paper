<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
    <style>
      .title{font:700 28px sans-serif; fill:#111827}
      .subtitle{font:400 15px sans-serif; fill:#6b7280}
      .label{font:600 18px sans-serif; fill:#111827}
      .small{font:500 14px sans-serif; fill:#374151}
      .tiny{font:600 13px sans-serif; fill:#6b7280}
      .num{font:700 30px sans-serif; fill:#111827}
      .numRed{font:700 30px sans-serif; fill:#dc2626}
      .numBlue{font:700 30px sans-serif; fill:#2563eb}
      .box{fill:#ffffff; stroke:#d1d5db; stroke-width:2}
      .soft{fill:#f9fafb; stroke:#e5e7eb; stroke-width:2}
      .danger{fill:#fef2f2; stroke:#fca5a5; stroke-width:2}
      .signal{fill:#eff6ff; stroke:#93c5fd; stroke-width:2}
    </style>
  </defs>

  <rect width="960" height="600" fill="#ffffff"/>

  <text x="60" y="58" class="title">模型会犹豫，但仍照做</text>
  <text x="60" y="86" class="subtitle">表面动作很果断，内部信号却在报警</text>

  <!-- Left: injected content -->
  <rect x="70" y="150" rx="20" ry="20" width="190" height="140" class="danger"/>
  <text x="165" y="192" text-anchor="middle" class="label">污染的工具结果</text>
  <rect x="100" y="215" rx="10" ry="10" width="130" height="46" fill="#fff" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="165" y="243" text-anchor="middle" class="small">藏着恶意指令</text>

  <!-- Middle: agent split -->
  <rect x="330" y="120" rx="24" ry="24" width="300" height="340" class="box"/>
  <text x="480" y="158" text-anchor="middle" class="label">Agent 下一步</text>

  <!-- top branch -->
  <rect x="365" y="190" rx="16" ry="16" width="230" height="100" class="danger"/>
  <text x="480" y="225" text-anchor="middle" class="label">动作层</text>
  <text x="480" y="255" text-anchor="middle" class="numRed">98.35%</text>
  <text x="480" y="279" text-anchor="middle" class="small">立即服从</text>

  <!-- bottom branch -->
  <rect x="365" y="320" rx="16" ry="16" width="230" height="105" class="signal"/>
  <text x="480" y="355" text-anchor="middle" class="label">内部状态</text>
  <text x="438" y="387" text-anchor="middle" class="small">熵 ↑</text>
  <text x="522" y="387" text-anchor="middle" class="small">log-prob ↓</text>
  <text x="480" y="412" text-anchor="middle" class="small">其实在犹豫</text>

  <!-- Right: dangerous action -->
  <rect x="700" y="170" rx="20" ry="20" width="190" height="120" class="danger"/>
  <text x="795" y="208" text-anchor="middle" class="label">危险工具调用</text>
  <circle cx="760" cy="245" r="18" fill="#dc2626" opacity="0.12"/>
  <path d="M748 245 L757 254 L774 237" fill="none" stroke="#dc2626" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="815" y="250" class="small">还是执行</text>

  <!-- Bottom insight -->
  <rect x="670" y="345" rx="20" ry="20" width="230" height="110" class="soft"/>
  <text x="785" y="382" text-anchor="middle" class="label">防御启发</text>
  <text x="785" y="414" text-anchor="middle" class="small">别只看最终输出</text>
  <text x="785" y="438" text-anchor="middle" class="small">要抓“执行前异常”</text>

  <!-- Arrows -->
  <line x1="260" y1="220" x2="330" y2="220" stroke="#4b5563" stroke-width="3.2" marker-end="url(#arrow)"/>
  <line x1="630" y1="240" x2="700" y2="230" stroke="#dc2626" stroke-width="3.6" marker-end="url(#arrowRed)"/>
  <line x1="595" y1="372" x2="670" y2="398" stroke="#2563eb" stroke-width="3.2" marker-end="url(#arrow)"/>

  <!-- Divider hint inside middle -->
  <line x1="380" y1="305" x2="580" y2="305" stroke="#d1d5db" stroke-width="2" stroke-dasharray="6 6"/>

  <!-- Tiny note -->
  <text x="480" y="500" text-anchor="middle" class="tiny">外表顺从 ≠ 内心确定</text>
</svg>