<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="960" height="600" fill="#f8fafc"/>

  <text x="480" y="52" text-anchor="middle" font-size="30" font-weight="700" fill="#0f172a">真实场景更脆弱</text>
  <text x="480" y="82" text-anchor="middle" font-size="15" fill="#475569">坏指令不在用户输入，而藏在 Agent 读取的外部内容里</text>

  <!-- Left panel -->
  <rect x="50" y="120" width="390" height="400" rx="22" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/>
  <text x="245" y="155" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">单轮问答</text>

  <rect x="90" y="205" width="120" height="60" rx="14" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text x="150" y="242" text-anchor="middle" font-size="18" font-weight="600" fill="#1e3a8a">用户问题</text>

  <rect x="280" y="205" width="120" height="60" rx="14" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
  <text x="340" y="242" text-anchor="middle" font-size="18" font-weight="600" fill="#334155">LLM回复</text>

  <line x1="210" y1="235" x2="280" y2="235" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>

  <circle cx="245" cy="355" r="56" fill="#dcfce7" stroke="#4ade80" stroke-width="3"/>
  <text x="245" y="348" text-anchor="middle" font-size="20" font-weight="700" fill="#166534">只看</text>
  <text x="245" y="374" text-anchor="middle" font-size="20" font-weight="700" fill="#166534">回复</text>

  <text x="245" y="470" text-anchor="middle" font-size="16" fill="#64748b">看起来安全</text>

  <!-- Right panel -->
  <rect x="520" y="120" width="390" height="400" rx="22" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/>
  <text x="715" y="155" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Agent 多步执行</text>

  <rect x="555" y="205" width="95" height="58" rx="14" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text x="602.5" y="240" text-anchor="middle" font-size="17" font-weight="600" fill="#1e3a8a">提问</text>

  <rect x="690" y="185" width="165" height="98" rx="16" fill="#fee2e2" stroke="#f87171" stroke-width="2"/>
  <text x="772.5" y="214" text-anchor="middle" font-size="17" font-weight="700" fill="#991b1b">工具返回内容</text>
  <text x="772.5" y="246" text-anchor="middle" font-size="15" fill="#991b1b">交易备注里</text>
  <text x="772.5" y="266" text-anchor="middle" font-size="15" fill="#991b1b">藏了指令</text>

  <rect x="555" y="345" width="120" height="62" rx="14" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
  <text x="615" y="382" text-anchor="middle" font-size="18" font-weight="600" fill="#5b21b6">Agent</text>

  <rect x="745" y="345" width="120" height="62" rx="14" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="805" y="372" text-anchor="middle" font-size="16" font-weight="700" fill="#991b1b">危险工具</text>
  <text x="805" y="392" text-anchor="middle" font-size="14" fill="#991b1b">转账 / 泄露</text>

  <line x1="650" y1="234" x2="690" y2="234" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="772.5" y1="283" x2="650" y2="345" stroke="#dc2626" stroke-width="4" marker-end="url(#arrowRed)"/>
  <line x1="675" y1="376" x2="745" y2="376" stroke="#dc2626" stroke-width="4" marker-end="url(#arrowRed)"/>

  <text x="715" y="470" text-anchor="middle" font-size="16" fill="#64748b">读内容 → 被带偏 → 自己行动</text>

  <!-- Center divider cue -->
  <text x="480" y="324" text-anchor="middle" font-size="42" font-weight="700" fill="#94a3b8">≠</text>
</svg>