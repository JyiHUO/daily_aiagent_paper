<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4B5563"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16A34A"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#DC2626"/>
    </marker>
    <style>
      .title { font: 700 34px "Arial", "PingFang SC", "Microsoft YaHei", sans-serif; fill:#111827; }
      .subtitle { font: 500 18px "Arial", "PingFang SC", "Microsoft YaHei", sans-serif; fill:#6B7280; }
      .label { font: 700 20px "Arial", "PingFang SC", "Microsoft YaHei", sans-serif; fill:#111827; }
      .small { font: 600 18px "Arial", "PingFang SC", "Microsoft YaHei", sans-serif; fill:#374151; }
      .tiny { font: 600 16px "Arial", "PingFang SC", "Microsoft YaHei", sans-serif; fill:#4B5563; }
      .ok { font: 700 22px "Arial", "PingFang SC", "Microsoft YaHei", sans-serif; fill:#16A34A; }
      .bad { font: 700 22px "Arial", "PingFang SC", "Microsoft YaHei", sans-serif; fill:#DC2626; }
    </style>
  </defs>

  <rect width="1200" height="720" fill="#F8FAFC"/>

  <text x="70" y="70" class="title">工具不是万能加成</text>
  <text x="70" y="104" class="subtitle">更像：强模型经验 → 打包给弱模型</text>

  <!-- center tool -->
  <rect x="460" y="255" width="280" height="210" rx="28" fill="#E0E7FF" stroke="#6366F1" stroke-width="3"/>
  <rect x="495" y="290" width="210" height="46" rx="12" fill="#C7D2FE" stroke="#6366F1" stroke-width="2"/>
  <text x="600" y="320" text-anchor="middle" class="label">合成工具</text>

  <rect x="515" y="355" width="170" height="78" rx="14" fill="#FFFFFF" stroke="#A5B4FC" stroke-width="2"/>
  <path d="M540 380 h120" stroke="#818CF8" stroke-width="5" stroke-linecap="round"/>
  <path d="M540 395 h95" stroke="#818CF8" stroke-width="5" stroke-linecap="round"/>
  <path d="M540 410 h110" stroke="#818CF8" stroke-width="5" stroke-linecap="round"/>
  <text x="600" y="450" text-anchor="middle" class="tiny">固定操作套路</text>

  <!-- top builder -->
  <rect x="470" y="135" width="260" height="78" rx="20" fill="#FEF3C7" stroke="#F59E0B" stroke-width="3"/>
  <text x="600" y="182" text-anchor="middle" class="label">强模型构建</text>
  <line x1="600" y1="213" x2="600" y2="255" stroke="#4B5563" stroke-width="4" marker-end="url(#arrow)"/>

  <!-- left weak user -->
  <rect x="90" y="220" width="250" height="280" rx="26" fill="#ECFDF5" stroke="#22C55E" stroke-width="3"/>
  <text x="215" y="265" text-anchor="middle" class="label">弱模型使用</text>

  <circle cx="215" cy="340" r="42" fill="#BBF7D0" stroke="#22C55E" stroke-width="2.5"/>
  <circle cx="200" cy="332" r="5" fill="#166534"/>
  <circle cx="230" cy="332" r="5" fill="#166534"/>
  <path d="M197 355 Q215 372 233 355" fill="none" stroke="#166534" stroke-width="4" stroke-linecap="round"/>
  <path d="M145 420 C170 395, 260 395, 285 420" fill="none" stroke="#22C55E" stroke-width="10" stroke-linecap="round"/>
  <text x="215" y="455" text-anchor="middle" class="ok">通常提升</text>

  <line x1="340" y1="360" x2="460" y2="360" stroke="#16A34A" stroke-width="5" marker-end="url(#arrowGreen)"/>

  <!-- right strong user -->
  <rect x="860" y="220" width="250" height="280" rx="26" fill="#FEF2F2" stroke="#EF4444" stroke-width="3"/>
  <text x="985" y="265" text-anchor="middle" class="label">强模型使用</text>

  <circle cx="985" cy="340" r="42" fill="#FECACA" stroke="#EF4444" stroke-width="2.5"/>
  <circle cx="970" cy="332" r="5" fill="#7F1D1D"/>
  <circle cx="1000" cy="332" r="5" fill="#7F1D1D"/>
  <path d="M970 362 Q985 350 1000 362" fill="none" stroke="#7F1D1D" stroke-width="4" stroke-linecap="round"/>
  <path d="M915 420 C940 395, 1030 395, 1055 420" fill="none" stroke="#EF4444" stroke-width="10" stroke-linecap="round"/>
  <text x="985" y="455" text-anchor="middle" class="bad">收益不稳</text>

  <line x1="740" y1="360" x2="860" y2="360" stroke="#DC2626" stroke-width="5" marker-end="url(#arrowRed)"/>

  <!-- bottom takeaway -->
  <rect x="300" y="560" width="600" height="92" rx="22" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2.5"/>
  <text x="600" y="598" text-anchor="middle" class="label">单向能力蒸馏</text>
  <text x="600" y="630" text-anchor="middle" class="small">强 → 弱 更有效；强 → 强 可能受限</text>
</svg>