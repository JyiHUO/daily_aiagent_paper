<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      .title{font:700 34px Arial,Helvetica,sans-serif; fill:#1f2937}
      .subtitle{font:600 20px Arial,Helvetica,sans-serif; fill:#374151}
      .label{font:700 20px Arial,Helvetica,sans-serif; fill:#111827}
      .small{font:600 18px Arial,Helvetica,sans-serif; fill:#4b5563}
      .tiny{font:600 16px Arial,Helvetica,sans-serif; fill:#6b7280}
      .pct{font:700 24px Arial,Helvetica,sans-serif}
      .box{fill:#ffffff; stroke:#d1d5db; stroke-width:2}
      .soft{fill:#f8fafc; stroke:#cbd5e1; stroke-width:2}
      .red{fill:#fff1f2; stroke:#fda4af; stroke-width:2}
      .green{fill:#ecfdf5; stroke:#86efac; stroke-width:2}
      .blue{fill:#eff6ff; stroke:#93c5fd; stroke-width:2}
      .arrow{stroke:#6b7280; stroke-width:4; fill:none; marker-end:url(#m)}
      .dash{stroke:#9ca3af; stroke-width:3; stroke-dasharray:8 8; fill:none}
    </style>
    <marker id="m" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#6b7280"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="#ffffff"/>

  <text x="600" y="60" text-anchor="middle" class="title">GUIDE：长轨迹更稳</text>
  <text x="600" y="95" text-anchor="middle" class="subtitle">别一次看 60 步，拆成几段看</text>

  <!-- Left: whole trajectory -->
  <rect x="60" y="145" rx="24" ry="24" width="430" height="520" class="red"/>
  <text x="275" y="185" text-anchor="middle" class="label" fill="#be123c">整体式评测</text>
  <text x="275" y="215" text-anchor="middle" class="small">一口气看完整轨迹</text>

  <rect x="105" y="260" rx="16" ry="16" width="340" height="90" fill="#ffffff" stroke="#fda4af" stroke-width="2"/>
  <g transform="translate(125,288)">
    <rect x="0" y="0" width="34" height="34" rx="8" fill="#e5e7eb"/>
    <rect x="42" y="0" width="34" height="34" rx="8" fill="#dbeafe"/>
    <rect x="84" y="0" width="34" height="34" rx="8" fill="#e5e7eb"/>
    <rect x="126" y="0" width="34" height="34" rx="8" fill="#dbeafe"/>
    <rect x="168" y="0" width="34" height="34" rx="8" fill="#e5e7eb"/>
    <text x="222" y="25" class="label" fill="#ef4444">...</text>
    <rect x="258" y="0" width="34" height="34" rx="8" fill="#dbeafe"/>
    <rect x="300" y="0" width="34" height="34" rx="8" fill="#e5e7eb"/>
  </g>

  <rect x="135" y="405" rx="22" ry="22" width="280" height="120" fill="#fee2e2" stroke="#fb7185" stroke-width="2.5"/>
  <text x="275" y="450" text-anchor="middle" class="label" fill="#b91c1c">长了就看乱</text>
  <text x="275" y="490" text-anchor="middle" class="pct" fill="#b91c1c">92.9% → 75.0%</text>

  <path d="M275 350 L275 395" class="arrow"/>

  <!-- Center split -->
  <rect x="510" y="230" rx="22" ry="22" width="180" height="350" class="blue"/>
  <text x="600" y="280" text-anchor="middle" class="label" fill="#1d4ed8">GUIDE</text>
  <text x="600" y="312" text-anchor="middle" class="small">先切段</text>

  <g transform="translate(548,355)">
    <rect x="0" y="0" width="104" height="26" rx="8" fill="#bfdbfe"/>
    <rect x="0" y="38" width="104" height="26" rx="8" fill="#bfdbfe"/>
    <rect x="0" y="76" width="104" height="26" rx="8" fill="#bfdbfe"/>
    <rect x="0" y="114" width="104" height="26" rx="8" fill="#bfdbfe"/>
    <text x="118" y="20" class="tiny">~10步</text>
    <text x="118" y="58" class="tiny">~10步</text>
    <text x="118" y="96" class="tiny">~10步</text>
    <text x="118" y="134" class="tiny">...</text>
  </g>

  <path d="M490 405 L500 405" class="arrow"/>
  <path d="M700 405 L710 405" class="arrow"/>

  <!-- Right: stable -->
  <rect x="730" y="145" rx="24" ry="24" width="410" height="520" class="green"/>
  <text x="935" y="185" text-anchor="middle" class="label" fill="#15803d">分段诊断</text>
  <text x="935" y="215" text-anchor="middle" class="small">每次只看一小段</text>

  <rect x="785" y="260" rx="16" ry="16" width="300" height="90" fill="#ffffff" stroke="#86efac" stroke-width="2"/>
  <g transform="translate(805,288)">
    <rect x="0" y="0" width="52" height="34" rx="8" fill="#bbf7d0"/>
    <rect x="62" y="0" width="52" height="34" rx="8" fill="#bbf7d0"/>
    <rect x="124" y="0" width="52" height="34" rx="8" fill="#bbf7d0"/>
    <rect x="186" y="0" width="52" height="34" rx="8" fill="#bbf7d0"/>
    <text x="252" y="24" class="tiny">小负担</text>
  </g>

  <rect x="785" y="390" rx="22" ry="22" width="300" height="135" fill="#dcfce7" stroke="#4ade80" stroke-width="2.5"/>
  <text x="935" y="435" text-anchor="middle" class="label" fill="#166534">长度不拖垮</text>
  <text x="935" y="478" text-anchor="middle" class="pct" fill="#166534">93.2% – 97.6%</text>

  <!-- Tiny trend icons -->
  <g transform="translate(120,600)">
    <text x="0" y="0" class="tiny">长轨迹</text>
    <line x1="70" y1="-8" x2="170" y2="-8" class="dash"/>
    <polyline points="190,-30 240,-18 290,10 340,24" fill="none" stroke="#e11d48" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="760,-16 810,-12 860,-10 910,-14" fill="none" stroke="#16a34a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="935" y="610" text-anchor="middle" class="small" fill="#166534">总体 95.8%</text>
</svg>