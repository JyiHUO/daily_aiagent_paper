<svg xmlns="http://www.w3.org/2000/svg" width="980" height="620" viewBox="0 0 980 620">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="980" height="620" fill="#f8fafc"/>

  <text x="490" y="58" text-anchor="middle" font-size="28" font-weight="700" fill="#0f172a">JailAgent：更像“隐蔽劫持”</text>
  <text x="490" y="88" text-anchor="middle" font-size="15" fill="#475569">攻击更强，但正常任务看起来还在运转</text>

  <!-- Left panel -->
  <rect x="60" y="130" rx="22" ry="22" width="390" height="400" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" filter="url(#shadow)"/>
  <text x="255" y="170" text-anchor="middle" font-size="24" font-weight="700" fill="#334155">传统 Prompt 攻击</text>

  <rect x="115" y="215" rx="16" ry="16" width="280" height="78" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text x="255" y="245" text-anchor="middle" font-size="18" font-weight="600" fill="#991b1b">奇怪提示词</text>
  <text x="255" y="270" text-anchor="middle" font-size="15" fill="#7f1d1d">容易被看见</text>

  <line x1="255" y1="293" x2="255" y2="342" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="115" y="345" rx="16" ry="16" width="280" height="95" fill="#fef2f2" stroke="#fecaca" stroke-width="2"/>
  <text x="255" y="378" text-anchor="middle" font-size="18" font-weight="700" fill="#b91c1c">系统明显跑偏</text>
  <text x="255" y="406" text-anchor="middle" font-size="15" fill="#7f1d1d">任务表现也掉</text>

  <circle cx="120" cy="472" r="14" fill="#ef4444"/>
  <path d="M113 465 L127 479 M127 465 L113 479" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
  <text x="145" y="478" font-size="17" fill="#991b1b" font-weight="600">易检测</text>

  <!-- Right panel -->
  <rect x="530" y="130" rx="22" ry="22" width="390" height="400" fill="#ffffff" stroke="#dbeafe" stroke-width="2" filter="url(#shadow)"/>
  <text x="725" y="170" text-anchor="middle" font-size="24" font-weight="700" fill="#1e3a8a">JailAgent</text>

  <rect x="585" y="205" rx="16" ry="16" width="280" height="78" fill="#dbeafe" stroke="#93c5fd" stroke-width="2"/>
  <text x="725" y="236" text-anchor="middle" font-size="18" font-weight="700" fill="#1d4ed8">劫持推理 / 检索链路</text>
  <text x="725" y="261" text-anchor="middle" font-size="15" fill="#1e40af">不盯着用户输入框</text>

  <line x1="725" y1="283" x2="725" y2="332" stroke="#60a5fa" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="585" y="336" rx="16" ry="16" width="280" height="104" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
  <text x="725" y="369" text-anchor="middle" font-size="18" font-weight="700" fill="#1e3a8a">看起来仍在正常回答</text>
  <text x="725" y="396" text-anchor="middle" font-size="15" fill="#1e40af">ASR 更高</text>
  <text x="725" y="420" text-anchor="middle" font-size="15" fill="#1e40af">原任务指标接近正常</text>

  <circle cx="590" cy="472" r="14" fill="#22c55e"/>
  <path d="M583 472 L588 477 L598 465" stroke="#ffffff" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="615" y="478" font-size="17" fill="#166534" font-weight="600">更隐蔽</text>

  <!-- Middle compare arrow -->
  <line x1="450" y1="330" x2="530" y2="330" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="490" y="314" text-anchor="middle" font-size="16" font-weight="700" fill="#334155">关键差别</text>

  <!-- Bottom stat strip -->
  <rect x="140" y="548" rx="18" ry="18" width="700" height="46" fill="#0f172a"/>
  <text x="490" y="578" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">跨 3类Agent / 7个LLM / 8个数据集：更强攻击，更少“打崩系统”</text>
</svg>