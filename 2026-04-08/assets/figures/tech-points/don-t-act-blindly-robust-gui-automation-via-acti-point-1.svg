<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#4B5563"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#DC2626"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#059669"/>
    </marker>
    <style>
      .title{font:700 34px "Arial","PingFang SC","Microsoft YaHei",sans-serif; fill:#111827}
      .subtitle{font:600 18px "Arial","PingFang SC","Microsoft YaHei",sans-serif; fill:#6B7280}
      .head{font:700 24px "Arial","PingFang SC","Microsoft YaHei",sans-serif; fill:#111827}
      .label{font:600 20px "Arial","PingFang SC","Microsoft YaHei",sans-serif; fill:#111827}
      .small{font:600 18px "Arial","PingFang SC","Microsoft YaHei",sans-serif; fill:#374151}
      .tiny{font:600 17px "Arial","PingFang SC","Microsoft YaHei",sans-serif; fill:#4B5563}
    </style>
  </defs>

  <rect width="1280" height="760" fill="#F8FAFC"/>

  <text x="640" y="60" text-anchor="middle" class="title">先验后验闭环</text>
  <text x="640" y="92" text-anchor="middle" class="subtitle">先预测“应该怎么变”，下一帧再核验</text>

  <!-- Left: blind agent -->
  <g>
    <rect x="70" y="140" rx="24" ry="24" width="470" height="540" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="2"/>
    <text x="305" y="180" text-anchor="middle" class="head">盲执行</text>

    <rect x="120" y="230" rx="18" ry="18" width="150" height="110" fill="#FFFFFF" stroke="#F87171" stroke-width="2"/>
    <text x="195" y="294" text-anchor="middle" class="label">点 App</text>

    <rect x="340" y="230" rx="18" ry="18" width="150" height="110" fill="#FFFFFF" stroke="#F87171" stroke-width="2"/>
    <text x="415" y="294" text-anchor="middle" class="label">还是桌面</text>

    <line x1="270" y1="285" x2="340" y2="285" stroke="#DC2626" stroke-width="5" marker-end="url(#arrowRed)"/>

    <path d="M415,340 C500,385 500,500 415,545" fill="none" stroke="#DC2626" stroke-width="5" marker-end="url(#arrowRed)"/>
    <path d="M340,545 C255,500 255,385 340,340" fill="none" stroke="#DC2626" stroke-width="5" marker-end="url(#arrowRed)"/>

    <rect x="290" y="395" rx="14" ry="14" width="175" height="95" fill="#FFF1F2" stroke="#EF4444" stroke-width="2"/>
    <text x="377.5" y="452" text-anchor="middle" class="small">重复点击</text>
  </g>

  <!-- Divider -->
  <line x1="640" y1="130" x2="640" y2="690" stroke="#CBD5E1" stroke-width="3" stroke-dasharray="10 10"/>

  <!-- Right: VeriGUI -->
  <g>
    <rect x="720" y="140" rx="24" ry="24" width="490" height="540" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
    <text x="965" y="180" text-anchor="middle" class="head">VeriGUI 闭环</text>

    <rect x="760" y="225" rx="18" ry="18" width="180" height="120" fill="#FFFFFF" stroke="#60A5FA" stroke-width="2.5"/>
    <text x="850" y="278" text-anchor="middle" class="label">动作</text>
    <text x="850" y="308" text-anchor="middle" class="tiny">点 App</text>

    <rect x="990" y="225" rx="18" ry="18" width="180" height="120" fill="#FFFFFF" stroke="#60A5FA" stroke-width="2.5"/>
    <text x="1080" y="278" text-anchor="middle" class="label">预期效果</text>
    <text x="1080" y="308" text-anchor="middle" class="tiny">应进首页</text>

    <line x1="940" y1="285" x2="990" y2="285" stroke="#2563EB" stroke-width="5" marker-end="url(#arrowBlue)"/>

    <rect x="850" y="415" rx="20" ry="20" width="190" height="120" fill="#FFFFFF" stroke="#3B82F6" stroke-width="3"/>
    <text x="945" y="465" text-anchor="middle" class="label">核验</text>
    <text x="945" y="497" text-anchor="middle" class="tiny">下一帧对比上一步预期</text>

    <line x1="1080" y1="345" x2="1010" y2="415" stroke="#2563EB" stroke-width="5" marker-end="url(#arrowBlue)"/>

    <!-- outcomes -->
    <path d="M850,475 C790,475 780,550 820,585" fill="none" stroke="#DC2626" stroke-width="5" marker-end="url(#arrowRed)"/>
    <rect x="740" y="575" rx="16" ry="16" width="180" height="70" fill="#FEF2F2" stroke="#F87171" stroke-width="2"/>
    <text x="830" y="619" text-anchor="middle" class="small">NO-CHANGE → 重试</text>

    <path d="M1040,475 C1110,475 1130,550 1090,585" fill="none" stroke="#059669" stroke-width="5" marker-end="url(#arrowGreen)"/>
    <rect x="980" y="575" rx="16" ry="16" width="180" height="70" fill="#ECFDF5" stroke="#34D399" stroke-width="2"/>
    <text x="1070" y="619" text-anchor="middle" class="small">SUCCESS → 下一步</text>

    <!-- feedback arrow from expectation to next verification idea -->
    <path d="M1080,225 C1080,170 835,170 850,225" fill="none" stroke="#94A3B8" stroke-width="3" stroke-dasharray="8 8"/>
  </g>
</svg>