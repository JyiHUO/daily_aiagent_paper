<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .title{font:700 34px Arial, Helvetica, sans-serif; fill:#0f172a}
      .subtitle{font:500 18px Arial, Helvetica, sans-serif; fill:#475569}
      .label{font:700 20px Arial, Helvetica, sans-serif; fill:#0f172a}
      .small{font:600 16px Arial, Helvetica, sans-serif; fill:#334155}
      .tiny{font:600 15px Arial, Helvetica, sans-serif; fill:#475569}
    </style>
  </defs>

  <rect width="1200" height="760" fill="#f8fafc"/>

  <text x="600" y="58" text-anchor="middle" class="title">高仿真工作空间：先在“假办公室”里做，再按状态验收</text>
  <text x="600" y="88" text-anchor="middle" class="subtitle">核心创新：不碰真实服务，用可重置的仿真办公套件评测 Agent</text>

  <!-- Left: real world risk -->
  <g filter="url(#shadow)">
    <rect x="70" y="150" rx="28" ry="28" width="250" height="470" fill="#fff1f2" stroke="#fda4af" stroke-width="2.5"/>
  </g>
  <text x="195" y="190" text-anchor="middle" class="label">真实办公软件</text>

  <!-- real app icons -->
  <g transform="translate(120,230)">
    <rect x="0" y="0" width="150" height="56" rx="14" fill="#ffffff" stroke="#fecdd3" stroke-width="2"/>
    <rect x="0" y="82" width="150" height="56" rx="14" fill="#ffffff" stroke="#fecdd3" stroke-width="2"/>
    <rect x="0" y="164" width="150" height="56" rx="14" fill="#ffffff" stroke="#fecdd3" stroke-width="2"/>

    <g transform="translate(16,14)">
      <rect x="0" y="0" width="26" height="18" rx="3" fill="#ef4444"/>
      <path d="M0 2 L13 11 L26 2" stroke="#fff" stroke-width="2" fill="none"/>
      <text x="42" y="15" class="small">邮件 / 日历 / 文档</text>
    </g>
    <g transform="translate(16,96)">
      <rect x="0" y="0" width="26" height="18" rx="3" fill="#8b5cf6"/>
      <path d="M5 5 H21 M5 9 H18 M5 13 H14" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
      <text x="42" y="15" class="small">在线协作 / 网盘</text>
    </g>
    <g transform="translate(16,178)">
      <circle cx="13" cy="9" r="10" fill="#f43f5e"/>
      <path d="M9 9 L12 12 L18 6" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="42" y="15" class="small">误操作不可逆</text>
    </g>
  </g>

  <!-- danger sign -->
  <g transform="translate(195,560)">
    <polygon points="0,-26 30,26 -30,26" fill="#fb7185"/>
    <rect x="-3" y="-10" width="6" height="16" rx="2" fill="#fff"/>
    <circle cx="0" cy="12" r="3.5" fill="#fff"/>
  </g>

  <!-- Middle sandbox -->
  <g filter="url(#shadow)">
    <rect x="390" y="128" rx="34" ry="34" width="430" height="515" fill="#ecfeff" stroke="#67e8f9" stroke-width="3"/>
  </g>
  <text x="605" y="172" text-anchor="middle" class="label">ClawsBench 沙盒工作空间</text>

  <!-- sandbox service cluster -->
  <g transform="translate(442,230)">
    <rect x="0" y="0" width="320" height="200" rx="26" fill="#ffffff" stroke="#bae6fd" stroke-width="2.5"/>
    <!-- 5 services -->
    <g transform="translate(22,24)">
      <rect x="0" y="0" width="82" height="52" rx="14" fill="#fee2e2"/>
      <text x="41" y="32" text-anchor="middle" class="small">Gmail</text>

      <rect x="108" y="0" width="82" height="52" rx="14" fill="#ede9fe"/>
      <text x="149" y="32" text-anchor="middle" class="small">Slack</text>

      <rect x="216" y="0" width="82" height="52" rx="14" fill="#dcfce7"/>
      <text x="257" y="32" text-anchor="middle" class="small">Calendar</text>

      <rect x="54" y="84" width="82" height="52" rx="14" fill="#fef3c7"/>
      <text x="95" y="116" text-anchor="middle" class="small">Docs</text>

      <rect x="162" y="84" width="82" height="52" rx="14" fill="#dbeafe"/>
      <text x="203" y="116" text-anchor="middle" class="small">Drive</text>
    </g>
  </g>

  <!-- sandbox base -->
  <g transform="translate(462,465)">
    <rect x="0" y="0" width="280" height="70" rx="18" fill="#cffafe" stroke="#22d3ee" stroke-width="2"/>
    <ellipse cx="42" cy="35" rx="18" ry="22" fill="#0891b2"/>
    <rect x="42" y="13" width="180" height="44" fill="#06b6d4"/>
    <ellipse cx="222" cy="35" rx="18" ry="22" fill="#0891b2"/>
    <text x="140" y="43" text-anchor="middle" fill="#ffffff" class="small">SQLite 状态</text>
  </g>

  <!-- sandbox badges -->
  <g transform="translate(430,585)">
    <rect x="0" y="0" width="120" height="34" rx="17" fill="#ffffff" stroke="#67e8f9" stroke-width="2"/>
    <text x="60" y="22" text-anchor="middle" class="tiny">REST API</text>
    <rect x="136" y="0" width="128" height="34" rx="17" fill="#ffffff" stroke="#67e8f9" stroke-width="2"/>
    <text x="200" y="22" text-anchor="middle" class="tiny">快照 / 恢复</text>
    <rect x="280" y="0" width="122" height="34" rx="17" fill="#ffffff" stroke="#67e8f9" stroke-width="2"/>
    <text x="341" y="22" text-anchor="middle" class="tiny">可重复</text>
  </g>

  <!-- Right evaluator -->
  <g filter="url(#shadow)">
    <rect x="890" y="180" rx="28" ry="28" width="240" height="390" fill="#f0fdf4" stroke="#86efac" stroke-width="2.5"/>
  </g>
  <text x="1010" y="220" text-anchor="middle" class="label">Evaluator</text>

  <g transform="translate(930,265)">
    <rect x="0" y="0" width="160" height="64" rx="16" fill="#ffffff" stroke="#bbf7d0" stroke-width="2"/>
    <text x="80" y="39" text-anchor="middle" class="small">任务前状态</text>

    <rect x="0" y="94" width="160" height="64" rx="16" fill="#ffffff" stroke="#bbf7d0" stroke-width="2"/>
    <text x="80" y="133" text-anchor="middle" class="small">任务后状态</text>

    <rect x="0" y="210" width="160" height="78" rx="18" fill="#dcfce7" stroke="#4ade80" stroke-width="2.5"/>
    <text x="80" y="242" text-anchor="middle" class="small">看数据库变化</text>
    <text x="80" y="267" text-anchor="middle" class="tiny">不是看嘴上回答</text>
  </g>

  <!-- Arrows -->
  <line x1="335" y1="385" x2="372" y2="385" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="835" y1="385" x2="872" y2="385" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>

  <!-- Agent bubble -->
  <g filter="url(#shadow)">
    <rect x="500" y="96" rx="20" ry="20" width="210" height="52" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  </g>
  <text x="605" y="129" text-anchor="middle" class="small">Agent 在这里调用工具</text>
  <line x1="605" y1="148" x2="605" y2="206" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Example strip -->
  <g transform="translate(100,665)">
    <rect x="0" y="0" width="1000" height="60" rx="18" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <text x="28" y="38" class="small">例：读邮件</text>
    <path d="M150 30 H255" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="280" y="38" class="small">发 Slack 摘要</text>
    <path d="M430 30 H535" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="560" y="38" class="small">检查频道 / 内容 / 对象</text>
  </g>
</svg>