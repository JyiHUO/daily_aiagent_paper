<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#4B5563"/>
    </marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#DC2626"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#059669"/>
    </marker>
    <style>
      .title{font:700 34px Arial, sans-serif; fill:#111827}
      .subtitle{font:500 18px Arial, sans-serif; fill:#4B5563}
      .label{font:700 24px Arial, sans-serif; fill:#111827}
      .small{font:600 18px Arial, sans-serif; fill:#374151}
      .tiny{font:600 16px Arial, sans-serif; fill:#6B7280}
    </style>
  </defs>

  <rect width="1200" height="720" fill="#F8FAFC"/>

  <text x="600" y="58" text-anchor="middle" class="title">风险常出在系统层</text>
  <text x="600" y="88" text-anchor="middle" class="subtitle">同一个模型，不同 harness，风险轮廓可完全不同</text>

  <!-- center model -->
  <g>
    <rect x="500" y="150" width="200" height="90" rx="22" fill="#E0E7FF" stroke="#6366F1" stroke-width="3"/>
    <text x="600" y="205" text-anchor="middle" class="label">同一个 Agent</text>
  </g>

  <!-- left safe side -->
  <g>
    <rect x="110" y="290" width="380" height="280" rx="28" fill="#ECFDF5" stroke="#10B981" stroke-width="3"/>
    <text x="300" y="335" text-anchor="middle" class="label" fill="#065F46">严格 harness</text>

    <rect x="170" y="385" width="120" height="72" rx="16" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
    <text x="230" y="430" text-anchor="middle" class="small">权限收紧</text>

    <rect x="310" y="385" width="120" height="72" rx="16" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
    <text x="370" y="430" text-anchor="middle" class="small">强确认</text>

    <path d="M205 510 C235 545, 365 545, 395 510" fill="none" stroke="#059669" stroke-width="6" marker-end="url(#arrowGreen)"/>
    <text x="300" y="545" text-anchor="middle" class="small" fill="#065F46">危险操作被拦住</text>
  </g>

  <!-- right risky side -->
  <g>
    <rect x="710" y="290" width="380" height="280" rx="28" fill="#FEF2F2" stroke="#EF4444" stroke-width="3"/>
    <text x="900" y="335" text-anchor="middle" class="label" fill="#991B1B">fail-open harness</text>

    <rect x="770" y="385" width="120" height="72" rx="16" fill="#FEE2E2" stroke="#EF4444" stroke-width="2"/>
    <text x="830" y="430" text-anchor="middle" class="small">默认放行</text>

    <rect x="910" y="385" width="120" height="72" rx="16" fill="#FEE2E2" stroke="#EF4444" stroke-width="2"/>
    <text x="970" y="430" text-anchor="middle" class="small">边界可探测</text>

    <path d="M805 510 C835 545, 965 545, 995 510" fill="none" stroke="#DC2626" stroke-width="6" marker-end="url(#arrowRed)"/>
    <text x="900" y="545" text-anchor="middle" class="small" fill="#991B1B">风险被放大</text>
  </g>

  <!-- arrows from model -->
  <path d="M540 240 C480 270, 410 285, 335 300" fill="none" stroke="#059669" stroke-width="5" marker-end="url(#arrowGreen)"/>
  <path d="M660 240 C720 270, 790 285, 865 300" fill="none" stroke="#DC2626" stroke-width="5" marker-end="url(#arrowRed)"/>

  <!-- bottom example strip -->
  <g>
    <rect x="220" y="615" width="760" height="64" rx="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text x="260" y="655" class="tiny">例：枚举环境变量 / curl localhost / 读额外数据源</text>
    <text x="860" y="655" class="tiny" text-anchor="end">拦住 or 继续推进</text>
  </g>
</svg>