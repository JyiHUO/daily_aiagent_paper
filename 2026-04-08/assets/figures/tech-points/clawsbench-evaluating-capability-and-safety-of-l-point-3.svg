<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4B5563"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0F9D58"/>
    </marker>
    <style>
      .title{font:700 30px Arial, Helvetica, sans-serif; fill:#111827}
      .subtitle{font:500 16px Arial, Helvetica, sans-serif; fill:#6B7280}
      .label{font:700 18px Arial, Helvetica, sans-serif; fill:#111827}
      .small{font:600 15px Arial, Helvetica, sans-serif; fill:#374151}
      .num{font:700 16px Arial, Helvetica, sans-serif; fill:#ffffff}
    </style>
  </defs>

  <rect width="960" height="560" fill="#F8FAFC"/>

  <text x="480" y="48" text-anchor="middle" class="title">脚手架决定上限</text>
  <text x="480" y="76" text-anchor="middle" class="subtitle">同一个模型，给“分层工具手册 + 行动守则”，任务成功率大幅抬升</text>

  <!-- Left panel -->
  <rect x="70" y="130" rx="24" ry="24" width="320" height="350" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="2"/>
  <text x="230" y="172" text-anchor="middle" class="label">无脚手架</text>

  <rect x="125" y="220" rx="18" ry="18" width="210" height="88" fill="#FFFFFF" stroke="#FCA5A5" stroke-width="2"/>
  <text x="230" y="255" text-anchor="middle" class="small">Agent</text>
  <text x="230" y="282" text-anchor="middle" class="small">猜命令 / 早停</text>

  <rect x="125" y="355" rx="18" ry="18" width="210" height="72" fill="#FFF7F7" stroke="#FCA5A5" stroke-width="2"/>
  <text x="230" y="398" text-anchor="middle" class="small">TSR 0–8%</text>

  <line x1="230" y1="308" x2="230" y2="347" stroke="#EF4444" stroke-width="4" marker-end="url(#arrow)"/>
  <circle cx="352" cy="242" r="18" fill="#EF4444"/>
  <text x="352" y="248" text-anchor="middle" class="num">×</text>

  <!-- Right panel -->
  <rect x="430" y="130" rx="24" ry="24" width="460" height="350" fill="#ECFDF5" stroke="#86EFAC" stroke-width="2"/>
  <text x="660" y="172" text-anchor="middle" class="label">全脚手架</text>

  <!-- Skills -->
  <rect x="465" y="210" rx="18" ry="18" width="150" height="110" fill="#D1FAE5" stroke="#34D399" stroke-width="2"/>
  <text x="540" y="245" text-anchor="middle" class="small">Skills</text>
  <text x="540" y="272" text-anchor="middle" class="small">分层手册</text>

  <!-- Meta prompt -->
  <rect x="705" y="210" rx="18" ry="18" width="150" height="110" fill="#DBEAFE" stroke="#60A5FA" stroke-width="2"/>
  <text x="780" y="245" text-anchor="middle" class="small">Meta Prompt</text>
  <text x="780" y="272" text-anchor="middle" class="small">跨服务守则</text>

  <!-- Agent -->
  <rect x="575" y="345" rx="20" ry="20" width="170" height="82" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="2.5"/>
  <text x="660" y="378" text-anchor="middle" class="small">Agent</text>
  <text x="660" y="405" text-anchor="middle" class="small">会用工具，也更稳</text>

  <line x1="540" y1="320" x2="620" y2="342" stroke="#10B981" stroke-width="4" marker-end="url(#arrowGreen)"/>
  <line x1="780" y1="320" x2="700" y2="342" stroke="#3B82F6" stroke-width="4" marker-end="url(#arrow)"/>

  <!-- Result -->
  <rect x="555" y="448" rx="18" ry="18" width="210" height="60" fill="#F0FDF4" stroke="#22C55E" stroke-width="2"/>
  <text x="660" y="486" text-anchor="middle" class="small">TSR 39–63%</text>

  <line x1="660" y1="427" x2="660" y2="446" stroke="#0F9D58" stroke-width="4" marker-end="url(#arrowGreen)"/>

  <!-- Caution -->
  <rect x="790" y="438" rx="14" ry="14" width="80" height="52" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="830" y="470" text-anchor="middle" class="small">UAR 仍高</text>

  <!-- Center emphasis arrow -->
  <line x1="390" y1="305" x2="430" y2="305" stroke="#6B7280" stroke-width="5" marker-end="url(#arrow)"/>

</svg>