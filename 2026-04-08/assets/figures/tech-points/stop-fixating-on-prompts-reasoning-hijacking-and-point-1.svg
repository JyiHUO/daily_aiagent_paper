<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4B5563"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D9485F"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .title{font:700 34px "Arial","PingFang SC","Microsoft YaHei",sans-serif; fill:#111827}
      .label{font:700 24px "Arial","PingFang SC","Microsoft YaHei",sans-serif; fill:#111827}
      .small{font:600 20px "Arial","PingFang SC","Microsoft YaHei",sans-serif; fill:#374151}
      .tiny{font:600 18px "Arial","PingFang SC","Microsoft YaHei",sans-serif; fill:#6B7280}
    </style>
  </defs>

  <rect width="1200" height="700" fill="#F8FAFC"/>

  <text x="600" y="60" text-anchor="middle" class="title">不改提示词攻击</text>

  <rect x="40" y="110" width="1120" height="520" rx="26" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2"/>

  <!-- Left: user prompt -->
  <g filter="url(#shadow)">
    <rect x="90" y="220" width="230" height="180" rx="24" fill="#E8F1FF" stroke="#8CB4FF" stroke-width="3"/>
    <text x="205" y="275" text-anchor="middle" class="label">用户问题</text>
    <rect x="125" y="305" width="160" height="52" rx="14" fill="#FFFFFF" stroke="#BFD3FF" stroke-width="2"/>
    <text x="205" y="338" text-anchor="middle" class="small">prompt 不变</text>
  </g>

  <!-- Middle: agent decision -->
  <g filter="url(#shadow)">
    <rect x="430" y="170" width="340" height="280" rx="28" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="3"/>
    <text x="600" y="220" text-anchor="middle" class="label">Agent 决策链</text>

    <rect x="490" y="255" width="220" height="54" rx="16" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="2"/>
    <text x="600" y="289" text-anchor="middle" class="small">检索记忆</text>

    <rect x="490" y="325" width="220" height="54" rx="16" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="2"/>
    <text x="600" y="359" text-anchor="middle" class="small">组织推理</text>

    <rect x="490" y="395" width="220" height="54" rx="16" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="2"/>
    <text x="600" y="429" text-anchor="middle" class="small">筛选答案</text>
  </g>

  <!-- Right top: memory injection -->
  <g filter="url(#shadow)">
    <rect x="860" y="150" width="230" height="210" rx="24" fill="#FFF1F2" stroke="#F29AA8" stroke-width="3"/>
    <text x="975" y="205" text-anchor="middle" class="label" fill="#B42318">记忆库注入</text>

    <rect x="905" y="240" width="140" height="34" rx="10" fill="#FFFFFF" stroke="#F2B8C1" stroke-width="2"/>
    <rect x="905" y="286" width="140" height="34" rx="10" fill="#FFFFFF" stroke="#F2B8C1" stroke-width="2"/>
    <rect x="905" y="332" width="140" height="34" rx="10" fill="#FFD7DE" stroke="#D9485F" stroke-width="2"/>
    <text x="975" y="354" text-anchor="middle" class="tiny" fill="#B42318">少量恶意样本</text>
  </g>

  <!-- Right bottom: output -->
  <g filter="url(#shadow)">
    <rect x="860" y="420" width="230" height="140" rx="24" fill="#ECFDF3" stroke="#86D19E" stroke-width="3"/>
    <text x="975" y="475" text-anchor="middle" class="label">最终回答</text>
    <text x="975" y="520" text-anchor="middle" class="small">表面正常，内部带偏</text>
  </g>

  <!-- arrows -->
  <line x1="320" y1="310" x2="430" y2="310" stroke="#4B5563" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="860" y1="255" x2="710" y2="282" stroke="#D9485F" stroke-width="4" marker-end="url(#arrowRed)"/>
  <line x1="860" y1="320" x2="710" y2="352" stroke="#D9485F" stroke-width="4" marker-end="url(#arrowRed)"/>
  <line x1="860" y1="385" x2="710" y2="422" stroke="#D9485F" stroke-width="4" marker-end="url(#arrowRed)"/>
  <line x1="770" y1="430" x2="860" y2="490" stroke="#4B5563" stroke-width="4" marker-end="url(#arrow)"/>

  <!-- emphasis ring -->
  <ellipse cx="600" cy="347" rx="205" ry="180" fill="none" stroke="#D9485F" stroke-width="4" stroke-dasharray="10 10"/>

  <!-- bottom note -->
  <text x="600" y="605" text-anchor="middle" class="small" fill="#D9485F">攻击点从“输入框”转到“内部决策”</text>
</svg>