<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="'Segoe UI',Arial,Helvetica,sans-serif">
  <defs>
    <linearGradient id="sftGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="rlGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="warnGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#DC2626"/>
      <stop offset="100%" stop-color="#F87171"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" rx="16" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="24" font-weight="bold" fill="#1E293B">SFT 冷启动：为 Agent 奠定推理基础</text>
  <text x="450" y="68" text-anchor="middle" font-size="14" fill="#64748B">ToolOmni 两阶段训练 — 第一阶段的关键作用</text>

  <!-- ===== LEFT: SFT Block ===== -->
  <rect x="40" y="100" width="340" height="280" rx="16" fill="url(#sftGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="210" y="136" text-anchor="middle" font-size="20" font-weight="bold" fill="#FFF">阶段 1：SFT 冷启动</text>
  <text x="210" y="158" text-anchor="middle" font-size="13" fill="#E0E7FF">📚 入职培训 — 学会基本格式与流程</text>

  <!-- Data pills -->
  <rect x="62" y="176" width="136" height="40" rx="10" fill="#FFF" opacity="0.2"/>
  <text x="130" y="201" text-anchor="middle" font-size="13" font-weight="600" fill="#FFF">28k 检索轨迹</text>

  <rect x="210" y="176" width="136" height="40" rx="10" fill="#FFF" opacity="0.2"/>
  <text x="278" y="201" text-anchor="middle" font-size="13" font-weight="600" fill="#FFF">33k 执行轨迹</text>

  <!-- Training detail -->
  <rect x="62" y="232" width="296" height="56" rx="10" fill="#FFF" opacity="0.15"/>
  <text x="210" y="254" text-anchor="middle" font-size="13" fill="#FFF">70% 正样本 + 30% 负样本混合</text>
  <text x="210" y="274" text-anchor="middle" font-size="12" fill="#C7D2FE">仅对 Agent 推理/动作 token 计算 loss</text>

  <!-- Flow demo inside SFT -->
  <rect x="62" y="302" width="296" height="60" rx="10" fill="#FFF" opacity="0.2"/>
  <text x="78" y="322" font-size="11" fill="#FFF" font-weight="600">示例流程:</text>
  <text x="78" y="340" font-size="11" fill="#E0E7FF">用户→搜索API→选择工具→调用→返回答案</text>
  <text x="78" y="354" font-size="10" fill="#C7D2FE">genderize(name='john') → "male" ✓</text>

  <!-- ===== RIGHT: RL Block ===== -->
  <rect x="520" y="100" width="340" height="160" rx="16" fill="url(#rlGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="690" y="136" text-anchor="middle" font-size="20" font-weight="bold" fill="#FFF">阶段 2：GRPO 强化学习</text>
  <text x="690" y="158" text-anchor="middle" font-size="13" fill="#D1FAE5">🔍 实战探索 — 16000+ API 环境</text>

  <rect x="542" y="176" width="296" height="56" rx="10" fill="#FFF" opacity="0.2"/>
  <text x="690" y="198" text-anchor="middle" font-size="13" fill="#FFF">解耦多目标优化</text>
  <text x="690" y="218" text-anchor="middle" font-size="12" fill="#A7F3D0">主力驱动：检索质量提升</text>

  <!-- Arrow SFT → RL -->
  <path d="M 385 230 C 430 230, 460 190, 515 190" fill="none" stroke="#94A3B8" stroke-width="3" stroke-dasharray="8,4" marker-end="url(#arrowGray)"/>
  <defs>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#94A3B8"/>
    </marker>
  </defs>
  <text x="455" y="215" text-anchor="middle" font-size="12" font-weight="600" fill="#64748B">基础→探索</text>

  <!-- ===== BOTTOM: Ablation Comparison ===== -->
  <text x="450" y="420" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E293B">消融对比：少了谁会怎样？</text>

  <!-- No SFT box -->
  <rect x="80" y="440" width="320" height="90" rx="14" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="2" filter="url(#shadow)"/>
  <text x="100" y="468" font-size="15" font-weight="bold" fill="#DC2626">❌ 去掉 SFT</text>
  <text x="100" y="492" font-size="14" fill="#7F1D1D">执行成功率 SoPR:</text>
  <text x="310" y="492" font-size="22" font-weight="bold" fill="#DC2626">52.5%→43.4%</text>
  <text x="340" y="492" font-size="14" fill="#DC2626"> ↓9.1</text>
  <text x="100" y="516" font-size="12" fill="#991B1B">模型连基本格式都输出不好</text>

  <!-- No RL box -->
  <rect x="500" y="440" width="320" height="90" rx="14" fill="#FFF7ED" stroke="#FDBA74" stroke-width="2" filter="url(#shadow)"/>
  <text x="520" y="468" font-size="15" font-weight="bold" fill="#C2410C">❌ 去掉 RL</text>
  <text x="520" y="492" font-size="14" fill="#7C2D12">检索质量 NDCG:</text>
  <text x="730" y="492" font-size="22" font-weight="bold" fill="#C2410C">78.3%→49.3%</text>
  <text x="760" y="492" font-size="14" fill="#C2410C"> ↓29</text>
  <text x="520" y="516" font-size="12" fill="#7C2D12">检索无法精准对齐用户意图</text>

  <!-- Insight callout -->
  <rect x="220" y="392" width="460" height="28" rx="14" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="450" y="411" text-anchor="middle" font-size="13" font-weight="600" fill="#92400E">💡 SFT 主攻执行推理基础 ｜ RL 主攻检索质量提升 — 缺一不可</text>

</svg>