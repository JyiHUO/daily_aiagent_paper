<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="grd" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f8cff"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="gui" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4f8cff"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="700">WebXSkill: 双模式部署 — 适配不同模型能力</text>
  <text x="450" y="66" text-anchor="middle" fill="#94a3b8" font-size="13">同一套可执行技能，两种使用方式，按模型强弱自动匹配最优策略</text>

  <!-- Center: Skill Library -->
  <rect x="345" y="100" width="210" height="80" rx="16" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="450" y="133" text-anchor="middle" fill="#93c5fd" font-size="15" font-weight="700">🗂 可执行技能库</text>
  <text x="450" y="155" text-anchor="middle" fill="#94a3b8" font-size="12">参数化程序 + 步骤级NL指引</text>

  <!-- Left Branch: Grounded Mode -->
  <line x1="390" y1="180" x2="220" y2="230" stroke="#4f8cff" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <rect x="60" y="230" width="320" height="170" rx="16" fill="#0f2440" stroke="#4f8cff" stroke-width="2"/>
  <rect x="80" y="242" width="130" height="28" rx="8" fill="url(#grd)" opacity="0.9"/>
  <text x="145" y="261" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">⚡ Grounded 模式</text>
  <text x="220" y="290" text-anchor="middle" fill="#93c5fd" font-size="13">技能作为工具，一键调用执行</text>

  <!-- Grounded icon: single click -->
  <rect x="90" y="305" width="120" height="55" rx="10" fill="#1a3358" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="150" y="326" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="600">Agent 调用</text>
  <text x="150" y="345" text-anchor="middle" fill="#facc15" font-size="18">→ 🛠 skill()</text>

  <!-- Grounded stats -->
  <text x="265" y="322" fill="#cbd5e1" font-size="12">自动执行多步操作</text>
  <text x="265" y="342" fill="#cbd5e1" font-size="12">平均 9.3 步/次调用</text>
  <text x="265" y="370" fill="#22d3ee" font-size="13" font-weight="700">适合强模型 (GPT-5)</text>
  <text x="265" y="388" fill="#4ade80" font-size="12" font-weight="600">✓ 69.5% 成功率</text>

  <!-- Right Branch: Guided Mode -->
  <line x1="510" y1="180" x2="680" y2="230" stroke="#a78bfa" stroke-width="2.5" marker-end="url(#arrowPurple)"/>
  <rect x="520" y="230" width="320" height="170" rx="16" fill="#1f1035" stroke="#a78bfa" stroke-width="2"/>
  <rect x="540" y="242" width="120" height="28" rx="8" fill="url(#gui)" opacity="0.9"/>
  <text x="600" y="261" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">📋 Guided 模式</text>
  <text x="680" y="290" text-anchor="middle" fill="#c4b5fd" font-size="13">步骤级指引，Agent逐步执行</text>

  <!-- Guided icon: step by step -->
  <rect x="540" y="305" width="120" height="55" rx="10" fill="#2d1a4e" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="600" y="324" text-anchor="middle" fill="#c084fc" font-size="11" font-weight="600">Agent 逐步</text>
  <text x="600" y="345" text-anchor="middle" fill="#facc15" font-size="14">1→2→3→✓</text>

  <!-- Guided stats -->
  <text x="710" y="322" fill="#cbd5e1" font-size="12">每步可检查调整</text>
  <text x="710" y="342" fill="#cbd5e1" font-size="12">出错易恢复</text>
  <text x="710" y="370" fill="#e879f9" font-size="13" font-weight="700">适合弱模型 (Qwen)</text>
  <text x="710" y="388" fill="#4ade80" font-size="12" font-weight="600">✓ 53.9% 成功率</text>

  <!-- Analogy bar -->
  <rect x="60" y="420" width="780" height="52" rx="12" fill="#162033" stroke="#334155" stroke-width="1"/>
  <text x="100" y="442" fill="#fbbf24" font-size="13">💡 类比：</text>
  <text x="300" y="442" fill="#93c5fd" font-size="13" text-anchor="middle">熟练工人 → 一键工具 ⚡</text>
  <text x="450" y="442" fill="#64748b" font-size="15">vs</text>
  <text x="620" y="442" fill="#c4b5fd" font-size="13" text-anchor="middle">新手 → 操作手册 📋</text>
  <text x="450" y="462" fill="#94a3b8" font-size="11" text-anchor="middle">工具效率高但出错需自修 | 手册虽慢但每步可纠偏</text>

  <!-- Cross-environment Transfer highlight -->
  <rect x="180" y="490" width="540" height="110" rx="16" fill="#0d2818" stroke="#22c55e" stroke-width="2"/>
  <text x="450" y="518" text-anchor="middle" fill="#4ade80" font-size="16" font-weight="700">🌐 Guided 模式支持跨环境迁移</text>
  <text x="450" y="543" text-anchor="middle" fill="#bbf7d0" font-size="13">步骤级指导不绑定 DOM → 技能可跨网站复用</text>

  <!-- Transfer example -->
  <rect x="230" y="555" width="130" height="32" rx="8" fill="#164e2e" stroke="#22c55e" stroke-width="1.2"/>
  <text x="295" y="576" text-anchor="middle" fill="#86efac" font-size="12" font-weight="600">WebArena 技能</text>
  <line x1="365" y1="571" x2="445" y2="571" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="6,3"/>
  <text x="405" y="564" text-anchor="middle" fill="#4ade80" font-size="10">迁移</text>
  <rect x="450" y="555" width="190" height="32" rx="8" fill="#164e2e" stroke="#22c55e" stroke-width="1.2"/>
  <text x="545" y="576" text-anchor="middle" fill="#86efac" font-size="12" font-weight="600">Amazon 🛒 97.6% (+7.4)</text>

  <!-- Decorative VS -->
  <circle cx="450" cy="320" r="22" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="450" y="326" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="800">VS</text>
</svg>