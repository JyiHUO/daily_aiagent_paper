<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="greenG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="redG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="blueG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="bold">ToolOmni: 强泛化 &amp; 抗噪声鲁棒性</text>
  <text x="450" y="66" text-anchor="middle" fill="#94a3b8" font-size="13">学会"如何用工具"的元技能，而非死记硬背工具列表</text>

  <!-- ===== LEFT: Noise Robustness Comparison ===== -->
  <!-- Section label -->
  <text x="240" y="105" text-anchor="middle" fill="#cbd5e1" font-size="16" font-weight="bold">🛡️ 噪声鲁棒性对比</text>
  <text x="240" y="122" text-anchor="middle" fill="#64748b" font-size="11">注入 15 个对抗性干扰工具后</text>

  <!-- Bar chart area -->
  <g transform="translate(60, 145)">
    <!-- Axis -->
    <line x1="0" y1="200" x2="360" y2="200" stroke="#334155" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="0" y2="200" stroke="#334155" stroke-width="1.5"/>
    <!-- Y labels -->
    <text x="-8" y="205" text-anchor="end" fill="#64748b" font-size="10">0%</text>
    <text x="-8" y="105" text-anchor="end" fill="#64748b" font-size="10">50%</text>
    <text x="-8" y="5" text-anchor="end" fill="#64748b" font-size="10">100%</text>
    <line x1="0" y1="100" x2="360" y2="100" stroke="#334155" stroke-width="0.5" stroke-dasharray="4,4"/>

    <!-- ToolLlama-v2 Before -->
    <rect x="30" y="121.4" width="55" height="78.6" rx="4" fill="#f59e0b" opacity="0.85" filter="url(#shadow)"/>
    <text x="57.5" y="116" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">39.3%</text>
    <text x="57.5" y="218" text-anchor="middle" fill="#94a3b8" font-size="9">原始</text>

    <!-- ToolLlama-v2 After (dropped) -->
    <rect x="95" y="159" width="55" height="41" rx="4" fill="url(#redG)" opacity="0.9" filter="url(#shadow)"/>
    <text x="122.5" y="153" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="bold">20.5%</text>
    <text x="122.5" y="218" text-anchor="middle" fill="#94a3b8" font-size="9">+噪声</text>
    <!-- Drop arrow -->
    <path d="M90 135 L100 155" stroke="#ef4444" stroke-width="2" fill="none" marker-end="url(#arrowRed)"/>
    <text x="75" y="148" fill="#ef4444" font-size="11" font-weight="bold">↓18.8</text>

    <!-- Label -->
    <text x="90" y="240" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="bold">ToolLlama-v2</text>

    <!-- ToolOmni Before -->
    <rect x="210" y="108.2" width="55" height="91.8" rx="4" fill="#60a5fa" opacity="0.85" filter="url(#shadow)"/>
    <text x="237.5" y="103" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="bold">45.9%</text>
    <text x="237.5" y="218" text-anchor="middle" fill="#94a3b8" font-size="9">原始</text>

    <!-- ToolOmni After (improved!) -->
    <rect x="275" y="83.6" width="55" height="116.4" rx="4" fill="url(#greenG)" opacity="0.95" filter="url(#shadow)"/>
    <text x="302.5" y="78" text-anchor="middle" fill="#86efac" font-size="15" font-weight="bold">58.2%</text>
    <text x="302.5" y="218" text-anchor="middle" fill="#94a3b8" font-size="9">+噪声</text>
    <!-- Rise arrow -->
    <text x="345" y="100" fill="#22c55e" font-size="12" font-weight="bold">↑12.3!</text>

    <!-- Label -->
    <text x="270" y="240" text-anchor="middle" fill="#3b82f6" font-size="12" font-weight="bold">ToolOmni</text>
  </g>

  <!-- Insight box left -->
  <rect x="65" y="410" width="350" height="48" rx="10" fill="#16a34a" opacity="0.15" stroke="#22c55e" stroke-width="1.5"/>
  <text x="240" y="432" text-anchor="middle" fill="#86efac" font-size="12" font-weight="bold">💡 噪声中发现功能替代品 → 准确率反升</text>
  <text x="240" y="448" text-anchor="middle" fill="#6ee7b7" font-size="10">灵活推理 &gt; 刚性匹配</text>

  <!-- ===== RIGHT: Category Generalization ===== -->
  <text x="670" y="105" text-anchor="middle" fill="#cbd5e1" font-size="16" font-weight="bold">🌍 全新领域泛化</text>
  <text x="670" y="122" text-anchor="middle" fill="#64748b" font-size="11">Category Generalization 设定</text>

  <!-- Two comparison cards -->
  <!-- GPT-3.5 Pipeline -->
  <rect x="510" y="140" width="140" height="160" rx="12" fill="#1e293b" stroke="#475569" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="580" y="168" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="bold">GPT-3.5 流水线</text>
  <circle cx="580" cy="220" r="38" fill="none" stroke="#f59e0b" stroke-width="5" opacity="0.7"/>
  <circle cx="580" cy="220" r="38" fill="none" stroke="#f59e0b" stroke-width="5" stroke-dasharray="75 164" stroke-dashoffset="0" transform="rotate(-90 580 220)"/>
  <text x="580" y="226" text-anchor="middle" fill="#fbbf24" font-size="18" font-weight="bold">42.1%</text>
  <text x="580" y="290" text-anchor="middle" fill="#64748b" font-size="10">SoPR</text>

  <!-- ToolOmni -->
  <rect x="680" y="140" width="140" height="160" rx="12" fill="#1e293b" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="750" y="168" text-anchor="middle" fill="#86efac" font-size="12" font-weight="bold">ToolOmni</text>
  <circle cx="750" cy="220" r="38" fill="none" stroke="#334155" stroke-width="5"/>
  <circle cx="750" cy="220" r="38" fill="none" stroke="#22c55e" stroke-width="5" stroke-dasharray="134 164" stroke-dashoffset="0" transform="rotate(-90 750 220)"/>
  <text x="750" y="226" text-anchor="middle" fill="#4ade80" font-size="18" font-weight="bold">55.9%</text>
  <text x="750" y="290" text-anchor="middle" fill="#64748b" font-size="10">SoPR</text>

  <!-- Delta arrow between cards -->
  <path d="M655 220 L675 220" stroke="#4ade80" stroke-width="2.5" fill="none" marker-end="url(#arrowG)"/>
  <text x="665" y="210" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="bold">+13.8</text>

  <!-- Example scenario -->
  <rect x="505" y="320" width="320" height="130" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5" opacity="0.9" filter="url(#shadow)"/>
  <text x="665" y="345" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="bold">📋 示例：未见过的区块链 API</text>
  
  <g transform="translate(520, 358)">
    <rect x="0" y="0" width="130" height="28" rx="6" fill="#dc2626" opacity="0.2" stroke="#ef4444" stroke-width="1"/>
    <text x="65" y="18" text-anchor="middle" fill="#fca5a5" font-size="10">ToolGen: 记忆中无 ❌</text>
    
    <rect x="150" y="0" width="155" height="28" rx="6" fill="#16a34a" opacity="0.2" stroke="#22c55e" stroke-width="1"/>
    <text x="227" y="18" text-anchor="middle" fill="#86efac" font-size="10">ToolOmni: 搜索+读文档 ✅</text>
  </g>

  <text x="665" y="408" text-anchor="middle" fill="#94a3b8" font-size="10">搜索 "blockchain transaction query"</text>
  <text x="665" y="422" text-anchor="middle" fill="#94a3b8" font-size="10">→ 阅读文档 → 推断 tx-hash 参数 → 调用成功</text>
  <text x="665" y="440" text-anchor="middle" fill="#64748b" font-size="9" font-style="italic">参数记忆 → 元技能推理</text>

  <!-- Bottom key insight -->
  <rect x="200" y="488" width="500" height="52" rx="14" fill="#2563eb" opacity="0.12" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="450" y="512" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">🔑 核心：学会"如何用工具"而非"记住哪些工具"</text>
  <text x="450" y="530" text-anchor="middle" fill="#94a3b8" font-size="11">主动检索 + 文档推理 → 开放世界工具泛化</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#4ade80"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#ef4444"/>
    </marker>
  </defs>
</svg>