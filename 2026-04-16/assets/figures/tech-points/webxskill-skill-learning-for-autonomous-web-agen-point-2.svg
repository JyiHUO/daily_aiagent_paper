<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4A5568"/>
    </marker>
    <marker id="arrowWhite" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fff"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7FAFC"/>
      <stop offset="100%" stop-color="#EDF2F7"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="16" fill="url(#bg)"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#1A202C">WebXSkill：三阶段技能流水线</text>
  <text x="450" y="66" text-anchor="middle" font-size="13" fill="#718096">采集 → 整理 → 使用：从合成轨迹到上下文感知的可执行技能</text>

  <!-- ===== STAGE 1: Skill Extraction ===== -->
  <g filter="url(#shadow)">
    <rect x="40" y="100" width="240" height="290" rx="14" fill="#EBF4FF" stroke="#3182CE" stroke-width="2"/>
  </g>
  <rect x="40" y="100" width="240" height="40" rx="14" fill="#3182CE"/>
  <rect x="40" y="126" width="240" height="14" fill="#3182CE"/>
  <text x="160" y="125" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">① 技能抽取</text>

  <!-- Trajectories icon -->
  <rect x="70" y="160" width="180" height="50" rx="8" fill="#fff" stroke="#90CDF4" stroke-width="1.5"/>
  <text x="160" y="180" text-anchor="middle" font-size="12" fill="#2B6CB0" font-weight="600">2500 条合成轨迹</text>
  <text x="160" y="197" text-anchor="middle" font-size="10" fill="#718096">低成本 · 不泄露测试数据</text>

  <!-- LLM extract -->
  <line x1="160" y1="210" x2="160" y2="235" stroke="#4A5568" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="80" y="238" width="160" height="38" rx="8" fill="#fff" stroke="#90CDF4" stroke-width="1.5"/>
  <text x="160" y="254" text-anchor="middle" font-size="11" fill="#2B6CB0" font-weight="600">LLM 参数化抽象</text>
  <text x="160" y="268" text-anchor="middle" font-size="10" fill="#718096">具体值 → 参数</text>

  <!-- Dedup -->
  <line x1="160" y1="276" x2="160" y2="302" stroke="#4A5568" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="65" y="305" width="190" height="65" rx="8" fill="#fff" stroke="#90CDF4" stroke-width="1.5"/>
  <text x="160" y="324" text-anchor="middle" font-size="11" fill="#2B6CB0" font-weight="600">三级去重 + 环境验证</text>
  <text x="160" y="340" text-anchor="middle" font-size="9.5" fill="#718096">名称匹配 → Jaccard → 语义</text>
  <text x="160" y="356" text-anchor="middle" font-size="10" fill="#38A169" font-weight="600">→ 每站 ~118 个精简技能</text>

  <!-- ===== Arrow 1→2 ===== -->
  <line x1="280" y1="245" x2="340" y2="245" stroke="#4A5568" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- ===== STAGE 2: Skill Organization ===== -->
  <g filter="url(#shadow)">
    <rect x="340" y="100" width="230" height="290" rx="14" fill="#F0FFF4" stroke="#38A169" stroke-width="2"/>
  </g>
  <rect x="340" y="100" width="230" height="40" rx="14" fill="#38A169"/>
  <rect x="340" y="126" width="230" height="14" fill="#38A169"/>
  <text x="455" y="125" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">② 技能组织</text>

  <!-- URL-Pattern Skill Graph -->
  <text x="455" y="162" text-anchor="middle" font-size="12" fill="#276749" font-weight="600">URL模式技能图</text>

  <!-- Graph visualization -->
  <circle cx="420" cy="210" r="28" fill="#C6F6D5" stroke="#38A169" stroke-width="2"/>
  <text x="420" y="207" text-anchor="middle" font-size="9" fill="#276749" font-weight="bold">search/*</text>
  <text x="420" y="219" text-anchor="middle" font-size="8" fill="#4A5568">5 skills</text>

  <circle cx="510" cy="195" r="24" fill="#C6F6D5" stroke="#38A169" stroke-width="2"/>
  <text x="510" y="192" text-anchor="middle" font-size="9" fill="#276749" font-weight="bold">cart/*</text>
  <text x="510" y="204" text-anchor="middle" font-size="8" fill="#4A5568">3 skills</text>

  <circle cx="460" cy="270" r="26" fill="#C6F6D5" stroke="#38A169" stroke-width="2"/>
  <text x="460" y="267" text-anchor="middle" font-size="9" fill="#276749" font-weight="bold">checkout</text>
  <text x="460" y="279" text-anchor="middle" font-size="8" fill="#4A5568">4 skills</text>

  <line x1="440" y1="235" x2="450" y2="247" stroke="#38A169" stroke-width="1.2"/>
  <line x1="497" y1="216" x2="475" y2="248" stroke="#38A169" stroke-width="1.2"/>
  <line x1="445" y1="210" x2="488" y2="198" stroke="#38A169" stroke-width="1.2"/>

  <!-- Context-aware label -->
  <rect x="365" y="315" width="190" height="55" rx="8" fill="#fff" stroke="#9AE6B4" stroke-width="1.5"/>
  <text x="460" y="335" text-anchor="middle" font-size="11" fill="#276749" font-weight="600">上下文感知检索</text>
  <text x="460" y="351" text-anchor="middle" font-size="10" fill="#718096">URL匹配 + 元素过滤</text>
  <text x="460" y="365" text-anchor="middle" font-size="10" fill="#718096">每页 ≤ 20 候选技能</text>

  <!-- ===== Arrow 2→3 ===== -->
  <line x1="570" y1="245" x2="630" y2="245" stroke="#4A5568" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- ===== STAGE 3: Skill Deployment ===== -->
  <g filter="url(#shadow)">
    <rect x="630" y="100" width="235" height="290" rx="14" fill="#FFF5F5" stroke="#E53E3E" stroke-width="2"/>
  </g>
  <rect x="630" y="100" width="235" height="40" rx="14" fill="#E53E3E"/>
  <rect x="630" y="126" width="235" height="14" fill="#E53E3E"/>
  <text x="747" y="125" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">③ 技能部署</text>

  <!-- Two modes -->
  <!-- Grounded mode -->
  <rect x="655" y="160" width="185" height="70" rx="10" fill="#FED7D7" stroke="#FC8181" stroke-width="1.5"/>
  <text x="747" y="183" text-anchor="middle" font-size="13" fill="#C53030" font-weight="bold">⚡ Grounded 模式</text>
  <text x="747" y="200" text-anchor="middle" font-size="10.5" fill="#4A5568">参数化程序直接执行</text>
  <text x="747" y="215" text-anchor="middle" font-size="10" fill="#718096">强Agent · 高效率</text>

  <!-- VS -->
  <text x="747" y="248" text-anchor="middle" font-size="13" fill="#A0AEC0" font-weight="bold">或</text>

  <!-- Guided mode -->
  <rect x="655" y="262" width="185" height="70" rx="10" fill="#FEFCBF" stroke="#ECC94B" stroke-width="1.5"/>
  <text x="747" y="285" text-anchor="middle" font-size="13" fill="#975A16" font-weight="bold">📖 Guided 模式</text>
  <text x="747" y="302" text-anchor="middle" font-size="10.5" fill="#4A5568">步骤级自然语言引导</text>
  <text x="747" y="317" text-anchor="middle" font-size="10" fill="#718096">弱Agent · 可解释 · 可恢复</text>

  <!-- Key insight badge -->
  <rect x="650" y="348" width="195" height="30" rx="8" fill="#E53E3E"/>
  <text x="747" y="368" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">🔑 可执行 + 可解释</text>

  <!-- ===== Bottom result bar ===== -->
  <rect x="120" y="430" width="660" height="60" rx="12" fill="#2D3748" filter="url(#shadow)"/>
  <text x="450" y="455" text-anchor="middle" font-size="14" fill="#F7FAFC" font-weight="bold">消融验证：去掉技能图后成功率 69.5% → 59.1%（-10.4↓）</text>
  <text x="450" y="476" text-anchor="middle" font-size="12" fill="#A0AEC0">WebArena +9.8  ·  WebVoyager +12.9（相比基线提升）</text>

  <!-- Small decorative connecting line at bottom -->
  <line x1="160" y1="390" x2="160" y2="430" stroke="#3182CE" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="455" y1="390" x2="455" y2="430" stroke="#38A169" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="747" y1="390" x2="747" y2="430" stroke="#E53E3E" stroke-width="1.5" stroke-dasharray="4,3"/>
</svg>