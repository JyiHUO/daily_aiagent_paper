<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="100%" stop-color="#1a1a40"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA500"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" fill="#FFD700" font-size="22" font-weight="bold" filter="url(#glow)">递归锦标赛投票 (RTV)</text>
  <text x="400" y="66" text-anchor="middle" fill="#aab" font-size="13">像淘汰赛一样，两两比较逐轮筛选最佳轨迹</text>

  <!-- Round 1: 16 → 8 -->
  <!-- 8 pairs shown as compact blocks -->
  <g>
    <text x="68" y="108" text-anchor="middle" fill="#8be" font-size="13" font-weight="bold">第1轮 · 16→8</text>
    <!-- Pair boxes -->
    <g transform="translate(20,115)">
      <rect width="96" height="54" rx="8" fill="#1e2250" stroke="#4466aa" stroke-width="1.5"/>
      <text x="48" y="20" text-anchor="middle" fill="#7af" font-size="11">摘要1</text>
      <text x="48" y="35" text-anchor="middle" fill="#fff" font-size="10">vs</text>
      <text x="48" y="50" text-anchor="middle" fill="#7af" font-size="11">摘要2</text>
    </g>
    <g transform="translate(120,115)">
      <rect width="96" height="54" rx="8" fill="#1e2250" stroke="#4466aa" stroke-width="1.5"/>
      <text x="48" y="20" text-anchor="middle" fill="#7af" font-size="11">摘要3</text>
      <text x="48" y="35" text-anchor="middle" fill="#fff" font-size="10">vs</text>
      <text x="48" y="50" text-anchor="middle" fill="#7af" font-size="11">摘要4</text>
    </g>
    <g transform="translate(220,115)">
      <rect width="96" height="54" rx="8" fill="#1e2250" stroke="#4466aa" stroke-width="1.5"/>
      <text x="48" y="20" text-anchor="middle" fill="#7af" font-size="11">摘要5</text>
      <text x="48" y="35" text-anchor="middle" fill="#fff" font-size="10">vs</text>
      <text x="48" y="50" text-anchor="middle" fill="#7af" font-size="11">摘要6</text>
    </g>
    <!-- Ellipsis -->
    <text x="340" y="148" fill="#667" font-size="22">···</text>
    <g transform="translate(370,115)">
      <rect width="96" height="54" rx="8" fill="#1e2250" stroke="#4466aa" stroke-width="1.5"/>
      <text x="48" y="20" text-anchor="middle" fill="#7af" font-size="11">摘要15</text>
      <text x="48" y="35" text-anchor="middle" fill="#fff" font-size="10">vs</text>
      <text x="48" y="50" text-anchor="middle" fill="#7af" font-size="11">摘要16</text>
    </g>
  </g>

  <!-- Voting callout -->
  <g transform="translate(510,112)">
    <rect width="260" height="62" rx="12" fill="#2a1f4e" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="130" y="22" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="bold">🗳 LLM 裁判 × 8票</text>
    <text x="130" y="40" text-anchor="middle" fill="#9ca3af" font-size="11">"哪条摘要描述了更可靠的修复？"</text>
    <text x="130" y="55" text-anchor="middle" fill="#6ee7b7" font-size="11">多数票 → 胜者晋级</text>
  </g>
  <line x1="466" y1="142" x2="510" y2="142" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowPurple)"/>

  <!-- Arrow down -->
  <defs>
    <marker id="arrowDown" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="#FFD700"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="#a78bfa"/>
    </marker>
  </defs>

  <!-- Big downward arrow R1 → R2 -->
  <line x1="240" y1="175" x2="240" y2="210" stroke="#FFD700" stroke-width="2.5" marker-end="url(#arrowDown)"/>
  <text x="260" y="198" fill="#fbbf24" font-size="11">8 个胜者</text>

  <!-- Round 2: 8 → 4 -->
  <g>
    <text x="68" y="230" text-anchor="middle" fill="#8be" font-size="13" font-weight="bold">第2轮 · 8→4</text>
    <g transform="translate(20,237)">
      <rect width="96" height="44" rx="8" fill="#1e2250" stroke="#55aa77" stroke-width="1.5"/>
      <text x="48" y="17" text-anchor="middle" fill="#6ee7b7" font-size="11">胜者A vs 胜者B</text>
      <text x="48" y="35" text-anchor="middle" fill="#9ca3af" font-size="10">×8票</text>
    </g>
    <g transform="translate(130,237)">
      <rect width="96" height="44" rx="8" fill="#1e2250" stroke="#55aa77" stroke-width="1.5"/>
      <text x="48" y="17" text-anchor="middle" fill="#6ee7b7" font-size="11">胜者C vs 胜者D</text>
      <text x="48" y="35" text-anchor="middle" fill="#9ca3af" font-size="10">×8票</text>
    </g>
    <text x="250" y="265" fill="#667" font-size="22">···</text>
    <g transform="translate(280,237)">
      <rect width="96" height="44" rx="8" fill="#1e2250" stroke="#55aa77" stroke-width="1.5"/>
      <text x="48" y="17" text-anchor="middle" fill="#6ee7b7" font-size="11">胜者G vs 胜者H</text>
      <text x="48" y="35" text-anchor="middle" fill="#9ca3af" font-size="10">×8票</text>
    </g>
  </g>

  <!-- Arrow down R2 → R3 -->
  <line x1="210" y1="287" x2="210" y2="318" stroke="#FFD700" stroke-width="2.5" marker-end="url(#arrowDown)"/>
  <text x="230" y="308" fill="#fbbf24" font-size="11">4 个胜者</text>

  <!-- Round 3 & 4 merged visually -->
  <g>
    <text x="68" y="340" text-anchor="middle" fill="#8be" font-size="13" font-weight="bold">第3轮 · 4→2</text>
    <g transform="translate(20,347)">
      <rect width="96" height="40" rx="8" fill="#1e2250" stroke="#e8a040" stroke-width="1.5"/>
      <text x="48" y="16" text-anchor="middle" fill="#fbbf24" font-size="11">半决赛1</text>
      <text x="48" y="33" text-anchor="middle" fill="#9ca3af" font-size="10">×8票</text>
    </g>
    <g transform="translate(130,347)">
      <rect width="96" height="40" rx="8" fill="#1e2250" stroke="#e8a040" stroke-width="1.5"/>
      <text x="48" y="16" text-anchor="middle" fill="#fbbf24" font-size="11">半决赛2</text>
      <text x="48" y="33" text-anchor="middle" fill="#9ca3af" font-size="10">×8票</text>
    </g>
  </g>

  <line x1="165" y1="393" x2="165" y2="420" stroke="#FFD700" stroke-width="2.5" marker-end="url(#arrowDown)"/>

  <!-- Final round -->
  <g>
    <text x="68" y="440" text-anchor="middle" fill="#8be" font-size="13" font-weight="bold">决赛 · 2→1</text>
    <g transform="translate(20,447)">
      <rect width="140" height="42" rx="10" fill="#2d1810" stroke="url(#gold)" stroke-width="2.5"/>
      <text x="70" y="18" text-anchor="middle" fill="#FFD700" font-size="13" font-weight="bold">🏆 决赛</text>
      <text x="70" y="35" text-anchor="middle" fill="#fbbf24" font-size="11">×8票 → 冠军摘要</text>
    </g>
  </g>

  <!-- Champion arrow -->
  <line x1="165" y1="495" x2="165" y2="510" stroke="#FFD700" stroke-width="2" opacity="0.5"/>

  <!-- Right side: Key insight panel -->
  <g transform="translate(490,210)">
    <rect width="280" height="280" rx="14" fill="#111827" stroke="#334155" stroke-width="1.5"/>

    <!-- Why G=2 -->
    <text x="140" y="30" text-anchor="middle" fill="#f472b6" font-size="14" font-weight="bold">🔑 为什么两两比较？</text>
    <g transform="translate(20,45)">
      <!-- Bad: many at once -->
      <rect width="110" height="70" rx="8" fill="#3b1111" stroke="#ef4444" stroke-width="1"/>
      <text x="55" y="18" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="bold">❌ 一次选16</text>
      <text x="55" y="35" text-anchor="middle" fill="#9ca3af" font-size="9">候选太多</text>
      <text x="55" y="50" text-anchor="middle" fill="#9ca3af" font-size="9">LLM 判断力↓</text>
      <text x="55" y="65" text-anchor="middle" fill="#ef4444" font-size="9">位置偏差严重</text>
    </g>
    <g transform="translate(150,45)">
      <!-- Good: pairwise -->
      <rect width="110" height="70" rx="8" fill="#0b2b1a" stroke="#22c55e" stroke-width="1"/>
      <text x="55" y="18" text-anchor="middle" fill="#86efac" font-size="10" font-weight="bold">✅ 两两淘汰</text>
      <text x="55" y="35" text-anchor="middle" fill="#9ca3af" font-size="9">决策简单</text>
      <text x="55" y="50" text-anchor="middle" fill="#9ca3af" font-size="9">判断稳定↑</text>
      <text x="55" y="65" text-anchor="middle" fill="#22c55e" font-size="9">层级筛选可靠</text>
    </g>

    <!-- V=8 -->
    <text x="140" y="145" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="bold">每轮投 8 票取多数</text>
    <text x="140" y="162" text-anchor="middle" fill="#9ca3af" font-size="10">平衡可靠性 ↔ API成本</text>

    <!-- Result highlight -->
    <rect x="20" y="180" width="240" height="80" rx="12" fill="#1a1040" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="140" y="205" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="bold">📈 Terminal-Bench v2.0</text>
    <text x="140" y="228" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">40.6% → 54.6%</text>
    <text x="140" y="250" text-anchor="middle" fill="#6ee7b7" font-size="11">N=16, Claude-4.5-Sonnet, 仅用 RTV</text>
  </g>
</svg>