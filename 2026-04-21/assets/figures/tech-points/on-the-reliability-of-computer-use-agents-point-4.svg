<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrowG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2e8b57"/>
    </marker>
    <marker id="arrowR" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c0392b"/>
    </marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f4f8"/>
      <stop offset="100%" stop-color="#dbe4ee"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bgGrad)" rx="16"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">迭代计划提炼：从多次尝试中学习靠谱策略</text>
  <text x="450" y="66" text-anchor="middle" font-size="13" fill="#666">Iterative Plan Refinement for Planning Variability</text>

  <!-- ==================== ITERATION 0 ==================== -->
  <rect x="30" y="90" width="240" height="260" rx="14" fill="#fff" stroke="#7b8cde" stroke-width="2.5" opacity="0.95"/>
  <rect x="30" y="90" width="240" height="38" rx="14" fill="#7b8cde"/>
  <text x="150" y="115" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">Iteration 0: 多次执行</text>

  <!-- Rollout icons -->
  <rect x="52" y="145" width="196" height="42" rx="8" fill="#e8f5e9" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="150" y="162" text-anchor="middle" font-size="12" fill="#2e7d32">✓ Run 1: GUI拖拽文件 → 成功</text>
  <text x="150" y="178" text-anchor="middle" font-size="10" fill="#558b2f">使用文件管理器</text>

  <rect x="52" y="197" width="196" height="42" rx="8" fill="#e8f5e9" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="150" y="214" text-anchor="middle" font-size="12" fill="#2e7d32">✓ Run 2: GUI拖拽文件 → 成功</text>
  <text x="150" y="230" text-anchor="middle" font-size="10" fill="#558b2f">使用文件管理器</text>

  <rect x="52" y="249" width="196" height="42" rx="8" fill="#ffebee" stroke="#ef5350" stroke-width="1.5"/>
  <text x="150" y="266" text-anchor="middle" font-size="12" fill="#c62828">✗ Run 3: 终端命令 → 失败</text>
  <text x="150" y="282" text-anchor="middle" font-size="10" fill="#b71c1c">路径错误</text>

  <text x="150" y="330" text-anchor="middle" font-size="13" fill="#e65100" font-weight="bold">⚠ 成功率 2/3 不稳定</text>

  <!-- Arrow from Iter0 to Plan -->
  <line x1="270" y1="220" x2="330" y2="220" stroke="#555" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- ==================== PLAN EXTRACTION ==================== -->
  <rect x="335" y="130" width="230" height="180" rx="14" fill="#fff8e1" stroke="#ffa726" stroke-width="2.5"/>
  <rect x="335" y="130" width="230" height="38" rx="14" fill="#ffa726"/>
  <text x="450" y="155" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">📋 提炼结构化计划</text>

  <!-- Plan content -->
  <text x="355" y="192" font-size="12" fill="#4e342e" font-weight="bold">分析成功/失败模式：</text>
  <text x="365" y="212" font-size="11" fill="#5d4037">• 成功模式 → GUI文件管理器</text>
  <text x="365" y="232" font-size="11" fill="#5d4037">• 失败模式 → 终端命令有风险</text>
  <line x1="355" y1="244" x2="545" y2="244" stroke="#ffcc80" stroke-width="1"/>
  <text x="355" y="262" font-size="12" fill="#bf360c" font-weight="bold">生成计划：</text>
  <text x="365" y="282" font-size="11" fill="#bf360c">"优先用GUI，避免终端命令"</text>

  <!-- Arrow from Plan to Iter1 -->
  <line x1="565" y1="220" x2="625" y2="220" stroke="#555" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- ==================== ITERATION 1+ ==================== -->
  <rect x="630" y="90" width="240" height="260" rx="14" fill="#fff" stroke="#2e8b57" stroke-width="2.5" opacity="0.95"/>
  <rect x="630" y="90" width="240" height="38" rx="14" fill="#2e8b57"/>
  <text x="750" y="115" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">Iteration 1+: 按计划执行</text>

  <rect x="652" y="145" width="196" height="36" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="750" y="168" text-anchor="middle" font-size="12" fill="#1b5e20">✓ Run 1: GUI拖拽 → 成功</text>

  <rect x="652" y="191" width="196" height="36" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="750" y="214" text-anchor="middle" font-size="12" fill="#1b5e20">✓ Run 2: GUI拖拽 → 成功</text>

  <rect x="652" y="237" width="196" height="36" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="750" y="260" text-anchor="middle" font-size="12" fill="#1b5e20">✓ Run 3: GUI拖拽 → 成功</text>

  <text x="750" y="315" text-anchor="middle" font-size="15" fill="#1b5e20" font-weight="bold">✅ 成功率 3/3 可靠!</text>

  <!-- ==================== BOTTOM: Contrast GPT-5 vs Claude ==================== -->
  <rect x="60" y="400" width="370" height="190" rx="14" fill="#fff" stroke="#2e8b57" stroke-width="2.5"/>
  <rect x="60" y="400" width="370" height="36" rx="14" fill="#2e8b57"/>
  <text x="245" y="424" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">✅ GPT-5：迭代提炼有效</text>

  <!-- Bar chart simplified -->
  <text x="110" y="460" font-size="11" fill="#444" text-anchor="middle">Iter 0</text>
  <text x="220" y="460" font-size="11" fill="#444" text-anchor="middle">Iter 1</text>
  <text x="330" y="460" font-size="11" fill="#444" text-anchor="middle">Iter 2</text>

  <rect x="80" y="468" width="60" height="70" rx="4" fill="#a5d6a7"/>
  <text x="110" y="510" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">57.6%</text>

  <rect x="190" y="458" width="60" height="80" rx="4" fill="#66bb6a"/>
  <text x="220" y="505" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">61.8%</text>

  <rect x="300" y="443" width="60" height="95" rx="4" fill="#2e7d32"/>
  <text x="330" y="498" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">65.1%</text>

  <text x="245" y="565" text-anchor="middle" font-size="12" fill="#333">Pass³ 持续上升 ↑  Δcx=+0.130</text>

  <!-- Arrow between bars -->
  <line x1="145" y1="500" x2="185" y2="495" stroke="#2e8b57" stroke-width="2" marker-end="url(#arrowG)"/>
  <line x1="255" y1="495" x2="295" y2="488" stroke="#2e8b57" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- Claude panel -->
  <rect x="470" y="400" width="390" height="190" rx="14" fill="#fff" stroke="#c0392b" stroke-width="2.5"/>
  <rect x="470" y="400" width="390" height="36" rx="14" fill="#c0392b"/>
  <text x="665" y="424" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">⚠ Claude：迭代反而退化</text>

  <!-- Claude illustration -->
  <rect x="500" y="455" width="140" height="80" rx="10" fill="#ffcdd2" stroke="#ef9a9a" stroke-width="1.5"/>
  <text x="570" y="478" text-anchor="middle" font-size="11" fill="#b71c1c" font-weight="bold">Claude偏好写代码执行</text>
  <text x="570" y="498" text-anchor="middle" font-size="22">💻</text>
  <text x="570" y="525" text-anchor="middle" font-size="10" fill="#c62828">py脚本/bash命令</text>

  <line x1="645" y1="495" x2="685" y2="495" stroke="#c0392b" stroke-width="2" marker-end="url(#arrowR)"/>

  <rect x="690" y="455" width="150" height="80" rx="10" fill="#ffcdd2" stroke="#ef9a9a" stroke-width="1.5"/>
  <text x="765" y="478" text-anchor="middle" font-size="11" fill="#b71c1c" font-weight="bold">反馈系统检测失败</text>
  <text x="765" y="498" text-anchor="middle" font-size="22">❌</text>
  <text x="765" y="525" text-anchor="middle" font-size="10" fill="#c62828">行为判断器无法追踪</text>

  <text x="665" y="565" text-anchor="middle" font-size="12" fill="#b71c1c">Iter 1: b-c = -15  计划反馈不完整 → 退化</text>

  <!-- Iterative loop arrow on top -->
  <path d="M 555 310 C 580 370, 400 370, 370 310" fill="none" stroke="#ff8f00" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <text x="480" y="365" text-anchor="middle" font-size="10" fill="#e65100">迭代反馈更新</text>

</svg>