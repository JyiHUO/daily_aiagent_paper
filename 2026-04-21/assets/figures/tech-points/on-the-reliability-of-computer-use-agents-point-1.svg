<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="gRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ee5a24"/>
    </linearGradient>
    <linearGradient id="gBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#74b9ff"/>
      <stop offset="100%" stop-color="#0984e3"/>
    </linearGradient>
    <linearGradient id="gGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#55efc4"/>
      <stop offset="100%" stop-color="#00b894"/>
    </linearGradient>
    <linearGradient id="gPurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a29bfe"/>
      <stop offset="100%" stop-color="#6c5ce7"/>
    </linearGradient>
    <linearGradient id="gOrange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffeaa7"/>
      <stop offset="100%" stop-color="#fdcb6e"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffffff" opacity="0.7"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#55efc4"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="bold">Agent 不可靠性：三因素分解与度量</text>
  <text x="450" y="65" text-anchor="middle" fill="#74b9ff" font-size="13" opacity="0.8">On the Reliability of Computer Use Agents</text>

  <!-- Central question mark / Agent icon -->
  <rect x="340" y="90" width="220" height="70" rx="14" fill="#2d3958" stroke="#5f6d8e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="118" text-anchor="middle" fill="#dfe6e9" font-size="14" font-weight="bold">🤖 同一任务执行 10 次</text>
  <text x="450" y="140" text-anchor="middle" fill="#ff7675" font-size="13">Pass@10≈78%　vs　Pass¹⁰≈36%</text>

  <!-- Three factor boxes -->
  <!-- Factor 1: Decoding Randomness -->
  <rect x="60" y="220" width="230" height="110" rx="14" fill="#2d3436" stroke="url(#gRed)" stroke-width="2.5" filter="url(#shadow)"/>
  <circle cx="100" cy="252" r="18" fill="url(#gRed)" opacity="0.85"/>
  <text x="100" y="258" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">1</text>
  <text x="185" y="255" text-anchor="middle" fill="#ff7675" font-size="15" font-weight="bold">解码 / 环境随机性</text>
  <text x="175" y="282" text-anchor="middle" fill="#b2bec3" font-size="12">模型采样温度 + 环境状态噪声</text>
  <text x="175" y="302" text-anchor="middle" fill="#b2bec3" font-size="12">→ 相同输入，不同输出</text>
  <!-- dice icon -->
  <text x="250" y="318" text-anchor="middle" fill="#ff7675" font-size="22">🎲</text>

  <!-- Factor 2: Instruction Ambiguity -->
  <rect x="335" y="220" width="230" height="110" rx="14" fill="#2d3436" stroke="url(#gBlue)" stroke-width="2.5" filter="url(#shadow)"/>
  <circle cx="375" cy="252" r="18" fill="url(#gBlue)" opacity="0.85"/>
  <text x="375" y="258" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">2</text>
  <text x="465" y="255" text-anchor="middle" fill="#74b9ff" font-size="15" font-weight="bold">任务指令歧义</text>
  <text x="450" y="282" text-anchor="middle" fill="#b2bec3" font-size="12">用户描述模糊 / 多种理解</text>
  <text x="450" y="302" text-anchor="middle" fill="#b2bec3" font-size="12">→ Agent 猜测目标</text>
  <text x="525" y="318" text-anchor="middle" fill="#74b9ff" font-size="22">❓</text>

  <!-- Factor 3: Planning Variance -->
  <rect x="610" y="220" width="230" height="110" rx="14" fill="#2d3436" stroke="url(#gPurple)" stroke-width="2.5" filter="url(#shadow)"/>
  <circle cx="650" cy="252" r="18" fill="url(#gPurple)" opacity="0.85"/>
  <text x="650" y="258" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">3</text>
  <text x="740" y="255" text-anchor="middle" fill="#a29bfe" font-size="15" font-weight="bold">规划策略变异</text>
  <text x="725" y="282" text-anchor="middle" fill="#b2bec3" font-size="12">Agent 每次选不同路径</text>
  <text x="725" y="302" text-anchor="middle" fill="#b2bec3" font-size="12">→ 成功率大幅波动</text>
  <text x="800" y="318" text-anchor="middle" fill="#a29bfe" font-size="22">🔀</text>

  <!-- Arrows from top to three factors -->
  <line x1="400" y1="160" x2="175" y2="218" stroke="#ffffff" stroke-width="1.5" opacity="0.4" marker-end="url(#arrow)"/>
  <line x1="450" y1="160" x2="450" y2="218" stroke="#ffffff" stroke-width="1.5" opacity="0.4" marker-end="url(#arrow)"/>
  <line x1="500" y1="160" x2="725" y2="218" stroke="#ffffff" stroke-width="1.5" opacity="0.4" marker-end="url(#arrow)"/>

  <!-- Down arrow to measurement -->
  <line x1="175" y1="332" x2="350" y2="395" stroke="#ff7675" stroke-width="1.5" opacity="0.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <line x1="450" y1="332" x2="450" y2="395" stroke="#74b9ff" stroke-width="1.5" opacity="0.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <line x1="725" y1="332" x2="550" y2="395" stroke="#a29bfe" stroke-width="1.5" opacity="0.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>

  <!-- Measurement Framework Box -->
  <rect x="150" y="395" width="600" height="120" rx="16" fill="#1e3a2f" stroke="url(#gGreen)" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="450" y="425" text-anchor="middle" fill="#55efc4" font-size="17" font-weight="bold">📐 任务级度量框架</text>

  <!-- Three metrics side by side -->
  <rect x="175" y="442" width="170" height="58" rx="10" fill="#2d3436" stroke="#55efc4" stroke-width="1" opacity="0.8"/>
  <text x="260" y="464" text-anchor="middle" fill="#55efc4" font-size="13" font-weight="bold">Pass^k</text>
  <text x="260" y="484" text-anchor="middle" fill="#b2bec3" font-size="11">k次全部成功的概率</text>

  <rect x="365" y="442" width="170" height="58" rx="10" fill="#2d3436" stroke="#fdcb6e" stroke-width="1" opacity="0.8"/>
  <text x="450" y="464" text-anchor="middle" fill="#fdcb6e" font-size="13" font-weight="bold">McNemar 检验</text>
  <text x="450" y="484" text-anchor="middle" fill="#b2bec3" font-size="11">可靠⇄不可靠 转变计数</text>

  <rect x="555" y="442" width="170" height="58" rx="10" fill="#2d3436" stroke="#ff7675" stroke-width="1" opacity="0.8"/>
  <text x="640" y="464" text-anchor="middle" fill="#ff7675" font-size="13" font-weight="bold">Wilcoxon 检验</text>
  <text x="640" y="484" text-anchor="middle" fill="#b2bec3" font-size="11">成功次数增量变化</text>

  <!-- Result highlight -->
  <rect x="170" y="540" width="560" height="56" rx="12" fill="#1a3352" stroke="#74b9ff" stroke-width="1.5" opacity="0.9" filter="url(#shadow)"/>
  <text x="450" y="564" text-anchor="middle" fill="#ffeaa7" font-size="14" font-weight="bold">💡 指令澄清后：48个任务 不可靠→可靠，仅少数退化 (p&lt;0.05)</text>
  <text x="450" y="584" text-anchor="middle" fill="#b2bec3" font-size="12">精确定位：指令歧义是最可干预的可靠性瓶颈</text>

  <!-- Arrow from measurement to result -->
  <line x1="450" y1="517" x2="450" y2="538" stroke="#55efc4" stroke-width="2" marker-end="url(#arrowGreen)"/>
</svg>