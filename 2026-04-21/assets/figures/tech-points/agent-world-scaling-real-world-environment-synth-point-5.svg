<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="barGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="barBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="barOrange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="barPurple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="scaleLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="bold">小模型 + 环境扩展 &gt; 大模型堆参数</text>
  <text x="450" y="66" text-anchor="middle" fill="#94a3b8" font-size="13">Agent-World: 8B 模型在 23 个基准上全面超越 235B 模型</text>

  <!-- ========== LEFT: Bar Chart Comparison ========== -->
  <text x="240" y="102" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="bold">τ²-Bench Airline 子域对比</text>

  <!-- Y axis -->
  <line x1="80" y1="120" x2="80" y2="340" stroke="#475569" stroke-width="1.5"/>
  <!-- X axis -->
  <line x1="80" y1="340" x2="410" y2="340" stroke="#475569" stroke-width="1.5"/>

  <!-- Grid lines -->
  <line x1="80" y1="230" x2="410" y2="230" stroke="#334155" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="80" y1="175" x2="410" y2="175" stroke="#334155" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="80" y1="285" x2="410" y2="285" stroke="#334155" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- Y labels -->
  <text x="72" y="344" text-anchor="end" fill="#94a3b8" font-size="11">0%</text>
  <text x="72" y="289" text-anchor="end" fill="#94a3b8" font-size="11">20%</text>
  <text x="72" y="234" text-anchor="end" fill="#94a3b8" font-size="11">40%</text>
  <text x="72" y="179" text-anchor="end" fill="#94a3b8" font-size="11">60%</text>

  <!-- Bar 1: Qwen3-8B Base  26.5% -->
  <rect x="110" y="269" width="55" height="71" rx="4" fill="url(#barBlue)" opacity="0.85"/>
  <text x="137" y="262" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="bold">26.5%</text>
  <text x="137" y="362" text-anchor="middle" fill="#94a3b8" font-size="10">Qwen3-8B</text>
  <text x="137" y="375" text-anchor="middle" fill="#64748b" font-size="9">基座</text>

  <!-- Bar 2: EnvScaler-8B  31.5% -->
  <rect x="190" y="254" width="55" height="86" rx="4" fill="url(#barOrange)" opacity="0.85"/>
  <text x="217" y="247" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">31.5%</text>
  <text x="217" y="362" text-anchor="middle" fill="#94a3b8" font-size="10">EnvScaler</text>
  <text x="217" y="375" text-anchor="middle" fill="#64748b" font-size="9">8B</text>

  <!-- Bar 3: Agent-World-8B  40.0% -->
  <rect x="270" y="230" width="55" height="110" rx="4" fill="url(#barGreen)" opacity="0.9"/>
  <text x="297" y="223" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="bold">40.0%</text>
  <text x="297" y="362" text-anchor="middle" fill="#94a3b8" font-size="10">AW-8B</text>
  <text x="297" y="375" text-anchor="middle" fill="#64748b" font-size="9">Ours</text>

  <!-- Bar 4: Agent-World-14B  52.0% -->
  <rect x="350" y="197" width="55" height="143" rx="4" fill="url(#barPurple)" opacity="0.9" filter="url(#glow)"/>
  <text x="377" y="190" text-anchor="middle" fill="#c084fc" font-size="14" font-weight="bold">52.0%</text>
  <text x="377" y="362" text-anchor="middle" fill="#94a3b8" font-size="10">AW-14B</text>
  <text x="377" y="375" text-anchor="middle" fill="#64748b" font-size="9">Ours</text>

  <!-- Growth arrow -->
  <path d="M137 260 Q 257 170 377 185" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="375,181 383,186 376,190" fill="#ef4444"/>
  <text x="260" y="165" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="bold">+96% ↑</text>

  <!-- ========== RIGHT: Scaling Law Chart ========== -->
  <text x="670" y="102" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="bold">环境规模 → 性能持续攀升</text>

  <!-- Axes -->
  <line x1="510" y1="340" x2="850" y2="340" stroke="#475569" stroke-width="1.5"/>
  <line x1="510" y1="130" x2="510" y2="340" stroke="#475569" stroke-width="1.5"/>

  <!-- X label -->
  <text x="680" y="370" text-anchor="middle" fill="#94a3b8" font-size="12">合成环境数量 →</text>
  <!-- Y label -->
  <text x="492" y="235" text-anchor="middle" fill="#94a3b8" font-size="12" transform="rotate(-90, 492, 235)">平均性能</text>

  <!-- Grid -->
  <line x1="510" y1="280" x2="850" y2="280" stroke="#334155" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="510" y1="220" x2="850" y2="220" stroke="#334155" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="510" y1="160" x2="850" y2="160" stroke="#334155" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- X tick labels -->
  <text x="540" y="356" text-anchor="middle" fill="#64748b" font-size="10">200</text>
  <text x="620" y="356" text-anchor="middle" fill="#64748b" font-size="10">600</text>
  <text x="700" y="356" text-anchor="middle" fill="#64748b" font-size="10">1000</text>
  <text x="780" y="356" text-anchor="middle" fill="#64748b" font-size="10">1400</text>
  <text x="840" y="356" text-anchor="middle" fill="#64748b" font-size="10">1978</text>

  <!-- Scaling curve (environments) -->
  <path d="M540,305 C580,275 620,250 660,225 S740,185 780,170 S820,158 840,153" fill="none" stroke="#4ade80" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Data points -->
  <circle cx="540" cy="305" r="5" fill="#4ade80"/>
  <circle cx="620" cy="250" r="5" fill="#4ade80"/>
  <circle cx="700" cy="218" r="5" fill="#4ade80"/>
  <circle cx="780" cy="170" r="5" fill="#4ade80"/>
  <circle cx="840" cy="153" r="6" fill="#4ade80" filter="url(#glow)"/>

  <!-- Self-evolution rounds curve -->
  <path d="M540,318 C580,298 620,272 660,252 S740,218 780,200 S820,185 840,178" fill="none" stroke="#f97316" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="8,4"/>
  <circle cx="540" cy="318" r="4" fill="#f97316"/>
  <circle cx="620" cy="272" r="4" fill="#f97316"/>
  <circle cx="700" cy="240" r="4" fill="#f97316"/>
  <circle cx="780" cy="200" r="4" fill="#f97316"/>
  <circle cx="840" cy="178" r="4" fill="#f97316"/>

  <!-- Legend -->
  <line x1="640" y1="395" x2="670" y2="395" stroke="#4ade80" stroke-width="3"/>
  <circle cx="655" cy="395" r="3" fill="#4ade80"/>
  <text x="677" y="399" fill="#94a3b8" font-size="11">环境数量扩展</text>

  <line x1="640" y1="415" x2="670" y2="415" stroke="#f97316" stroke-width="2.5" stroke-dasharray="6,3"/>
  <circle cx="655" cy="415" r="3" fill="#f97316"/>
  <text x="677" y="419" fill="#94a3b8" font-size="11">自进化轮数</text>

  <!-- ========== BOTTOM: Key Insight Box ========== -->
  <rect x="60" y="440" width="780" height="100" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>

  <!-- VS block -->
  <rect x="90" y="455" width="220" height="70" rx="8" fill="#172554" stroke="#3b82f6" stroke-width="1" opacity="0.8"/>
  <text x="200" y="478" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="bold">Qwen3-235B-A22B</text>
  <text x="200" y="498" text-anchor="middle" fill="#64748b" font-size="11">235B 参数 · 传统训练</text>
  <text x="200" y="516" text-anchor="middle" fill="#f87171" font-size="12">❌ 被 8B 模型超越</text>

  <!-- VS circle -->
  <circle cx="370" cy="490" r="22" fill="#0f172a" stroke="#f97316" stroke-width="2"/>
  <text x="370" y="495" text-anchor="middle" fill="#f97316" font-size="14" font-weight="bold">VS</text>

  <!-- Agent-World block -->
  <rect x="430" y="455" width="220" height="70" rx="8" fill="#052e16" stroke="#4ade80" stroke-width="1.5" filter="url(#glow)"/>
  <text x="540" y="478" text-anchor="middle" fill="#86efac" font-size="12" font-weight="bold">Agent-World-8B</text>
  <text x="540" y="498" text-anchor="middle" fill="#64748b" font-size="11">8B 参数 · 1978 环境 · 自进化</text>
  <text x="540" y="516" text-anchor="middle" fill="#4ade80" font-size="12">✅ 23 基准全面领先</text>

  <!-- Conclusion tag -->
  <rect x="680" y="462" width="140" height="56" rx="8" fill="#431407" stroke="#f97316" stroke-width="1.2"/>
  <text x="750" y="484" text-anchor="middle" fill="#fdba74" font-size="12" font-weight="bold">核心结论</text>
  <text x="750" y="503" text-anchor="middle" fill="#fef3c7" font-size="11">环境质量 &gt;</text>
  <text x="750" y="517" text-anchor="middle" fill="#fef3c7" font-size="11">参数堆叠</text>
</svg>