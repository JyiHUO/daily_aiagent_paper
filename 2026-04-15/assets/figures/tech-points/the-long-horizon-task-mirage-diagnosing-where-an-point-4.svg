<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="gOrange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8a3d"/>
      <stop offset="100%" stop-color="#ff6b1a"/>
    </linearGradient>
    <linearGradient id="gBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a9eff"/>
      <stop offset="100%" stop-color="#2d7be5"/>
    </linearGradient>
    <linearGradient id="gGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="gPurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7dd3fc"/>
    </marker>
    <marker id="arrowG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="700">LLM-as-Judge 轨迹诊断流水线</text>
  <text x="450" y="66" text-anchor="middle" fill="#94a3b8" font-size="13">用 LLM 裁判替代人工，大规模自动诊断 Agent 失败原因</text>

  <!-- ===== Module 1: Failed Trajectories ===== -->
  <rect x="40" y="110" width="200" height="130" rx="14" fill="url(#gOrange)" opacity="0.15" stroke="#ff8a3d" stroke-width="2"/>
  <text x="140" y="145" text-anchor="middle" fill="#ff8a3d" font-size="16" font-weight="700">🗂 失败轨迹</text>
  <text x="140" y="172" text-anchor="middle" fill="#cbd5e1" font-size="12">3100+ 条 Agent 执行记录</text>
  <text x="140" y="192" text-anchor="middle" fill="#94a3b8" font-size="11">Web · OS · Embodied · DB</text>
  <rect x="65" y="207" width="150" height="22" rx="6" fill="#ff8a3d" opacity="0.2"/>
  <text x="140" y="222" text-anchor="middle" fill="#fbbf24" font-size="11">人工标注不现实 ❌</text>

  <!-- Arrow 1→2 -->
  <line x1="240" y1="175" x2="310" y2="175" stroke="#7dd3fc" stroke-width="2.5" marker-end="url(#arrow)" stroke-dasharray="6,3"/>

  <!-- ===== Module 2: LLM Judge ===== -->
  <rect x="320" y="95" width="240" height="160" rx="16" fill="url(#gBlue)" opacity="0.13" stroke="#4a9eff" stroke-width="2.5"/>
  <text x="440" y="128" text-anchor="middle" fill="#4a9eff" font-size="18" font-weight="700">🤖 LLM 裁判</text>
  <text x="440" y="153" text-anchor="middle" fill="#cbd5e1" font-size="12">读取完整轨迹 + 上下文</text>
  <!-- 7-class box -->
  <rect x="345" y="165" width="190" height="38" rx="8" fill="#4a9eff" opacity="0.18"/>
  <text x="440" y="181" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">基于 7 类失败分类体系标注</text>
  <text x="440" y="196" text-anchor="middle" fill="#7dd3fc" font-size="10">Forgetting · False Assumption · …</text>
  <text x="440" y="232" text-anchor="middle" fill="#94a3b8" font-size="11">自动归因每条失败类型</text>

  <!-- Arrow 2→3 -->
  <line x1="560" y1="175" x2="630" y2="175" stroke="#7dd3fc" stroke-width="2.5" marker-end="url(#arrow)" stroke-dasharray="6,3"/>

  <!-- ===== Module 3: Diagnosis Output ===== -->
  <rect x="640" y="110" width="220" height="130" rx="14" fill="url(#gPurple)" opacity="0.13" stroke="#a78bfa" stroke-width="2"/>
  <text x="750" y="143" text-anchor="middle" fill="#a78bfa" font-size="16" font-weight="700">📊 诊断结果</text>
  <text x="750" y="170" text-anchor="middle" fill="#cbd5e1" font-size="12">每条轨迹 → 失败类型标签</text>
  <text x="750" y="192" text-anchor="middle" fill="#94a3b8" font-size="11">大规模 · 可复现 · 跨域对比</text>
  <rect x="670" y="205" width="160" height="22" rx="6" fill="#a78bfa" opacity="0.2"/>
  <text x="750" y="220" text-anchor="middle" fill="#c4b5fd" font-size="11">规划/记忆失败随 horizon ↑</text>

  <!-- ===== Calibration Section ===== -->
  <rect x="120" y="310" width="660" height="200" rx="16" fill="#0f1729" stroke="#334155" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="450" y="340" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="600">🔬 校准验证（40 条轨迹）</text>

  <!-- Human annotators -->
  <rect x="160" y="365" width="170" height="100" rx="12" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
  <text x="245" y="393" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">👤 ↔ 👤</text>
  <text x="245" y="413" text-anchor="middle" fill="#94a3b8" font-size="12">人类间一致性</text>
  <rect x="190" y="425" width="110" height="28" rx="8" fill="#fbbf24" opacity="0.15" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="245" y="444" text-anchor="middle" fill="#fbbf24" font-size="15" font-weight="700">κ = 0.61</text>

  <!-- VS -->
  <text x="450" y="425" text-anchor="middle" fill="#475569" font-size="28" font-weight="800">VS</text>

  <!-- LLM vs Human -->
  <rect x="560" y="365" width="185" height="100" rx="12" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
  <text x="652" y="393" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">🤖 ↔ 👤</text>
  <text x="652" y="413" text-anchor="middle" fill="#94a3b8" font-size="12">LLM Judge vs 人类</text>
  <rect x="582" y="425" width="140" height="28" rx="8" fill="#34d399" opacity="0.2" stroke="#34d399" stroke-width="2"/>
  <text x="652" y="444" text-anchor="middle" fill="#34d399" font-size="15" font-weight="700" filter="url(#glow)">κ = 0.84 ✓</text>

  <!-- Comparison arrow -->
  <line x1="365" y1="415" x2="410" y2="415" stroke="#475569" stroke-width="1.5"/>
  <line x1="490" y1="415" x2="545" y2="415" stroke="#475569" stroke-width="1.5"/>

  <!-- Upward arrow from calibration to LLM Judge -->
  <path d="M440,310 L440,260" stroke="#34d399" stroke-width="2" marker-end="url(#arrowG)" fill="none"/>
  <text x="460" y="290" fill="#34d399" font-size="11" font-weight="600">校准通过</text>

  <!-- Key insight callout -->
  <rect x="555" y="505" width="310" height="36" rx="10" fill="#34d399" opacity="0.12" stroke="#34d399" stroke-width="1.5"/>
  <text x="710" y="528" text-anchor="middle" fill="#34d399" font-size="13" font-weight="700">💡 LLM比人类自洽性更高，可规模化</text>
</svg>