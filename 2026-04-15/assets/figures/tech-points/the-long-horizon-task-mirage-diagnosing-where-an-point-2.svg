<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="processGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#e84545"/>
    </linearGradient>
    <linearGradient id="designGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="bold">Agent 失败的 7 类 FMEA 诊断体系</text>
  <text x="450" y="66" text-anchor="middle" fill="#8899bb" font-size="13">一条轨迹可同时标注多种失败 — 正交维度，非互斥类别</text>

  <!-- ===== PFMEA Block (Left) ===== -->
  <rect x="40" y="90" width="390" height="310" rx="16" fill="#1e2a45" stroke="#ff6b35" stroke-width="2" filter="url(#shadow)"/>
  <rect x="40" y="90" width="390" height="48" rx="16" fill="url(#processGrad)"/>
  <rect x="40" y="114" width="390" height="24" fill="url(#processGrad)"/>
  <text x="235" y="121" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">过程级风险 PFMEA</text>
  <rect x="310" y="100" width="110" height="28" rx="14" fill="rgba(255,255,255,0.2)"/>
  <text x="365" y="119" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">占 72.5%</text>

  <!-- 4 PFMEA items -->
  <g transform="translate(70, 160)">
    <rect width="150" height="56" rx="10" fill="#2a3a5c" stroke="#ff8c5a" stroke-width="1.5"/>
    <text x="75" y="24" text-anchor="middle" fill="#ff8c5a" font-size="20">🌐</text>
    <text x="75" y="44" text-anchor="middle" fill="#ddeeff" font-size="12" font-weight="bold">Environment</text>
  </g>
  <g transform="translate(245, 160)">
    <rect width="150" height="56" rx="10" fill="#2a3a5c" stroke="#ff8c5a" stroke-width="1.5"/>
    <text x="75" y="24" text-anchor="middle" fill="#ff8c5a" font-size="20">📋</text>
    <text x="75" y="44" text-anchor="middle" fill="#ddeeff" font-size="12" font-weight="bold">Instruction</text>
  </g>
  <g transform="translate(70, 235)">
    <rect width="150" height="56" rx="10" fill="#2a3a5c" stroke="#ff8c5a" stroke-width="1.5"/>
    <text x="75" y="24" text-anchor="middle" fill="#ff8c5a" font-size="20">🗺️</text>
    <text x="75" y="44" text-anchor="middle" fill="#ddeeff" font-size="12" font-weight="bold">Planning Error</text>
  </g>
  <g transform="translate(245, 235)">
    <rect width="150" height="56" rx="10" fill="#2a3a5c" stroke="#ff8c5a" stroke-width="1.5"/>
    <text x="75" y="24" text-anchor="middle" fill="#ff8c5a" font-size="20">⚠️</text>
    <text x="75" y="44" text-anchor="middle" fill="#ddeeff" font-size="12" font-weight="bold">History Accumulation</text>
  </g>

  <text x="235" y="330" text-anchor="middle" fill="#7788aa" font-size="11" font-style="italic">执行过程中犯的错</text>
  <text x="235" y="348" text-anchor="middle" fill="#667799" font-size="10">看错环境 · 理解错指令 · 规划失误 · 错误累积</text>

  <!-- ===== DFMEA Block (Right) ===== -->
  <rect x="470" y="90" width="390" height="310" rx="16" fill="#1e2a45" stroke="#a855f7" stroke-width="2" filter="url(#shadow)"/>
  <rect x="470" y="90" width="390" height="48" rx="16" fill="url(#designGrad)"/>
  <rect x="470" y="114" width="390" height="24" fill="url(#designGrad)"/>
  <text x="665" y="121" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">设计级风险 DFMEA</text>
  <rect x="740" y="100" width="110" height="28" rx="14" fill="rgba(255,255,255,0.2)"/>
  <text x="795" y="119" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">占 27.5%</text>

  <!-- 3 DFMEA items -->
  <g transform="translate(500, 160)">
    <rect width="320" height="52" rx="10" fill="#2a3a5c" stroke="#b388ff" stroke-width="1.5"/>
    <text x="30" y="34" fill="#b388ff" font-size="20">🧠</text>
    <text x="60" y="31" fill="#ddeeff" font-size="13" font-weight="bold">Memory Limitation</text>
    <text x="260" y="31" fill="#8899bb" font-size="10">上下文太长记不住</text>
  </g>
  <g transform="translate(500, 228)">
    <rect width="320" height="52" rx="10" fill="#2a3a5c" stroke="#b388ff" stroke-width="1.5"/>
    <text x="30" y="34" fill="#b388ff" font-size="20">💨</text>
    <text x="60" y="31" fill="#ddeeff" font-size="13" font-weight="bold">Catastrophic Forgetting</text>
    <text x="280" y="31" fill="#8899bb" font-size="10">早期约束被丢弃</text>
  </g>
  <g transform="translate(500, 296)">
    <rect width="320" height="52" rx="10" fill="#2a3a5c" stroke="#b388ff" stroke-width="1.5"/>
    <text x="30" y="34" fill="#b388ff" font-size="20">❌</text>
    <text x="60" y="31" fill="#ddeeff" font-size="13" font-weight="bold">False Assumption</text>
    <text x="254" y="31" fill="#8899bb" font-size="10">错误假设不验证</text>
  </g>

  <text x="665" y="378" text-anchor="middle" fill="#7788aa" font-size="11" font-style="italic">Agent 架构缺陷导致的错</text>

  <!-- ===== Example Scene at Bottom ===== -->
  <rect x="40" y="420" width="820" height="185" rx="14" fill="#162036" stroke="#4a5a7a" stroke-width="1" filter="url(#shadow)"/>
  <text x="60" y="448" fill="#ffcc57" font-size="14" font-weight="bold">📖 实例：Web Agent 买耳机</text>

  <!-- Scene 1: Correct filter -->
  <rect x="60" y="465" width="200" height="100" rx="10" fill="#1e3050" stroke="#4ade80" stroke-width="1.5"/>
  <text x="160" y="488" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="bold">✅ 第1步</text>
  <text x="160" y="508" text-anchor="middle" fill="#ccdde8" font-size="11">正确设置过滤器</text>
  <text x="160" y="528" text-anchor="middle" fill="#78c6a3" font-size="13" font-weight="bold">Condition: New</text>
  <text x="160" y="548" text-anchor="middle" fill="#667799" font-size="10">约束 "全新" 在上下文中</text>

  <!-- Arrow -->
  <line x1="270" y1="515" x2="340" y2="515" stroke="#8899bb" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="305" y="505" text-anchor="middle" fill="#667799" font-size="10">长导航…</text>
  <defs>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#8899bb"/>
    </marker>
  </defs>

  <!-- Scene 2: Failure -->
  <rect x="350" y="465" width="200" height="100" rx="10" fill="#1e3050" stroke="#ef4444" stroke-width="1.5"/>
  <text x="450" y="488" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="bold">❌ 第N步</text>
  <text x="450" y="508" text-anchor="middle" fill="#ccdde8" font-size="11">买了 "Renewed" 耳机</text>
  <text x="450" y="528" text-anchor="middle" fill="#ef6b6b" font-size="13" font-weight="bold">"全新" 约束被遗忘</text>
  <text x="450" y="548" text-anchor="middle" fill="#667799" font-size="10">未做二次验证</text>

  <!-- Arrows to labels -->
  <line x1="560" y1="495" x2="620" y2="475" stroke="#b388ff" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="560" y1="535" x2="620" y2="545" stroke="#b388ff" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Dual failure tags -->
  <rect x="625" y="458" width="220" height="38" rx="8" fill="#3b2070" stroke="#b388ff" stroke-width="1.5"/>
  <text x="640" y="478" fill="#b388ff" font-size="12">💨</text>
  <text x="660" y="482" fill="#dcc8ff" font-size="12" font-weight="bold">Catastrophic Forgetting</text>

  <rect x="625" y="510" width="220" height="38" rx="8" fill="#3b2070" stroke="#b388ff" stroke-width="1.5"/>
  <text x="640" y="530" fill="#b388ff" font-size="12">❌</text>
  <text x="660" y="534" fill="#dcc8ff" font-size="12" font-weight="bold">False Assumption</text>

  <!-- Multi-label callout -->
  <rect x="640" y="560" width="190" height="24" rx="6" fill="rgba(255,204,87,0.15)" stroke="#ffcc57" stroke-width="1"/>
  <text x="735" y="576" text-anchor="middle" fill="#ffcc57" font-size="11" font-weight="bold">↑ 同一轨迹，两种失败并存</text>

  <!-- Key insight at very bottom -->
  <text x="450" y="614" text-anchor="middle" fill="#5577aa" font-size="11">核心洞察：随 Horizon 增长，Planning 和 Memory 类失败从少数变为主导失败模式</text>
</svg>