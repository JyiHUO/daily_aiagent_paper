<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2D7DD2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#45B764"/>
    </marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7F9FC"/>
      <stop offset="100%" stop-color="#E8ECF1"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" rx="18" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">GAM：双层图记忆解耦存储</text>
  <text x="450" y="66" text-anchor="middle" font-size="13" fill="#666">新对话写草稿本，话题结束才归档到全局地图 — 隔离噪声，保护长期记忆</text>

  <!-- ====== Global Topic Network (Top Layer) ====== -->
  <rect x="60" y="95" width="370" height="230" rx="16" fill="#EAF0FB" stroke="#2D7DD2" stroke-width="2" filter="url(#shadow)"/>
  <text x="245" y="122" text-anchor="middle" font-size="15" font-weight="bold" fill="#2D7DD2">🌐 全局主题网络 G_topic</text>
  <text x="245" y="140" text-anchor="middle" font-size="11" fill="#5580AA">高层语义主题 · 长期稳定</text>

  <!-- Topic nodes -->
  <circle cx="155" cy="200" r="38" fill="#fff" stroke="#2D7DD2" stroke-width="2.5"/>
  <text x="155" y="195" text-anchor="middle" font-size="12" font-weight="bold" fill="#2D7DD2">Apple</text>
  <text x="155" y="210" text-anchor="middle" font-size="11" fill="#2D7DD2">Tech 📱</text>

  <circle cx="320" cy="200" r="38" fill="#fff" stroke="#2D7DD2" stroke-width="2.5"/>
  <text x="320" y="195" text-anchor="middle" font-size="12" font-weight="bold" fill="#2D7DD2">Apple</text>
  <text x="320" y="210" text-anchor="middle" font-size="11" fill="#2D7DD2">Fruit 🍎</text>

  <!-- No link between them - explicit gap -->
  <line x1="193" y1="200" x2="282" y2="200" stroke="#ccc" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="237" y="193" text-anchor="middle" font-size="10" fill="#999">✗ 不合并</text>

  <!-- Relation edge example -->
  <circle cx="230" cy="280" r="24" fill="#D6E6FA" stroke="#2D7DD2" stroke-width="1.5"/>
  <text x="230" y="284" text-anchor="middle" font-size="10" fill="#2D7DD2">健康</text>
  <line x1="308" y1="234" x2="248" y2="262" stroke="#2D7DD2" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- ====== Event Progression Graph (Bottom-left) ====== -->
  <rect x="60" y="355" width="370" height="220" rx="16" fill="#E8F8EC" stroke="#45B764" stroke-width="2" filter="url(#shadow)"/>
  <text x="245" y="382" text-anchor="middle" font-size="15" font-weight="bold" fill="#2E8B47">📝 事件图 G_event（草稿本）</text>
  <text x="245" y="400" text-anchor="middle" font-size="11" fill="#5A9E6D">实时对话 · 原子事件 · 时序/因果</text>

  <!-- Event nodes chain -->
  <rect x="85" y="420" width="90" height="44" rx="10" fill="#fff" stroke="#45B764" stroke-width="2"/>
  <text x="130" y="438" text-anchor="middle" font-size="10" fill="#333">聊苹果手机</text>
  <text x="130" y="452" text-anchor="middle" font-size="9" fill="#888">t₁</text>

  <rect x="210" y="420" width="90" height="44" rx="10" fill="#fff" stroke="#45B764" stroke-width="2"/>
  <text x="255" y="438" text-anchor="middle" font-size="10" fill="#333">聊苹果水果</text>
  <text x="255" y="452" text-anchor="middle" font-size="9" fill="#888">t₂</text>

  <rect x="335" y="420" width="75" height="44" rx="10" fill="#fff" stroke="#45B764" stroke-width="2"/>
  <text x="372" y="438" text-anchor="middle" font-size="10" fill="#333">比价格</text>
  <text x="372" y="452" text-anchor="middle" font-size="9" fill="#888">t₃</text>

  <!-- Arrows between events -->
  <line x1="175" y1="442" x2="207" y2="442" stroke="#45B764" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="300" y1="442" x2="332" y2="442" stroke="#45B764" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Label: 时序 -->
  <text x="191" y="433" text-anchor="middle" font-size="9" fill="#45B764">时序→</text>

  <!-- Noise indicator -->
  <rect x="120" y="490" width="220" height="32" rx="8" fill="#FFF3CD" stroke="#E6A817" stroke-width="1.2"/>
  <text x="230" y="510" text-anchor="middle" font-size="11" fill="#856404">⚡ 临时噪声只留在这里，不上传</text>

  <!-- ====== Archive + Cross-layer (Right side) ====== -->
  <rect x="490" y="160" width="360" height="350" rx="16" fill="#FFF8F0" stroke="#E8833A" stroke-width="2" filter="url(#shadow)"/>
  <text x="670" y="190" text-anchor="middle" font-size="15" font-weight="bold" fill="#C66A1D">📦 归档事件图集 S_arch</text>
  <text x="670" y="208" text-anchor="middle" font-size="11" fill="#B07840">话题结束 → 提炼归档</text>

  <!-- Archived mini-graphs -->
  <rect x="520" y="230" width="130" height="80" rx="10" fill="#fff" stroke="#E8833A" stroke-width="1.5"/>
  <text x="585" y="254" text-anchor="middle" font-size="11" font-weight="bold" fill="#C66A1D">归档 #1</text>
  <circle cx="553" cy="283" r="10" fill="#D6E6FA" stroke="#2D7DD2" stroke-width="1"/>
  <circle cx="585" cy="283" r="10" fill="#E8F8EC" stroke="#45B764" stroke-width="1"/>
  <circle cx="617" cy="283" r="10" fill="#E8F8EC" stroke="#45B764" stroke-width="1"/>
  <line x1="563" y1="283" x2="575" y2="283" stroke="#999" stroke-width="1"/>
  <line x1="595" y1="283" x2="607" y2="283" stroke="#999" stroke-width="1"/>

  <rect x="690" y="230" width="130" height="80" rx="10" fill="#fff" stroke="#E8833A" stroke-width="1.5"/>
  <text x="755" y="254" text-anchor="middle" font-size="11" font-weight="bold" fill="#C66A1D">归档 #2</text>
  <circle cx="723" cy="283" r="10" fill="#D6E6FA" stroke="#2D7DD2" stroke-width="1"/>
  <circle cx="755" cy="283" r="10" fill="#E8F8EC" stroke="#45B764" stroke-width="1"/>
  <circle cx="787" cy="283" r="10" fill="#E8F8EC" stroke="#45B764" stroke-width="1"/>
  <line x1="733" y1="283" x2="745" y2="283" stroke="#999" stroke-width="1"/>
  <line x1="765" y1="283" x2="777" y2="283" stroke="#999" stroke-width="1"/>

  <!-- Cross-layer edges label -->
  <text x="670" y="345" text-anchor="middle" font-size="12" fill="#C66A1D" font-weight="bold">E_cross 跨层边</text>

  <!-- Cross-layer connection illustration -->
  <rect x="560" y="365" width="220" height="65" rx="10" fill="#fff" stroke="#E8833A" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="670" y="387" text-anchor="middle" font-size="11" fill="#555">主题节点 ⟷ 归档事件</text>
  <text x="670" y="405" text-anchor="middle" font-size="11" fill="#555">按需检索，不直接修改</text>
  <text x="670" y="420" text-anchor="middle" font-size="10" fill="#999">物理隔离 ✓</text>

  <!-- ====== Arrows between layers ====== -->
  <!-- Event graph → Archive (话题结束时) -->
  <path d="M 430 465 C 470 465, 480 390, 520 355" fill="none" stroke="#E8833A" stroke-width="2.5" stroke-dasharray="7,4" marker-end="url(#arrow)"/>
  <text x="458" y="405" font-size="11" fill="#C66A1D" font-weight="bold" transform="rotate(-40, 458, 405)">话题结束→提炼</text>

  <!-- Topic ←→ Archive -->
  <path d="M 430 210 L 488 260" fill="none" stroke="#2D7DD2" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="475" y="225" font-size="10" fill="#2D7DD2" font-weight="bold">关联</text>

  <!-- ====== Core Insight Callout ====== -->
  <rect x="510" y="95" width="345" height="50" rx="12" fill="#2D7DD2" filter="url(#shadow)"/>
  <text x="682" y="117" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">💡 核心创新：编码与整合 显式解耦</text>
  <text x="682" y="135" text-anchor="middle" font-size="11" fill="#B8D4F0">感知敏捷（事件图） + 存储稳定（主题网络）</text>

  <!-- ====== Bottom legend ====== -->
  <rect x="160" y="585" width="580" height="28" rx="8" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <circle cx="200" cy="599" r="7" fill="#EAF0FB" stroke="#2D7DD2" stroke-width="1.5"/>
  <text x="215" y="603" font-size="11" fill="#555">主题层</text>
  <circle cx="300" cy="599" r="7" fill="#E8F8EC" stroke="#45B764" stroke-width="1.5"/>
  <text x="315" y="603" font-size="11" fill="#555">事件层</text>
  <circle cx="400" cy="599" r="7" fill="#FFF8F0" stroke="#E8833A" stroke-width="1.5"/>
  <text x="415" y="603" font-size="11" fill="#555">归档区</text>
  <line x1="490" y1="599" x2="520" y2="599" stroke="#ccc" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="530" y="603" font-size="11" fill="#555">物理隔离</text>
  <line x1="610" y1="599" x2="640" y2="599" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="650" y="603" font-size="11" fill="#555">数据流</text>
</svg>