<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="greenLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="planGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="memGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="bold">长程失败：结构性"断崖"而非线性退化</text>
  <text x="450" y="66" text-anchor="middle" fill="#94a3b8" font-size="13">Long-Horizon Task Mirage — HORIZON Framework 核心发现</text>

  <!-- ============ LEFT: Performance Cliff Chart ============ -->
  <rect x="40" y="90" width="400" height="280" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="240" y="118" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="bold">① 成功率随 Horizon 的"断崖"下降</text>

  <!-- Axes -->
  <line x1="90" y1="320" x2="400" y2="320" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="90" y1="320" x2="90" y2="140" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="250" y="348" text-anchor="middle" fill="#94a3b8" font-size="12">Task Horizon (s) →</text>
  <text x="62" y="230" text-anchor="middle" fill="#94a3b8" font-size="12" transform="rotate(-90,62,230)">成功率 %</text>

  <!-- Axis ticks -->
  <text x="110" y="336" text-anchor="middle" fill="#64748b" font-size="10">s=1</text>
  <text x="175" y="336" text-anchor="middle" fill="#64748b" font-size="10">s=2</text>
  <text x="240" y="336" text-anchor="middle" fill="#64748b" font-size="10">s=3</text>
  <text x="305" y="336" text-anchor="middle" fill="#64748b" font-size="10">s=4</text>
  <text x="370" y="336" text-anchor="middle" fill="#64748b" font-size="10">s=5</text>
  <text x="82" y="165" text-anchor="end" fill="#64748b" font-size="10">90</text>
  <text x="82" y="240" text-anchor="end" fill="#64748b" font-size="10">50</text>
  <text x="82" y="315" text-anchor="end" fill="#64748b" font-size="10">10</text>

  <!-- Break zone highlight -->
  <rect x="195" y="140" width="100" height="180" rx="6" fill="#ef4444" opacity="0.08"/>
  <text x="245" y="156" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="bold" opacity="0.8">断裂区</text>

  <!-- Performance curve — sharp drop -->
  <polyline points="110,162 175,175 220,210 260,290 305,305 370,312" fill="none" stroke="#38bdf8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <circle cx="110" cy="162" r="4" fill="#4ade80"/>
  <circle cx="175" cy="175" r="4" fill="#86efac"/>
  <circle cx="220" cy="210" r="4" fill="#fbbf24"/>
  <circle cx="260" cy="290" r="4" fill="#f87171"/>
  <circle cx="305" cy="305" r="4" fill="#ef4444"/>
  <circle cx="370" cy="312" r="4" fill="#dc2626"/>

  <!-- Annotation: not linear! -->
  <path d="M200,188 Q230,170 255,195" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="258" y="185" fill="#fbbf24" font-size="10" font-weight="bold">⚡ 非线性骤降</text>

  <!-- Models converge label -->
  <text x="350" y="296" fill="#94a3b8" font-size="9" text-anchor="middle">模型差距收窄</text>

  <!-- ============ RIGHT: Failure Composition Shift ============ -->
  <rect x="470" y="90" width="400" height="280" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="670" y="118" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="bold">② 失败原因的结构性转变</text>

  <!-- Short horizon bar -->
  <text x="500" y="155" fill="#94a3b8" font-size="12" font-weight="bold">短程 (s≤2)</text>
  <rect x="500" y="162" width="220" height="36" rx="6" fill="#22d3ee" opacity="0.7"/>
  <rect x="720" y="162" width="55" height="36" rx="0" fill="#f97316" opacity="0.7"/>
  <rect x="775" y="162" width="40" height="36" rx="6" fill="#a855f7" opacity="0.7"/>
  <text x="610" y="185" text-anchor="middle" fill="#0f172a" font-size="11" font-weight="bold">执行错误（主导）</text>
  <text x="747" y="185" text-anchor="middle" fill="#0f172a" font-size="9">规划</text>
  <text x="795" y="185" text-anchor="middle" fill="#0f172a" font-size="9">记忆</text>

  <!-- Arrow down -->
  <line x1="670" y1="210" x2="670" y2="240" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="700" y="230" fill="#fbbf24" font-size="11" font-weight="bold">horizon 增长</text>

  <!-- Long horizon bar -->
  <text x="500" y="268" fill="#94a3b8" font-size="12" font-weight="bold">长程 (s≥3)</text>
  <rect x="500" y="275" width="80" height="36" rx="6" fill="#22d3ee" opacity="0.4"/>
  <rect x="580" y="275" width="140" height="36" rx="0" fill="#f97316" opacity="0.85"/>
  <rect x="720" y="275" width="95" height="36" rx="6" fill="#a855f7" opacity="0.85"/>
  <text x="540" y="298" text-anchor="middle" fill="#94a3b8" font-size="9">执行</text>
  <text x="650" y="298" text-anchor="middle" fill="#0f172a" font-size="11" font-weight="bold">规划失控（主导）</text>
  <text x="768" y="298" text-anchor="middle" fill="#0f172a" font-size="10" font-weight="bold">记忆遗忘</text>

  <!-- Growth arrows on right bars -->
  <path d="M650,270 L650,255" stroke="#f97316" stroke-width="2.5" marker-end="url(#arrow)" opacity="0.9"/>
  <text x="660" y="252" fill="#f97316" font-size="10" font-weight="bold">↑大幅上升</text>
  <path d="M768,270 L768,255" stroke="#a855f7" stroke-width="2.5" marker-end="url(#arrow)" opacity="0.9"/>
  <text x="810" y="252" fill="#a855f7" font-size="10" font-weight="bold">↑上升</text>

  <!-- Legend -->
  <rect x="510" y="330" width="14" height="14" rx="3" fill="#22d3ee" opacity="0.7"/>
  <text x="530" y="342" fill="#94a3b8" font-size="11">执行错误</text>
  <rect x="610" y="330" width="14" height="14" rx="3" fill="#f97316" opacity="0.8"/>
  <text x="630" y="342" fill="#94a3b8" font-size="11">规划错误</text>
  <rect x="720" y="330" width="14" height="14" rx="3" fill="#a855f7" opacity="0.8"/>
  <text x="740" y="342" fill="#94a3b8" font-size="11">记忆遗忘</text>

  <!-- ============ BOTTOM: Snowball Effect ============ -->
  <rect x="40" y="395" width="820" height="195" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="450" y="425" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="bold">③ 错误雪球效应：规划偏差如何滚大</text>

  <!-- Step blocks -->
  <!-- Step 1 -->
  <rect x="80" y="450" width="130" height="70" rx="10" fill="#166534" stroke="#4ade80" stroke-width="2"/>
  <text x="145" y="478" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="bold">Step 1</text>
  <text x="145" y="500" text-anchor="middle" fill="#86efac" font-size="11">正确执行 ✓</text>

  <!-- Arrow -->
  <line x1="215" y1="485" x2="265" y2="485" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2 — small error -->
  <rect x="270" y="445" width="140" height="80" rx="10" fill="#713f12" stroke="#fbbf24" stroke-width="2"/>
  <text x="340" y="473" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">Step 2</text>
  <text x="340" y="493" text-anchor="middle" fill="#fde68a" font-size="11">规划小偏差 ⚠</text>
  <text x="340" y="511" text-anchor="middle" fill="#d4a017" font-size="9">状态开始偏移</text>

  <!-- Arrow -->
  <line x1="415" y1="485" x2="465" y2="485" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3 — bigger error -->
  <rect x="470" y="440" width="150" height="90" rx="10" fill="#7f1d1d" stroke="#f87171" stroke-width="2"/>
  <text x="545" y="468" text-anchor="middle" fill="#f87171" font-size="13" font-weight="bold">Step 3</text>
  <text x="545" y="490" text-anchor="middle" fill="#fca5a5" font-size="11">错误累积放大 ✗</text>
  <text x="545" y="510" text-anchor="middle" fill="#ef4444" font-size="9">基于错误状态继续</text>

  <!-- Arrow -->
  <line x1="625" y1="485" x2="675" y2="485" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4+ — total failure -->
  <rect x="680" y="435" width="150" height="100" rx="10" fill="#450a0a" stroke="#dc2626" stroke-width="2.5"/>
  <text x="755" y="468" text-anchor="middle" fill="#dc2626" font-size="13" font-weight="bold">Step 4+</text>
  <text x="755" y="490" text-anchor="middle" fill="#fca5a5" font-size="11">完全失控 ✗✗</text>
  <text x="755" y="510" text-anchor="middle" fill="#ef4444" font-size="9">不可恢复</text>

  <!-- Snowball size indicators -->
  <circle cx="145" cy="538" r="6" fill="#4ade80" opacity="0.5"/>
  <circle cx="340" cy="543" r="11" fill="#fbbf24" opacity="0.4"/>
  <circle cx="545" cy="548" r="17" fill="#f87171" opacity="0.35"/>
  <circle cx="755" cy="553" r="24" fill="#dc2626" opacity="0.3"/>
  <text x="450" y="578" text-anchor="middle" fill="#64748b" font-size="11">错误"雪球"越滚越大 ——→</text>

  <!-- Bottom insight -->
  <text x="450" y="608" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">💡 核心启示：提升模型能力不够，需针对性改进规划架构和记忆机制</text>
</svg>