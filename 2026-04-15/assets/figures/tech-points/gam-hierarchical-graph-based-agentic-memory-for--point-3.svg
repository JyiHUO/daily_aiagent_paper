<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F59E0B"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0F4FF"/>
      <stop offset="100%" stop-color="#E8ECF8"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" rx="18" fill="url(#bg)"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#1E293B">图引导多因子检索 — 自顶向下三步精准召回</text>
  <text x="450" y="66" text-anchor="middle" font-size="13" fill="#64748B">GAM: Graph-guided Multi-factor Retrieval</text>

  <!-- Query bubble -->
  <rect x="30" y="90" width="250" height="68" rx="16" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="155" y="114" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E40AF">🔍 查询</text>
  <text x="155" y="133" text-anchor="middle" font-size="11" fill="#334155">"Howard 去年圣诞节说了</text>
  <text x="155" y="148" text-anchor="middle" font-size="11" fill="#334155">什么关于火箭的事？"</text>

  <!-- Arrow from query to Step 1 -->
  <path d="M 280 124 L 330 124" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowBlue)" fill="none"/>

  <!-- ==================== STEP 1 ==================== -->
  <g transform="translate(340, 82)">
    <rect width="220" height="200" rx="14" fill="#FFF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
    <rect width="220" height="36" rx="14" fill="#3B82F6"/>
    <rect y="18" width="220" height="18" fill="#3B82F6"/>
    <text x="110" y="25" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFF">① 主题层语义锚定</text>

    <!-- Topic graph mini-diagram -->
    <!-- Nodes -->
    <circle cx="110" cy="100" r="28" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
    <text x="110" y="96" text-anchor="middle" font-size="10" font-weight="bold" fill="#1E40AF">太空</text>
    <text x="110" y="108" text-anchor="middle" font-size="10" font-weight="bold" fill="#1E40AF">火箭🚀</text>

    <circle cx="50" cy="160" r="22" fill="#F0F9FF" stroke="#93C5FD" stroke-width="1.5"/>
    <text x="50" y="156" text-anchor="middle" font-size="9" fill="#3B82F6">NASA</text>
    <text x="50" y="168" text-anchor="middle" font-size="9" fill="#3B82F6">实习</text>

    <circle cx="170" cy="160" r="22" fill="#F0F9FF" stroke="#93C5FD" stroke-width="1.5"/>
    <text x="170" y="156" text-anchor="middle" font-size="9" fill="#3B82F6">航天</text>
    <text x="170" y="168" text-anchor="middle" font-size="9" fill="#3B82F6">工程</text>

    <!-- Edges -->
    <line x1="95" y1="123" x2="62" y2="143" stroke="#93C5FD" stroke-width="1.5"/>
    <line x1="125" y1="123" x2="158" y2="143" stroke="#93C5FD" stroke-width="1.5"/>

    <text x="110" y="60" text-anchor="middle" font-size="10" fill="#64748B">G_topic 向量匹配 + 1阶邻居</text>
  </g>

  <!-- Arrow Step1 → Step2 -->
  <path d="M 450 282 L 450 310 Q 450 320 450 320 L 450 340" stroke="#F59E0B" stroke-width="2.5" stroke-dasharray="6,4" marker-end="url(#arrowOrange)" fill="none"/>
  <text x="462" y="316" font-size="10" fill="#D97706" font-weight="bold">E_cross 钻取</text>

  <!-- ==================== STEP 2 ==================== -->
  <g transform="translate(310, 348)">
    <rect width="280" height="130" rx="14" fill="#FFF" stroke="#F59E0B" stroke-width="2" filter="url(#shadow)"/>
    <rect width="280" height="36" rx="14" fill="#F59E0B"/>
    <rect y="18" width="280" height="18" fill="#F59E0B"/>
    <text x="140" y="25" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFF">② 归档事件图细节钻取</text>

    <!-- Mini event cards -->
    <rect x="15" y="50" width="75" height="60" rx="8" fill="#FEF3C7" stroke="#FBBF24" stroke-width="1"/>
    <text x="52" y="70" text-anchor="middle" font-size="9" font-weight="bold" fill="#92400E">对话 A</text>
    <text x="52" y="83" text-anchor="middle" font-size="8" fill="#78716C">12月24日</text>
    <text x="52" y="96" text-anchor="middle" font-size="8" fill="#78716C">Howard 发言</text>

    <rect x="103" y="50" width="75" height="60" rx="8" fill="#FEF3C7" stroke="#FBBF24" stroke-width="1"/>
    <text x="140" y="70" text-anchor="middle" font-size="9" font-weight="bold" fill="#92400E">对话 B</text>
    <text x="140" y="83" text-anchor="middle" font-size="8" fill="#78716C">12月20日</text>
    <text x="140" y="96" text-anchor="middle" font-size="8" fill="#78716C">Raj 发言</text>

    <rect x="191" y="50" width="75" height="60" rx="8" fill="#FEF3C7" stroke="#FBBF24" stroke-width="1"/>
    <text x="228" y="70" text-anchor="middle" font-size="9" font-weight="bold" fill="#92400E">对话 C</text>
    <text x="228" y="83" text-anchor="middle" font-size="8" fill="#78716C">3月5日</text>
    <text x="228" y="96" text-anchor="middle" font-size="8" fill="#78716C">Howard 发言</text>

    <text x="140" y="125" text-anchor="middle" font-size="10" fill="#64748B">候选细节集合 C</text>
  </g>

  <!-- Arrow Step2 → Step3 -->
  <path d="M 590 420 L 640 420" stroke="#10B981" stroke-width="2.5" marker-end="url(#arrow)" fill="none"/>

  <!-- ==================== STEP 3 ==================== -->
  <g transform="translate(650, 335)">
    <rect width="230" height="260" rx="14" fill="#FFF" stroke="#10B981" stroke-width="2" filter="url(#shadow)"/>
    <rect width="230" height="36" rx="14" fill="#10B981"/>
    <rect y="18" width="230" height="18" fill="#10B981"/>
    <text x="115" y="25" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFF">③ 多因子重排序</text>

    <!-- Formula representation -->
    <text x="115" y="58" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E293B">Score = P_sem × Boost</text>

    <!-- Factor bars -->
    <!-- Semantic -->
    <rect x="18" y="75" width="195" height="28" rx="6" fill="#D1FAE5"/>
    <text x="28" y="94" font-size="11" fill="#065F46" font-weight="bold">P_sem</text>
    <text x="120" y="94" font-size="10" fill="#065F46">Cross-Encoder 语义分</text>

    <!-- Time -->
    <rect x="18" y="110" width="195" height="28" rx="6" fill="#FEF3C7"/>
    <text x="28" y="129" font-size="11" fill="#92400E" font-weight="bold">⏰ 时间</text>
    <text x="130" y="129" font-size="10" fill="#92400E">β=1.4 → 圣诞节优先</text>

    <!-- Role -->
    <rect x="18" y="145" width="195" height="28" rx="6" fill="#DBEAFE"/>
    <text x="28" y="164" font-size="11" fill="#1E40AF" font-weight="bold">👤 角色</text>
    <text x="130" y="164" font-size="10" fill="#1E40AF">β=1.4 → Howard 优先</text>

    <!-- Confidence -->
    <rect x="18" y="180" width="195" height="28" rx="6" fill="#F3E8FF"/>
    <text x="28" y="199" font-size="11" fill="#6B21A8" font-weight="bold">✓ 置信度</text>
    <text x="140" y="199" font-size="10" fill="#6B21A8">β=1.2 → 高信编码</text>

    <!-- Result -->
    <rect x="30" y="220" width="170" height="30" rx="10" fill="#10B981"/>
    <text x="115" y="240" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFF">🏆 Top-K 精准结果</text>
  </g>

  <!-- Big curved arrow showing the top-down flow idea -->
  <path d="M 155 158 Q 155 250 280 250 Q 340 250 340 290 Q 340 360 310 410" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="4,3" fill="none" marker-end="url(#arrow)"/>
  <text x="200" y="248" font-size="10" fill="#94A3B8" transform="rotate(-10, 200, 248)">自顶向下</text>

  <!-- Bottom insight box -->
  <rect x="30" y="560" width="540" height="44" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
  <text x="50" y="580" font-size="12" fill="#475569" font-weight="bold">💡 核心优势：</text>
  <text x="160" y="580" font-size="12" fill="#475569">主题层过滤噪声 → 事件层精确定位 → 多因子排序避免单一语义偏差</text>
  <text x="50" y="596" font-size="11" fill="#94A3B8">boost 因子在 1.0~2.0 范围内性能稳定，无需精细调参</text>
</svg>