<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="busGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="oldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="newGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">File-as-Bus：持久状态协议</text>
  <text x="450" y="66" text-anchor="middle" fill="#94a3b8" font-size="13">用共享文件替代对话接力，让 Agent 状态在 24h 长周期中不丢失</text>

  <!-- ===== LEFT: Old way (Chat Relay) ===== -->
  <rect x="30" y="90" width="390" height="260" rx="14" fill="url(#oldGrad)" stroke="#ef4444" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="225" y="118" text-anchor="middle" fill="#f87171" font-size="15" font-weight="700">❌ 传统：对话接力</text>

  <!-- Agent circles old -->
  <circle cx="100" cy="185" r="32" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
  <text x="100" y="182" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">Agent</text>
  <text x="100" y="196" text-anchor="middle" fill="#94a3b8" font-size="10">分析</text>

  <circle cx="225" cy="185" r="32" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
  <text x="225" y="182" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">Agent</text>
  <text x="225" y="196" text-anchor="middle" fill="#94a3b8" font-size="10">实现</text>

  <circle cx="350" cy="185" r="32" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
  <text x="350" y="182" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">Agent</text>
  <text x="350" y="196" text-anchor="middle" fill="#94a3b8" font-size="10">实验</text>

  <!-- Dashed arrows between old agents -->
  <line x1="135" y1="185" x2="190" y2="185" stroke="#f87171" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowRed)"/>
  <line x1="260" y1="185" x2="315" y2="185" stroke="#f87171" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowRed)"/>
  <defs>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f87171"/>
    </marker>
  </defs>

  <!-- Speech bubbles fading -->
  <rect x="140" y="148" width="48" height="20" rx="6" fill="#f87171" fill-opacity="0.2" stroke="#f87171" stroke-opacity="0.4" stroke-width="1"/>
  <text x="164" y="162" text-anchor="middle" fill="#fca5a5" font-size="9">口头…</text>

  <rect x="268" y="148" width="48" height="20" rx="6" fill="#f87171" fill-opacity="0.12" stroke="#f87171" stroke-opacity="0.25" stroke-width="1"/>
  <text x="292" y="162" text-anchor="middle" fill="#fca5a5" font-size="9" opacity="0.5">遗忘…</text>

  <!-- Problem label -->
  <rect x="70" y="245" width="310" height="44" rx="8" fill="#450a0a" fill-opacity="0.6" stroke="#f87171" stroke-opacity="0.3" stroke-width="1"/>
  <text x="225" y="264" text-anchor="middle" fill="#fca5a5" font-size="12">上下文窗口溢出 → 6h后信息丢失</text>
  <text x="225" y="280" text-anchor="middle" fill="#f87171" font-size="11" font-weight="600">⬇ PaperBench -6.41 分</text>

  <!-- ===== RIGHT: New way (File-as-Bus) ===== -->
  <rect x="450" y="90" width="420" height="260" rx="14" fill="url(#newGrad)" stroke="#22c55e" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="660" y="118" text-anchor="middle" fill="#4ade80" font-size="15" font-weight="700">✅ File-as-Bus：文件即总线</text>

  <!-- Agents new -->
  <circle cx="520" cy="170" r="30" fill="#1e293b" stroke="#38bdf8" stroke-width="2" filter="url(#shadow)"/>
  <text x="520" y="167" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">分析</text>
  <text x="520" y="181" text-anchor="middle" fill="#7dd3fc" font-size="9">Agent</text>

  <circle cx="660" cy="170" r="30" fill="#1e293b" stroke="#a78bfa" stroke-width="2" filter="url(#shadow)"/>
  <text x="660" y="167" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">实现</text>
  <text x="660" y="181" text-anchor="middle" fill="#c4b5fd" font-size="9">Agent</text>

  <circle cx="800" cy="170" r="30" fill="#1e293b" stroke="#34d399" stroke-width="2" filter="url(#shadow)"/>
  <text x="800" y="167" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">实验</text>
  <text x="800" y="181" text-anchor="middle" fill="#6ee7b7" font-size="9">Agent</text>

  <!-- BUS bar -->
  <rect x="485" y="225" width="350" height="50" rx="10" fill="url(#busGrad)" filter="url(#glow)"/>
  <text x="660" y="248" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="800">📁 共享工作区（持久文件）</text>
  <text x="660" y="264" text-anchor="middle" fill="#451a03" font-size="10.5">paper-analysis/ · submission/ · agent/logs</text>

  <!-- Arrows to bus -->
  <defs>
    <marker id="arrowDown" viewBox="0 0 10 10" refX="5" refY="10" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 0 L 5 10 z" fill="#fbbf24"/>
    </marker>
    <marker id="arrowUp" viewBox="0 0 10 10" refX="5" refY="0" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 10 L 10 10 L 5 0 z" fill="#fbbf24"/>
    </marker>
  </defs>
  <line x1="520" y1="202" x2="520" y2="222" stroke="#fbbf24" stroke-width="2.5" marker-end="url(#arrowDown)"/>
  <line x1="660" y1="202" x2="660" y2="222" stroke="#fbbf24" stroke-width="2.5" marker-end="url(#arrowDown)"/>
  <line x1="800" y1="202" x2="800" y2="222" stroke="#fbbf24" stroke-width="2.5" marker-end="url(#arrowDown)"/>

  <!-- Read arrows back up (slightly offset) -->
  <line x1="535" y1="222" x2="535" y2="202" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowUp)"/>
  <line x1="675" y1="222" x2="675" y2="202" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowUp)"/>
  <line x1="815" y1="222" x2="815" y2="202" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowUp)"/>

  <!-- Write/Read labels -->
  <text x="508" y="215" text-anchor="middle" fill="#fde68a" font-size="9" font-weight="600">写</text>
  <text x="547" y="215" text-anchor="middle" fill="#fde68a" font-size="9">读</text>
  <text x="648" y="215" text-anchor="middle" fill="#fde68a" font-size="9" font-weight="600">写</text>
  <text x="687" y="215" text-anchor="middle" fill="#fde68a" font-size="9">读</text>
  <text x="788" y="215" text-anchor="middle" fill="#fde68a" font-size="9" font-weight="600">写</text>
  <text x="827" y="215" text-anchor="middle" fill="#fde68a" font-size="9">读</text>

  <!-- Permission note -->
  <rect x="495" y="286" width="300" height="28" rx="6" fill="#052e16" fill-opacity="0.7" stroke="#4ade80" stroke-opacity="0.3" stroke-width="1"/>
  <text x="645" y="304" text-anchor="middle" fill="#86efac" font-size="11">🔒 各Agent只写自己区域 · 日志仅追加</text>

  <!-- ===== BOTTOM: Example scenario ===== -->
  <rect x="50" y="380" width="800" height="110" rx="14" fill="#1e293b" stroke="#475569" stroke-width="1" filter="url(#shadow)"/>

  <!-- Step 1 -->
  <circle cx="130" cy="420" r="22" fill="#7c3aed" fill-opacity="0.2" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="130" y="416" text-anchor="middle" fill="#c4b5fd" font-size="20">1</text>
  <text x="130" y="455" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">实验Agent</text>
  <text x="130" y="470" text-anchor="middle" fill="#94a3b8" font-size="10">发现AUC低</text>

  <!-- Arrow 1→2 -->
  <path d="M 165 425 Q 220 410 265 425" stroke="#fbbf24" stroke-width="2" fill="none" marker-end="url(#arrowGold)"/>
  <defs>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fbbf24"/>
    </marker>
  </defs>

  <!-- Step 2 (file) -->
  <rect x="270" y="400" width="120" height="50" rx="8" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="330" y="422" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="700">📄 exp-log.md</text>
  <text x="330" y="440" text-anchor="middle" fill="#fde68a" font-size="10">诊断+错误指标</text>

  <!-- Arrow 2→3 -->
  <path d="M 395 425 Q 445 408 490 425" stroke="#fbbf24" stroke-width="2" fill="none" marker-end="url(#arrowGold)"/>
  <text x="445" y="405" text-anchor="middle" fill="#94a3b8" font-size="10" font-style="italic">6小时后…</text>

  <!-- Step 3 -->
  <circle cx="540" cy="420" r="22" fill="#2563eb" fill-opacity="0.2" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="540" y="416" text-anchor="middle" fill="#93c5fd" font-size="20">2</text>
  <text x="540" y="455" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">实现Agent</text>
  <text x="540" y="470" text-anchor="middle" fill="#94a3b8" font-size="10">读文件→定位Bug</text>

  <!-- Arrow 3→4 -->
  <path d="M 575 425 Q 625 410 665 425" stroke="#4ade80" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  <defs>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4ade80"/>
    </marker>
  </defs>

  <!-- Step 4 -->
  <rect x="670" y="400" width="130" height="50" rx="8" fill="#22c55e" fill-opacity="0.15" stroke="#22c55e" stroke-width="1.5"/>
  <text x="735" y="422" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="700">✅ 修复完成</text>
  <text x="735" y="440" text-anchor="middle" fill="#86efac" font-size="10">无需回忆对话</text>

  <!-- Bottom stats bar -->
  <rect x="100" y="520" width="310" height="64" rx="12" fill="#450a0a" fill-opacity="0.5" stroke="#f87171" stroke-opacity="0.3" stroke-width="1"/>
  <text x="255" y="545" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="600">无 File-as-Bus</text>
  <text x="255" y="567" text-anchor="middle" fill="#f87171" font-size="16" font-weight="800">PaperBench -6.41 · Medal% -31.82</text>

  <rect x="470" y="520" width="310" height="64" rx="12" fill="#052e16" fill-opacity="0.5" stroke="#4ade80" stroke-opacity="0.3" stroke-width="1"/>
  <text x="625" y="545" text-anchor="middle" fill="#86efac" font-size="12" font-weight="600">有 File-as-Bus</text>
  <text x="625" y="567" text-anchor="middle" fill="#4ade80" font-size="16" font-weight="800">状态零丢失 · 24h 连贯迭代</text>

  <!-- VS divider -->
  <circle cx="430" cy="552" r="18" fill="#334155" stroke="#64748b" stroke-width="1.5"/>
  <text x="430" y="558" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="800">VS</text>
</svg>