<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="g0" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#357ABD"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#E8951D"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7ED321"/>
      <stop offset="100%" stop-color="#6BBF1A"/>
    </linearGradient>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#357ABD"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" rx="16" fill="#F7F8FC"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#222">薄控制 · 厚状态：分层编排架构</text>
  <text x="450" y="66" text-anchor="middle" font-size="13" fill="#888">Thin Control over Thick State — AiScientist</text>

  <!-- ===== TIER 0: Orchestrator ===== -->
  <rect x="280" y="88" width="340" height="100" rx="16" fill="url(#g0)" filter="url(#shadow)"/>
  <text x="450" y="118" text-anchor="middle" font-size="18" font-weight="bold" fill="#fff">Tier-0 编排器</text>
  <text x="450" y="142" text-anchor="middle" font-size="13" fill="#D4E6F9">只看 Workspace Map + 阶段摘要</text>
  <text x="450" y="162" text-anchor="middle" font-size="12" fill="#B0D0F0">💡 轻量上下文，不载入全部代码</text>

  <!-- label: thin control -->
  <rect x="636" y="104" width="108" height="30" rx="12" fill="#fff" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="690" y="124" text-anchor="middle" font-size="12" font-weight="bold" fill="#357ABD">薄控制层</text>

  <!-- Arrows down from Tier-0 to Tier-1 experts -->
  <line x1="320" y1="188" x2="148" y2="278" stroke="#555" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="400" y1="188" x2="320" y2="278" stroke="#555" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="450" y1="188" x2="450" y2="278" stroke="#555" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="500" y1="188" x2="580" y2="278" stroke="#555" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="580" y1="188" x2="740" y2="278" stroke="#555" stroke-width="2.2" marker-end="url(#arrow)"/>

  <!-- "Agent-as-Tool 调用" label on arrow -->
  <rect x="540" y="226" width="130" height="22" rx="8" fill="#FFF3D6" stroke="#E8951D" stroke-width="1"/>
  <text x="605" y="241" text-anchor="middle" font-size="11" fill="#B87A00">Agent-as-Tool 调用</text>

  <!-- ===== TIER 1: Experts ===== -->
  <!-- Expert 1: Paper -->
  <rect x="70" y="280" width="138" height="64" rx="12" fill="url(#g1)" filter="url(#shadow)"/>
  <text x="139" y="306" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">📄 论文理解</text>
  <text x="139" y="324" text-anchor="middle" font-size="11" fill="#FFF1D0">专家</text>

  <!-- Expert 2: Priority -->
  <rect x="240" y="280" width="138" height="64" rx="12" fill="url(#g1)" filter="url(#shadow)"/>
  <text x="309" y="306" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">🎯 优先级排序</text>
  <text x="309" y="324" text-anchor="middle" font-size="11" fill="#FFF1D0">专家</text>

  <!-- Expert 3: Implementation -->
  <rect x="400" y="280" width="138" height="64" rx="12" fill="url(#g1)" filter="url(#shadow)" stroke="#fff" stroke-width="2"/>
  <text x="469" y="306" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">🔧 实现</text>
  <text x="469" y="324" text-anchor="middle" font-size="11" fill="#FFF1D0">专家</text>

  <!-- Expert 4: Experiment -->
  <rect x="560" y="280" width="138" height="64" rx="12" fill="url(#g1)" filter="url(#shadow)"/>
  <text x="629" y="306" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">🧪 实验</text>
  <text x="629" y="324" text-anchor="middle" font-size="11" fill="#FFF1D0">专家</text>

  <!-- Expert 5: General -->
  <rect x="720" y="280" width="118" height="64" rx="12" fill="url(#g1)" filter="url(#shadow)"/>
  <text x="779" y="306" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">🛠 通用</text>
  <text x="779" y="324" text-anchor="middle" font-size="11" fill="#FFF1D0">助手</text>

  <!-- Tier-1 label -->
  <text x="32" y="316" font-size="13" font-weight="bold" fill="#E8951D" transform="rotate(-90 32 316)">Tier-1</text>

  <!-- Arrow from Implementation expert to Tier-2 -->
  <line x1="469" y1="344" x2="469" y2="400" stroke="#555" stroke-width="2.2" marker-end="url(#arrow)"/>

  <!-- ===== TIER 2: Sub-agents ===== -->
  <rect x="370" y="404" width="200" height="54" rx="12" fill="url(#g2)" filter="url(#shadow)"/>
  <text x="470" y="428" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Tier-2 子Agent</text>
  <text x="470" y="446" text-anchor="middle" font-size="11" fill="#E8FFD0">如：环境配置、调试…</text>

  <!-- label: thick state -->
  <rect x="588" y="412" width="108" height="30" rx="12" fill="#fff" stroke="#6BBF1A" stroke-width="1.5"/>
  <text x="642" y="432" text-anchor="middle" font-size="12" font-weight="bold" fill="#4A8F12">厚状态层</text>

  <!-- ===== Workspace / File Bus ===== -->
  <rect x="120" y="490" width="660" height="60" rx="14" fill="#EDE7F6" stroke="#9575CD" stroke-width="2" stroke-dasharray="6 3" filter="url(#shadow)"/>
  <text x="450" y="520" text-anchor="middle" font-size="16" font-weight="bold" fill="#5E35B1">📂 Workspace（File-as-Bus）</text>
  <text x="450" y="538" text-anchor="middle" font-size="12" fill="#7E57C2">workspace-map.md · exp-log.md · impl-log.md · 代码文件…</text>

  <!-- Arrows from Tier-2 and experts down to workspace -->
  <line x1="469" y1="458" x2="450" y2="488" stroke="#9575CD" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="5 3"/>
  <line x1="139" y1="344" x2="200" y2="488" stroke="#9575CD" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.5"/>
  <line x1="629" y1="344" x2="600" y2="488" stroke="#9575CD" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.5"/>

  <!-- Upward read arrow from workspace to Tier-0 -->
  <path d="M 170 490 C 60 400, 60 200, 280 130" fill="none" stroke="#357ABD" stroke-width="2.2" stroke-dasharray="7 4" marker-end="url(#arrowBlue)"/>
  <text x="52" y="330" font-size="11" fill="#357ABD" font-weight="bold">按需读取</text>
  <text x="36" y="346" font-size="11" fill="#357ABD">渐进式披露</text>

  <!-- ===== Comparison callout ===== -->
  <rect x="24" y="560" width="852" height="46" rx="10" fill="#FFF8E1" stroke="#F5A623" stroke-width="1.5"/>
  <text x="450" y="582" text-anchor="middle" font-size="13" fill="#8D6E15">
    <tspan font-weight="bold">对比：</tspan>
    <tspan>IterativeAgent（扁平无层次）更多轮次但上下文爆炸 →</tspan>
    <tspan font-weight="bold" fill="#D0021B"> 分数低 ~10分</tspan>
    <tspan> ｜ AiScientist 分层编排 → </tspan>
    <tspan font-weight="bold" fill="#417505">成本更低，分数更高 ✓</tspan>
  </text>
</svg>