<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
    <style>
      .title { font: 700 28px sans-serif; fill:#111827; }
      .subtitle { font: 400 15px sans-serif; fill:#4b5563; }
      .label { font: 700 17px sans-serif; fill:#111827; }
      .small { font: 600 14px sans-serif; fill:#374151; }
      .tiny { font: 600 13px sans-serif; fill:#6b7280; }
      .box { stroke:#cbd5e1; stroke-width:2; rx:18; ry:18; }
      .safe { fill:#ecfeff; stroke:#06b6d4; }
      .sandbox { fill:#fff7ed; stroke:#f97316; }
      .log { fill:#f5f3ff; stroke:#8b5cf6; }
      .warn { fill:#fef2f2; stroke:#ef4444; }
      .dash { stroke-dasharray:8 7; }
    </style>
  </defs>

  <rect width="900" height="560" fill="#ffffff"/>

  <text x="450" y="44" text-anchor="middle" class="title">LogAct 的关键：把“执行员”隔离出安全控制面</text>
  <text x="450" y="70" text-anchor="middle" class="subtitle">先写共享日志，再由安全侧审批；危险执行只能在沙箱里动手</text>

  <!-- shared log -->
  <rect x="310" y="100" width="280" height="74" class="box log"/>
  <text x="450" y="130" text-anchor="middle" class="label">Shared Log</text>
  <text x="450" y="153" text-anchor="middle" class="tiny">intention / vote / commit</text>

  <!-- safe tier -->
  <rect x="60" y="210" width="520" height="280" fill="#f8fafc" stroke="#94a3b8" stroke-width="2" rx="24"/>
  <text x="86" y="238" class="small">Safe tier</text>

  <rect x="95" y="280" width="130" height="110" class="box safe"/>
  <text x="160" y="330" text-anchor="middle" class="label">Driver</text>
  <text x="160" y="353" text-anchor="middle" class="tiny">提出 intention</text>

  <rect x="255" y="280" width="130" height="110" class="box safe"/>
  <text x="320" y="330" text-anchor="middle" class="label">Voter</text>
  <text x="320" y="353" text-anchor="middle" class="tiny">安全检查</text>

  <rect x="415" y="280" width="130" height="110" class="box safe"/>
  <text x="480" y="330" text-anchor="middle" class="label">Decider</text>
  <text x="480" y="353" text-anchor="middle" class="tiny">commit / abort</text>

  <!-- sandbox tier -->
  <rect x="640" y="210" width="200" height="280" fill="#fffaf5" stroke="#f59e0b" stroke-width="2" rx="24"/>
  <text x="665" y="238" class="small">Sandbox tier</text>

  <rect x="675" y="280" width="130" height="110" class="box sandbox"/>
  <text x="740" y="330" text-anchor="middle" class="label">Executor</text>
  <text x="740" y="353" text-anchor="middle" class="tiny">运行代码</text>

  <!-- arrows to log -->
  <line x1="160" y1="280" x2="360" y2="174" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="320" y1="280" x2="410" y2="174" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="480" y1="280" x2="490" y2="174" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- commit to executor -->
  <line x1="590" y1="137" x2="675" y2="137" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="633" y="126" text-anchor="middle" class="tiny">commit 后执行</text>
  <line x1="740" y1="174" x2="740" y2="280" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- blocked reverse influence -->
  <path d="M 675 335 C 620 335, 600 410, 545 410" fill="none" stroke="#dc2626" stroke-width="4" class="dash" marker-end="url(#arrowRed)"/>
  <path d="M 675 315 C 620 315, 600 360, 385 360" fill="none" stroke="#dc2626" stroke-width="4" class="dash" marker-end="url(#arrowRed)"/>
  <path d="M 675 295 C 620 295, 600 310, 225 310" fill="none" stroke="#dc2626" stroke-width="4" class="dash" marker-end="url(#arrowRed)"/>

  <!-- prohibition sign -->
  <circle cx="610" cy="350" r="34" fill="#ffffff" stroke="#dc2626" stroke-width="5"/>
  <line x1="587" y1="373" x2="633" y2="327" stroke="#dc2626" stroke-width="6" stroke-linecap="round"/>
  <text x="610" y="401" text-anchor="middle" class="small" fill="#dc2626">不能反向改票</text>

  <!-- note -->
  <rect x="290" y="506" width="320" height="34" rx="17" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="450" y="528" text-anchor="middle" class="small">即使执行侧失控，也碰不到审批与安全策略</text>
</svg>