<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
    <style>
      .title{font:700 28px sans-serif; fill:#111827}
      .subtitle{font:500 15px sans-serif; fill:#6b7280}
      .label{font:700 18px sans-serif; fill:#111827}
      .small{font:600 14px sans-serif; fill:#374151}
      .tiny{font:600 13px sans-serif; fill:#6b7280}
      .mono{font:600 13px monospace; fill:#1f2937}
    </style>
  </defs>

  <rect width="960" height="560" fill="#f8fafc"/>

  <text x="60" y="52" class="title">上下文价值有条件</text>
  <text x="60" y="78" class="subtitle">原生错误堆栈 &gt; 人工补采调用栈</text>

  <!-- center source -->
  <rect x="385" y="118" rx="20" ry="20" width="190" height="92" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="480" y="154" text-anchor="middle" class="label">复现运行</text>
  <text x="480" y="182" text-anchor="middle" class="small">同样从执行中拿“上下文”</text>

  <!-- left good -->
  <rect x="70" y="255" rx="24" ry="24" width="350" height="240" fill="#ecfdf5" stroke="#22c55e" stroke-width="3" filter="url(#shadow)"/>
  <text x="245" y="292" text-anchor="middle" class="label" fill="#166534">原生错误堆栈</text>

  <rect x="102" y="318" rx="14" ry="14" width="286" height="110" fill="#ffffff" stroke="#86efac" stroke-width="1.5"/>
  <text x="122" y="345" class="mono">test.py → runner()</text>
  <text x="122" y="370" class="mono">lib/core.py:898 parse()</text>
  <text x="122" y="395" class="mono">AttributeError: no attr</text>

  <circle cx="356" cy="370" r="24" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="356" y="376" text-anchor="middle" class="label" font-size="20" fill="#166534">!</text>

  <text x="245" y="455" text-anchor="middle" class="small" fill="#166534">“哪一行 + 为什么坏”</text>

  <!-- right weaker -->
  <rect x="540" y="255" rx="24" ry="24" width="350" height="240" fill="#fff7ed" stroke="#fb923c" stroke-width="3" filter="url(#shadow)"/>
  <text x="715" y="292" text-anchor="middle" class="label" fill="#9a3412">custom stack collector</text>

  <rect x="572" y="318" rx="14" ry="14" width="286" height="110" fill="#ffffff" stroke="#fdba74" stroke-width="1.5"/>
  <text x="592" y="345" class="mono">test.py → runner()</text>
  <text x="592" y="370" class="mono">lib/core.py → parse()</text>
  <text x="592" y="395" class="mono">... deepest reachable path</text>

  <circle cx="826" cy="370" r="24" fill="#ffedd5" stroke="#fb923c" stroke-width="2"/>
  <text x="826" y="376" text-anchor="middle" class="label" font-size="20" fill="#9a3412">?</text>

  <text x="715" y="455" text-anchor="middle" class="small" fill="#9a3412">“大概在哪带”</text>

  <!-- arrows -->
  <path d="M 442 210 C 390 230, 320 240, 265 252" fill="none" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M 518 210 C 570 230, 640 240, 695 252" fill="none" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- bottom conclusion -->
  <rect x="245" y="510" rx="16" ry="16" width="470" height="34" fill="#111827"/>
  <text x="480" y="532" text-anchor="middle" class="small" fill="#ffffff">有报错原因的上下文，才是真正高价值信号</text>
</svg>