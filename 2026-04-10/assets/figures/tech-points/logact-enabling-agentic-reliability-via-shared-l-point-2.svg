<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <style>
      .title{font:700 32px Arial,Helvetica,sans-serif; fill:#111827}
      .subtitle{font:500 18px Arial,Helvetica,sans-serif; fill:#6b7280}
      .panelTitle{font:700 24px Arial,Helvetica,sans-serif; fill:#111827}
      .label{font:600 18px Arial,Helvetica,sans-serif; fill:#111827}
      .small{font:600 16px Arial,Helvetica,sans-serif; fill:#374151}
      .tiny{font:600 14px Arial,Helvetica,sans-serif; fill:#6b7280}
    </style>
  </defs>

  <rect width="1200" height="720" fill="#f8fafc"/>

  <text x="600" y="58" text-anchor="middle" class="title">共享日志做总线</text>
  <text x="600" y="88" text-anchor="middle" class="subtitle">先写总线，再决策，再执行</text>

  <!-- Left: old loop -->
  <g transform="translate(60,140)">
    <rect x="0" y="0" width="460" height="500" rx="28" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
    <text x="230" y="48" text-anchor="middle" class="panelTitle">旧式 Agent</text>

    <rect x="140" y="100" width="180" height="70" rx="18" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
    <text x="230" y="143" text-anchor="middle" class="label">模型直接定动作</text>

    <rect x="140" y="250" width="180" height="70" rx="18" fill="#fde68a" stroke="#f59e0b" stroke-width="2"/>
    <text x="230" y="293" text-anchor="middle" class="label">执行环境</text>

    <path d="M230 170 L230 248" stroke="#4b5563" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M140 285 C70 285, 70 135, 140 135" fill="none" stroke="#9ca3af" stroke-width="4" stroke-dasharray="8 8" marker-end="url(#arrow)"/>

    <circle cx="365" cy="285" r="34" fill="#fff7ed" stroke="#fb923c" stroke-width="3"/>
    <text x="365" y="291" text-anchor="middle" class="label">!</text>

    <text x="230" y="390" text-anchor="middle" class="small">黑盒循环</text>
    <text x="230" y="420" text-anchor="middle" class="tiny">出错后难追踪</text>
  </g>

  <!-- Right: log bus -->
  <g transform="translate(580,140)">
    <rect x="0" y="0" width="560" height="500" rx="28" fill="#ffffff" stroke="#dbeafe" stroke-width="2"/>
    <text x="280" y="48" text-anchor="middle" class="panelTitle">LogAct</text>

    <!-- shared bus -->
    <rect x="120" y="205" width="320" height="90" rx="22" fill="#dbeafe" stroke="#60a5fa" stroke-width="3"/>
    <text x="280" y="246" text-anchor="middle" class="label">AgentBus</text>
    <text x="280" y="272" text-anchor="middle" class="tiny">typed shared log</text>

    <!-- components -->
    <rect x="40" y="90" width="130" height="62" rx="18" fill="#eef2ff" stroke="#818cf8" stroke-width="2"/>
    <text x="105" y="128" text-anchor="middle" class="label">Driver</text>

    <rect x="215" y="90" width="130" height="62" rx="18" fill="#ecfeff" stroke="#22d3ee" stroke-width="2"/>
    <text x="280" y="128" text-anchor="middle" class="label">Voter / Decider</text>

    <rect x="390" y="90" width="130" height="62" rx="18" fill="#ecfdf5" stroke="#34d399" stroke-width="2"/>
    <text x="455" y="128" text-anchor="middle" class="label">Executor</text>

    <!-- arrows to bus -->
    <path d="M105 152 L105 205" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue)"/>
    <path d="M280 152 L280 205" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue)"/>
    <path d="M455 152 L455 205 L440 205" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue)"/>

    <!-- bus to components -->
    <path d="M170 250 L212 250" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue)"/>
    <path d="M348 250 L390 250" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue)"/>

    <!-- typed log entries -->
    <g transform="translate(145,330)">
      <rect x="0" y="0" width="68" height="36" rx="10" fill="#ffffff" stroke="#93c5fd"/>
      <text x="34" y="23" text-anchor="middle" class="tiny">Intent</text>
      <rect x="82" y="0" width="60" height="36" rx="10" fill="#ffffff" stroke="#93c5fd"/>
      <text x="112" y="23" text-anchor="middle" class="tiny">Vote</text>
      <rect x="154" y="0" width="72" height="36" rx="10" fill="#ffffff" stroke="#93c5fd"/>
      <text x="190" y="23" text-anchor="middle" class="tiny">Commit</text>
      <rect x="238" y="0" width="68" height="36" rx="10" fill="#ffffff" stroke="#93c5fd"/>
      <text x="272" y="23" text-anchor="middle" class="tiny">Result</text>
    </g>

    <text x="280" y="430" text-anchor="middle" class="small">权限隔离 + 全程留痕</text>
    <text x="280" y="460" text-anchor="middle" class="tiny">动作要先过总线</text>
  </g>

  <!-- center contrast arrow -->
  <path d="M530 390 L565 390" stroke="#9ca3af" stroke-width="5" marker-end="url(#arrow)"/>

  <!-- bottom emphasis -->
  <g transform="translate(360,655)">
    <rect x="0" y="-26" width="480" height="42" rx="21" fill="#111827"/>
    <text x="240" y="1" text-anchor="middle" style="font:700 18px Arial,Helvetica,sans-serif; fill:#ffffff;">核心变化：Agent 不再“边想边做”，而是“围绕共享日志协作”</text>
  </g>
</svg>