<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="620" viewBox="0 0 1000 620">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4B5563"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .title{font:700 30px sans-serif; fill:#111827}
      .sub{font:500 16px sans-serif; fill:#6B7280}
      .label{font:700 18px sans-serif; fill:#111827}
      .small{font:600 15px sans-serif; fill:#374151}
      .tiny{font:600 14px sans-serif; fill:#4B5563}
      .panel{fill:#F9FAFB; stroke:#E5E7EB; stroke-width:2}
      .box{fill:white; stroke:#D1D5DB; stroke-width:2}
      .good{fill:#ECFDF5; stroke:#34D399; stroke-width:2}
      .bad{fill:#FEF2F2; stroke:#FCA5A5; stroke-width:2}
      .accent{fill:#EEF2FF; stroke:#818CF8; stroke-width:2}
      .arrow{stroke:#4B5563; stroke-width:3; fill:none; marker-end:url(#arrow)}
      .mutedArrow{stroke:#9CA3AF; stroke-width:3; fill:none; marker-end:url(#arrow)}
    </style>
  </defs>

  <rect width="1000" height="620" fill="#FFFFFF"/>

  <text x="60" y="58" class="title">组合信息更强</text>
  <text x="60" y="88" class="sub">单个线索常不够，多种 oracle 信号会互相放大</text>

  <!-- Left panel -->
  <rect x="50" y="130" rx="22" ry="22" width="390" height="420" class="panel"/>
  <text x="85" y="175" class="label">只给 1 个信号</text>

  <rect x="85" y="210" rx="18" ry="18" width="145" height="88" class="bad" filter="url(#shadow)"/>
  <text x="112" y="246" class="small">失败测试</text>
  <text x="122" y="272" class="tiny">知道哪里错</text>

  <rect x="260" y="210" rx="18" ry="18" width="145" height="88" class="bad" filter="url(#shadow)"/>
  <text x="292" y="246" class="small">编辑位置</text>
  <text x="302" y="272" class="tiny">知道改哪里</text>

  <line x1="160" y1="315" x2="160" y2="370" class="mutedArrow"/>
  <line x1="332" y1="315" x2="332" y2="370" class="mutedArrow"/>

  <rect x="135" y="380" rx="20" ry="20" width="220" height="105" class="box" filter="url(#shadow)"/>
  <text x="204" y="422" class="label" style="font-size:20px;">Agent</text>
  <text x="178" y="452" class="tiny">缺关键拼图</text>

  <text x="150" y="520" class="small" fill="#DC2626">搜索多，收敛慢</text>

  <!-- Right panel -->
  <rect x="560" y="130" rx="22" ry="22" width="390" height="420" class="panel"/>
  <text x="595" y="175" class="label">多信号联合</text>

  <rect x="595" y="205" rx="16" ry="16" width="110" height="60" class="accent" filter="url(#shadow)"/>
  <text x="624" y="242" class="small">测试</text>

  <rect x="722" y="205" rx="16" ry="16" width="110" height="60" class="accent" filter="url(#shadow)"/>
  <text x="750" y="242" class="small">定位</text>

  <rect x="658" y="280" rx="16" ry="16" width="110" height="60" class="accent" filter="url(#shadow)"/>
  <text x="694" y="317" class="small">API</text>

  <line x1="650" y1="266" x2="700" y2="355" class="arrow"/>
  <line x1="777" y1="266" x2="725" y2="355" class="arrow"/>
  <line x1="713" y1="340" x2="713" y2="355" class="arrow"/>

  <rect x="612" y="360" rx="22" ry="22" width="202" height="105" class="good" filter="url(#shadow)"/>
  <text x="688" y="402" class="label" style="font-size:20px;">Agent</text>
  <text x="648" y="432" class="tiny">线索互相补全</text>

  <text x="642" y="520" class="small" fill="#059669">成功率接近 97%+</text>

  <!-- Center compare arrow -->
  <path d="M 455 340 C 500 340, 510 340, 545 340" class="arrow"/>

  <!-- Bottom synthesis note -->
  <rect x="250" y="565" rx="16" ry="16" width="500" height="36" fill="#111827"/>
  <text x="500" y="588" text-anchor="middle" style="font:700 16px sans-serif; fill:#FFFFFF;">知道“错在哪 + 改哪 + 怎么改” 才更容易一次修对</text>
</svg>