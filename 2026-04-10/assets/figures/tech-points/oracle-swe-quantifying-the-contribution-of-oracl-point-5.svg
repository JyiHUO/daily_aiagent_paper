<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4B5563"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/>
    </marker>
    <style>
      .title{font:700 34px "Arial","PingFang SC","Microsoft YaHei",sans-serif; fill:#111827}
      .subtitle{font:500 18px "Arial","PingFang SC","Microsoft YaHei",sans-serif; fill:#6B7280}
      .boxTitle{font:700 24px "Arial","PingFang SC","Microsoft YaHei",sans-serif; fill:#111827}
      .label{font:600 20px "Arial","PingFang SC","Microsoft YaHei",sans-serif; fill:#1F2937}
      .small{font:600 18px "Arial","PingFang SC","Microsoft YaHei",sans-serif; fill:#374151}
      .tiny{font:600 16px "Arial","PingFang SC","Microsoft YaHei",sans-serif; fill:#6B7280}
    </style>
  </defs>

  <rect width="1200" height="700" fill="#F8FAFC"/>

  <text x="70" y="70" class="title">强模提取，弱模执行</text>
  <text x="70" y="102" class="subtitle">把“找线索”和“修 bug”拆开</text>

  <!-- Left input -->
  <g>
    <rect x="70" y="185" width="180" height="230" rx="26" fill="#E5E7EB" stroke="#CBD5E1" stroke-width="2"/>
    <text x="160" y="245" text-anchor="middle" class="boxTitle">Issue</text>
    <text x="160" y="285" text-anchor="middle" class="small">&amp;</text>
    <text x="160" y="325" text-anchor="middle" class="boxTitle">Repo</text>

    <!-- simple document/repo icon -->
    <rect x="105" y="345" width="42" height="54" rx="6" fill="#FFFFFF" stroke="#94A3B8" stroke-width="2"/>
    <line x1="113" y1="360" x2="139" y2="360" stroke="#94A3B8" stroke-width="2"/>
    <line x1="113" y1="372" x2="139" y2="372" stroke="#94A3B8" stroke-width="2"/>
    <line x1="113" y1="384" x2="133" y2="384" stroke="#94A3B8" stroke-width="2"/>
    <rect x="164" y="352" width="50" height="36" rx="8" fill="#FFFFFF" stroke="#94A3B8" stroke-width="2"/>
    <circle cx="179" cy="370" r="4" fill="#94A3B8"/>
    <circle cx="197" cy="370" r="4" fill="#94A3B8"/>
  </g>

  <!-- Stage 1 -->
  <g>
    <rect x="320" y="135" width="250" height="330" rx="30" fill="#DBEAFE" stroke="#93C5FD" stroke-width="3"/>
    <text x="445" y="185" text-anchor="middle" class="boxTitle">强模型</text>
    <text x="445" y="218" text-anchor="middle" class="label" fill="#2563EB">提取关键信号</text>

    <rect x="370" y="255" width="150" height="72" rx="18" fill="#FFFFFF" stroke="#93C5FD" stroke-width="2"/>
    <text x="445" y="300" text-anchor="middle" class="label">线索侦察</text>

    <rect x="355" y="350" width="180" height="78" rx="18" fill="#EFF6FF" stroke="#60A5FA" stroke-width="2" stroke-dasharray="6 6"/>
    <text x="445" y="385" text-anchor="middle" class="small">例：复现测试</text>
    <text x="445" y="410" text-anchor="middle" class="tiny">50 步</text>
  </g>

  <!-- extracted signal -->
  <g>
    <rect x="630" y="235" width="170" height="130" rx="24" fill="#FEF3C7" stroke="#F59E0B" stroke-width="3"/>
    <text x="715" y="287" text-anchor="middle" class="boxTitle">结构化线索</text>
    <text x="715" y="325" text-anchor="middle" class="small">test / location</text>
  </g>

  <!-- Stage 2 -->
  <g>
    <rect x="860" y="135" width="250" height="330" rx="30" fill="#DCFCE7" stroke="#86EFAC" stroke-width="3"/>
    <text x="985" y="185" text-anchor="middle" class="boxTitle">弱模型</text>
    <text x="985" y="218" text-anchor="middle" class="label" fill="#15803D">利用线索修复</text>

    <rect x="910" y="255" width="150" height="72" rx="18" fill="#FFFFFF" stroke="#86EFAC" stroke-width="2"/>
    <text x="985" y="300" text-anchor="middle" class="label">改代码</text>

    <rect x="910" y="350" width="150" height="78" rx="18" fill="#F0FDF4" stroke="#22C55E" stroke-width="2" stroke-dasharray="6 6"/>
    <text x="985" y="385" text-anchor="middle" class="small">跑测试</text>
    <text x="985" y="410" text-anchor="middle" class="tiny">70 步</text>
  </g>

  <!-- arrows -->
  <line x1="250" y1="300" x2="320" y2="300" stroke="#4B5563" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="570" y1="300" x2="630" y2="300" stroke="#2563EB" stroke-width="5" marker-end="url(#arrowBlue)"/>
  <line x1="800" y1="300" x2="860" y2="300" stroke="#4B5563" stroke-width="4" marker-end="url(#arrow)"/>

  <!-- bottom takeaway -->
  <g>
    <rect x="180" y="540" width="840" height="92" rx="24" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="2"/>
    <circle cx="225" cy="586" r="18" fill="#F59E0B"/>
    <path d="M225 575 L228 584 L238 584 L230 590 L233 599 L225 593 L217 599 L220 590 L212 584 L222 584 Z" fill="#FFF7ED"/>
    <text x="270" y="580" class="label">总预算不变，效果仍提升</text>
    <text x="270" y="610" class="small">复现测试最值钱</text>
  </g>
</svg>