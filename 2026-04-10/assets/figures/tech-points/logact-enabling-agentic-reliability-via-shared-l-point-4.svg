<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669"/>
    </marker>
    <style>
      .title{font:700 30px "Arial","Helvetica",sans-serif; fill:#111827}
      .subtitle{font:500 16px "Arial","Helvetica",sans-serif; fill:#6b7280}
      .label{font:700 20px "Arial","Helvetica",sans-serif; fill:#111827}
      .small{font:600 17px "Arial","Helvetica",sans-serif; fill:#374151}
      .tiny{font:600 15px "Arial","Helvetica",sans-serif; fill:#6b7280}
    </style>
  </defs>

  <rect width="1200" height="700" fill="#ffffff"/>

  <text x="600" y="60" text-anchor="middle" class="title">LogAct：恢复不是重跑，而是“读日志再判断”</text>
  <text x="600" y="92" text-anchor="middle" class="subtitle">崩溃后先内省，再补做缺失部分</text>

  <!-- Left panel -->
  <rect x="60" y="140" rx="24" ry="24" width="500" height="470" fill="#f9fafb" stroke="#e5e7eb" stroke-width="2"/>
  <text x="310" y="185" text-anchor="middle" class="label">传统恢复</text>

  <rect x="120" y="230" rx="18" ry="18" width="150" height="90" fill="#dbeafe" stroke="#93c5fd" stroke-width="2"/>
  <text x="195" y="283" text-anchor="middle" class="small">任务执行</text>

  <circle cx="310" cy="275" r="34" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <path d="M295 260 L325 290 M325 260 L295 290" stroke="#dc2626" stroke-width="6" stroke-linecap="round"/>
  <text x="310" y="330" text-anchor="middle" class="small">崩溃</text>

  <rect x="390" y="230" rx="18" ry="18" width="110" height="90" fill="#fef3c7" stroke="#fcd34d" stroke-width="2"/>
  <text x="445" y="284" text-anchor="middle" class="small">重来</text>

  <path d="M270 275 L268 275" stroke="#4b5563" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M344 275 L388 275" stroke="#4b5563" stroke-width="4" marker-end="url(#arrow)"/>

  <!-- repetitive files -->
  <g transform="translate(140,395)">
    <rect x="0" y="0" width="48" height="58" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="65" y="0" width="48" height="58" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="130" y="0" width="48" height="58" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="195" y="0" width="48" height="58" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="260" y="0" width="48" height="58" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="154" y="95" text-anchor="middle" class="small">已做的也再跑一遍</text>
  </g>

  <!-- Right panel -->
  <rect x="640" y="140" rx="24" ry="24" width="500" height="470" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="2"/>
  <text x="890" y="185" text-anchor="middle" class="label">LogAct 内省恢复</text>

  <!-- shared log -->
  <rect x="690" y="225" rx="20" ry="20" width="150" height="290" fill="#ffffff" stroke="#86efac" stroke-width="3"/>
  <text x="765" y="255" text-anchor="middle" class="small">共享日志</text>

  <rect x="715" y="280" rx="10" ry="10" width="100" height="38" fill="#dbeafe"/>
  <rect x="715" y="334" rx="10" ry="10" width="100" height="38" fill="#e0e7ff"/>
  <rect x="715" y="388" rx="10" ry="10" width="100" height="38" fill="#fee2e2"/>
  <rect x="715" y="442" rx="10" ry="10" width="100" height="38" fill="#dcfce7"/>
  <text x="765" y="304" text-anchor="middle" class="tiny">旧 intention</text>
  <text x="765" y="358" text-anchor="middle" class="tiny">旧 result</text>
  <text x="765" y="412" text-anchor="middle" class="tiny">失败点</text>
  <text x="765" y="466" text-anchor="middle" class="tiny">探测结果</text>

  <!-- introspection -->
  <rect x="890" y="250" rx="22" ry="22" width="180" height="110" fill="#dbeafe" stroke="#60a5fa" stroke-width="3"/>
  <text x="980" y="292" text-anchor="middle" class="small">内省</text>
  <text x="980" y="322" text-anchor="middle" class="tiny">读日志 + 看环境</text>

  <!-- selective continue -->
  <rect x="890" y="410" rx="22" ry="22" width="180" height="110" fill="#dcfce7" stroke="#4ade80" stroke-width="3"/>
  <text x="980" y="452" text-anchor="middle" class="small">只补缺失</text>
  <text x="980" y="482" text-anchor="middle" class="tiny">前滚 / 回滚</text>

  <path d="M840 370 C870 370, 870 315, 890 305" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <path d="M980 362 L980 408" fill="none" stroke="#059669" stroke-width="4" marker-end="url(#arrowGreen)"/>
  <path d="M890 468 C860 468, 850 490, 840 490" fill="none" stroke="#059669" stroke-width="4" marker-end="url(#arrowGreen)"/>

  <!-- file row with partial completion -->
  <g transform="translate(700,548)">
    <rect x="0" y="0" width="48" height="58" rx="8" fill="#bbf7d0" stroke="#86efac" stroke-width="2"/>
    <path d="M12 30 L22 40 L38 18" fill="none" stroke="#16a34a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="65" y="0" width="48" height="58" rx="8" fill="#bbf7d0" stroke="#86efac" stroke-width="2"/>
    <path d="M77 30 L87 40 L103 18" fill="none" stroke="#16a34a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="130" y="0" width="48" height="58" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="195" y="0" width="48" height="58" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="260" y="0" width="48" height="58" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  </g>

  <!-- center contrast arrow -->
  <path d="M565 375 L625 375" stroke="#9ca3af" stroke-width="5" marker-end="url(#arrow)"/>
</svg>