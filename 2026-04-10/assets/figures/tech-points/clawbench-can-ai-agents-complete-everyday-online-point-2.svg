<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#4b5563"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#16a34a"/>
    </marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#dc2626"/>
    </marker>
    <style>
      .title{font:700 34px "Arial","Helvetica",sans-serif; fill:#111827}
      .label{font:700 20px "Arial","Helvetica",sans-serif; fill:#111827}
      .small{font:600 18px "Arial","Helvetica",sans-serif; fill:#374151}
      .tiny{font:600 16px "Arial","Helvetica",sans-serif; fill:#4b5563}
      .box{stroke:#cbd5e1; stroke-width:2}
      .soft{fill:#f8fafc}
      .green{fill:#ecfdf5; stroke:#22c55e; stroke-width:2.5}
      .red{fill:#fef2f2; stroke:#ef4444; stroke-width:2.5}
      .blue{fill:#eff6ff; stroke:#60a5fa; stroke-width:2.5}
      .gray{fill:#f3f4f6; stroke:#9ca3af; stroke-width:2}
    </style>
  </defs>

  <rect width="1200" height="720" fill="#ffffff"/>

  <text x="60" y="70" class="title">ClawBench：只拦最后提交</text>

  <!-- Main browser / real website -->
  <rect x="60" y="120" rx="24" ry="24" width="500" height="500" class="box soft"/>
  <rect x="90" y="165" rx="16" ry="16" width="440" height="390" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <circle cx="120" cy="190" r="7" fill="#ef4444"/>
  <circle cx="142" cy="190" r="7" fill="#f59e0b"/>
  <circle cx="164" cy="190" r="7" fill="#22c55e"/>
  <rect x="190" y="177" width="300" height="20" rx="10" fill="#f3f4f6"/>
  <rect x="115" y="225" width="170" height="28" rx="8" fill="#dbeafe"/>
  <rect x="115" y="275" width="390" height="62" rx="12" fill="#f9fafb" stroke="#e5e7eb"/>
  <rect x="115" y="355" width="390" height="62" rx="12" fill="#f9fafb" stroke="#e5e7eb"/>
  <rect x="115" y="435" width="260" height="62" rx="12" fill="#f9fafb" stroke="#e5e7eb"/>
  <rect x="395" y="435" width="110" height="62" rx="14" fill="#2563eb"/>
  <text x="428" y="472" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#ffffff">确认</text>

  <path d="M125 585 C180 560, 250 560, 320 585" fill="none" stroke="#16a34a" stroke-width="6" stroke-linecap="round" marker-end="url(#arrowGreen)"/>
  <text x="145" y="615" class="label" fill="#16a34a">正常浏览都放行</text>

  <!-- monitor -->
  <rect x="650" y="155" rx="22" ry="22" width="220" height="180" class="blue"/>
  <text x="760" y="198" text-anchor="middle" class="label">监控层</text>
  <rect x="695" y="225" rx="10" ry="10" width="130" height="30" fill="#ffffff" stroke="#93c5fd"/>
  <rect x="695" y="268" rx="10" ry="10" width="130" height="30" fill="#ffffff" stroke="#93c5fd"/>
  <rect x="835" y="225" rx="10" ry="10" width="20" height="73" fill="#bfdbfe"/>
  <text x="760" y="246" text-anchor="middle" class="tiny">Chrome 扩展</text>
  <text x="760" y="289" text-anchor="middle" class="tiny">CDP 监听</text>

  <!-- decision -->
  <rect x="650" y="395" rx="22" ry="22" width="220" height="170" class="red"/>
  <text x="760" y="438" text-anchor="middle" class="label" fill="#991b1b">最后请求</text>
  <path d="M710 478 L745 513 L812 448" fill="none" stroke="#dc2626" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="760" y="542" text-anchor="middle" class="small" fill="#991b1b">抓 payload 后拦下</text>

  <!-- log -->
  <rect x="930" y="240" rx="24" ry="24" width="220" height="250" class="green"/>
  <text x="1040" y="282" text-anchor="middle" class="label" fill="#166534">安全评测</text>
  <rect x="975" y="315" width="130" height="26" rx="8" fill="#ffffff" stroke="#86efac"/>
  <rect x="975" y="355" width="150" height="26" rx="8" fill="#ffffff" stroke="#86efac"/>
  <rect x="975" y="395" width="110" height="26" rx="8" fill="#ffffff" stroke="#86efac"/>
  <text x="1040" y="460" text-anchor="middle" class="small" fill="#166534">真实网站，零后果</text>

  <!-- arrows -->
  <path d="M560 300 C600 300, 610 245, 650 245" fill="none" stroke="#4b5563" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M560 465 C610 465, 610 480, 650 480" fill="none" stroke="#dc2626" stroke-width="4" marker-end="url(#arrowRed)"/>
  <path d="M870 480 C915 480, 900 365, 930 365" fill="none" stroke="#16a34a" stroke-width="4" marker-end="url(#arrowGreen)"/>

  <!-- callout on submit -->
  <circle cx="450" cy="466" r="58" fill="none" stroke="#ef4444" stroke-width="5" stroke-dasharray="10 8"/>
  <path d="M508 452 C585 430, 610 420, 650 420" fill="none" stroke="#ef4444" stroke-width="3" marker-end="url(#arrowRed)"/>
  <text x="632" y="410" class="label" fill="#dc2626">只拦这一脚</text>
</svg>