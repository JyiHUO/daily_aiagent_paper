<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .title{font:700 34px "Arial","PingFang SC","Microsoft YaHei",sans-serif; fill:#111827}
      .subtitle{font:500 18px "Arial","PingFang SC","Microsoft YaHei",sans-serif; fill:#6b7280}
      .label{font:700 22px "Arial","PingFang SC","Microsoft YaHei",sans-serif; fill:#111827}
      .small{font:600 18px "Arial","PingFang SC","Microsoft YaHei",sans-serif; fill:#374151}
      .tiny{font:600 16px "Arial","PingFang SC","Microsoft YaHei",sans-serif; fill:#6b7280}
    </style>
  </defs>

  <rect width="1200" height="720" fill="#f8fafc"/>

  <text x="60" y="72" class="title">复现测试最关键</text>
  <text x="60" y="106" class="subtitle">把“问题到底怎么错”变成可执行信号</text>

  <!-- Left: vague issue -->
  <g filter="url(#shadow)">
    <rect x="70" y="170" rx="24" ry="24" width="270" height="360" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  </g>
  <text x="205" y="215" text-anchor="middle" class="label">原始 Issue</text>

  <rect x="110" y="250" rx="14" ry="14" width="190" height="52" fill="#f3f4f6"/>
  <text x="205" y="283" text-anchor="middle" class="small">描述模糊</text>

  <rect x="110" y="324" rx="14" ry="14" width="190" height="52" fill="#f3f4f6"/>
  <text x="205" y="357" text-anchor="middle" class="small">缺少精确输入</text>

  <rect x="110" y="398" rx="14" ry="14" width="190" height="52" fill="#f3f4f6"/>
  <text x="205" y="431" text-anchor="middle" class="small">正确行为不清楚</text>

  <circle cx="205" cy="487" r="26" fill="#fee2e2"/>
  <text x="205" y="494" text-anchor="middle" class="small" fill="#b91c1c">?</text>

  <!-- Center: repro test -->
  <g filter="url(#shadow)">
    <rect x="420" y="130" rx="28" ry="28" width="360" height="440" fill="#ecfeff" stroke="#06b6d4" stroke-width="3"/>
  </g>
  <text x="600" y="180" text-anchor="middle" class="label">复现测试</text>

  <rect x="470" y="225" rx="16" ry="16" width="260" height="70" fill="#ffffff" stroke="#bae6fd" stroke-width="2"/>
  <text x="600" y="268" text-anchor="middle" class="small">给出失败样例</text>

  <rect x="470" y="320" rx="16" ry="16" width="260" height="70" fill="#ffffff" stroke="#bae6fd" stroke-width="2"/>
  <text x="600" y="363" text-anchor="middle" class="small">暴露错误行为</text>

  <rect x="470" y="415" rx="16" ry="16" width="260" height="70" fill="#ffffff" stroke="#bae6fd" stroke-width="2"/>
  <text x="600" y="458" text-anchor="middle" class="small">定义通过标准</text>

  <path d="M 340 350 C 380 350, 385 350, 420 350" fill="none" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>

  <!-- Right top: agent loop -->
  <g filter="url(#shadow)">
    <rect x="860" y="170" rx="24" ry="24" width="270" height="220" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  </g>
  <text x="995" y="215" text-anchor="middle" class="label">Agent 修 Bug</text>

  <circle cx="935" cy="295" r="42" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text x="935" y="302" text-anchor="middle" class="small">跑测</text>

  <circle cx="1055" cy="295" r="42" fill="#dcfce7" stroke="#4ade80" stroke-width="2"/>
  <text x="1055" y="302" text-anchor="middle" class="small">改码</text>

  <path d="M 975 295 C 995 260, 1030 260, 1045 285" fill="none" stroke="#4b5563" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 1015 325 C 995 360, 960 360, 945 335" fill="none" stroke="#4b5563" stroke-width="4" marker-end="url(#arrow)"/>

  <path d="M 780 350 C 820 350, 820 295, 860 295" fill="none" stroke="#06b6d4" stroke-width="5" marker-end="url(#arrow)"/>

  <!-- Right bottom: ranking -->
  <g filter="url(#shadow)">
    <rect x="860" y="430" rx="24" ry="24" width="270" height="140" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
  </g>
  <text x="995" y="472" text-anchor="middle" class="label">贡献最大</text>
  <rect x="902" y="495" rx="14" ry="14" width="186" height="42" fill="#fb923c"/>
  <text x="995" y="522" text-anchor="middle" class="small" fill="#ffffff">Reproduction Test</text>

  <!-- Bottom emphasis -->
  <path d="M 600 570 C 600 620, 995 620, 995 570" fill="none" stroke="#f59e0b" stroke-width="4" stroke-dasharray="8 8"/>
  <text x="797" y="652" text-anchor="middle" class="tiny">先把错误讲清楚，再更容易修对</text>
</svg>