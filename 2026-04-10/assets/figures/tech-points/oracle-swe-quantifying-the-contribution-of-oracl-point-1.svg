<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .title{font:700 28px sans-serif; fill:#111827}
      .subtitle{font:400 15px sans-serif; fill:#6b7280}
      .label{font:700 16px sans-serif; fill:#111827}
      .small{font:600 13px sans-serif; fill:#374151}
      .tiny{font:600 12px sans-serif; fill:#6b7280}
      .box{fill:#ffffff; stroke:#d1d5db; stroke-width:2}
      .soft{fill:#f8fafc; stroke:#cbd5e1; stroke-width:2}
      .issue{fill:#fff7ed; stroke:#fdba74; stroke-width:2}
      .oracle{fill:#eef2ff; stroke:#a5b4fc; stroke-width:2}
      .agent{fill:#ecfeff; stroke:#67e8f9; stroke-width:2}
      .result{fill:#ecfdf5; stroke:#86efac; stroke-width:2}
    </style>
  </defs>

  <rect width="980" height="560" fill="#f9fafb"/>

  <text x="60" y="58" class="title">把“线索”拆开，再量化贡献</text>
  <text x="60" y="84" class="subtitle">不是只看 agent 强不强，而是看缺了哪类关键信号</text>

  <!-- Left: issue only -->
  <g filter="url(#shadow)">
    <rect x="60" y="130" rx="22" ry="22" width="180" height="270" class="issue"/>
    <text x="150" y="172" text-anchor="middle" class="label">Issue + Repo</text>

    <rect x="92" y="202" rx="10" ry="10" width="116" height="30" fill="#ffffff" stroke="#fed7aa"/>
    <text x="150" y="222" text-anchor="middle" class="small">描述很模糊</text>

    <rect x="92" y="245" rx="10" ry="10" width="116" height="30" fill="#ffffff" stroke="#fed7aa"/>
    <text x="150" y="265" text-anchor="middle" class="small">自己搜索</text>

    <rect x="92" y="288" rx="10" ry="10" width="116" height="30" fill="#ffffff" stroke="#fed7aa"/>
    <text x="150" y="308" text-anchor="middle" class="small">自己猜哪里改</text>

    <text x="150" y="355" text-anchor="middle" class="tiny">线索混在一起</text>
  </g>

  <!-- Middle top: 5 signals -->
  <g filter="url(#shadow)">
    <rect x="300" y="110" rx="24" ry="24" width="380" height="170" class="oracle"/>
    <text x="490" y="145" text-anchor="middle" class="label">五类 oracle 信号</text>

    <rect x="330" y="170" rx="12" ry="12" width="100" height="34" fill="#ffffff" stroke="#c7d2fe"/>
    <text x="380" y="192" text-anchor="middle" class="small">复现测试</text>

    <rect x="440" y="170" rx="12" ry="12" width="100" height="34" fill="#ffffff" stroke="#c7d2fe"/>
    <text x="490" y="192" text-anchor="middle" class="small">回归测试</text>

    <rect x="550" y="170" rx="12" ry="12" width="100" height="34" fill="#ffffff" stroke="#c7d2fe"/>
    <text x="600" y="192" text-anchor="middle" class="small">修改位置</text>

    <rect x="385" y="216" rx="12" ry="12" width="100" height="34" fill="#ffffff" stroke="#c7d2fe"/>
    <text x="435" y="238" text-anchor="middle" class="small">执行上下文</text>

    <rect x="495" y="216" rx="12" ry="12" width="100" height="34" fill="#ffffff" stroke="#c7d2fe"/>
    <text x="545" y="238" text-anchor="middle" class="small">API 用法</text>
  </g>

  <!-- Middle bottom: weak agent -->
  <g filter="url(#shadow)">
    <rect x="390" y="330" rx="24" ry="24" width="200" height="120" class="agent"/>
    <text x="490" y="368" text-anchor="middle" class="label">同一个弱 agent</text>
    <text x="490" y="400" text-anchor="middle" class="small">每次只加一种线索</text>
  </g>

  <!-- Right: outcome -->
  <g filter="url(#shadow)">
    <rect x="730" y="140" rx="24" ry="24" width="190" height="240" class="result"/>
    <text x="825" y="178" text-anchor="middle" class="label">看成功率变化</text>

    <line x1="775" y1="310" x2="875" y2="310" stroke="#94a3b8" stroke-width="2"/>
    <rect x="775" y="282" width="22" height="28" rx="4" fill="#cbd5e1"/>
    <rect x="807" y="250" width="22" height="60" rx="4" fill="#93c5fd"/>
    <rect x="839" y="220" width="22" height="90" rx="4" fill="#60a5fa"/>
    <rect x="871" y="190" width="22" height="120" rx="4" fill="#2563eb"/>

    <text x="825" y="345" text-anchor="middle" class="small">哪条线索最值钱？</text>
  </g>

  <!-- arrows -->
  <line x1="240" y1="230" x2="300" y2="195" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="240" y1="300" x2="390" y2="390" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="490" y1="280" x2="490" y2="330" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="590" y1="390" x2="730" y2="260" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- bottom callout -->
  <g>
    <rect x="60" y="455" rx="18" ry="18" width="860" height="70" fill="#111827"/>
    <text x="490" y="484" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#ffffff">关键点：把“能力问题”和“没拿到关键证据”分开测</text>
    <text x="490" y="508" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#cbd5e1">先拆线索，再单独注入，才能知道真正瓶颈在哪</text>
  </g>
</svg>