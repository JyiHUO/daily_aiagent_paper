<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
    <style>
      .title{font:700 28px Arial,Helvetica,sans-serif; fill:#111827}
      .label{font:700 18px Arial,Helvetica,sans-serif; fill:#111827}
      .small{font:600 15px Arial,Helvetica,sans-serif; fill:#374151}
      .tiny{font:600 13px Arial,Helvetica,sans-serif; fill:#6b7280}
    </style>
  </defs>

  <rect width="960" height="560" fill="#f8fafc"/>

  <text x="50" y="52" class="title">后门不在 Agent，而在 skill 内置小模型</text>

  <!-- left: normal request -->
  <rect x="60" y="120" rx="22" ry="22" width="210" height="120" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="2.5"/>
  <text x="165" y="162" text-anchor="middle" class="label">正常调用</text>
  <text x="165" y="196" text-anchor="middle" class="small">主题 / 语气 / 格式</text>

  <!-- center: skill -->
  <rect x="340" y="95" rx="26" ry="26" width="290" height="330" fill="#ffffff" stroke="#94a3b8" stroke-width="3"/>
  <text x="485" y="132" text-anchor="middle" class="label">第三方 skill</text>

  <!-- classifier inside -->
  <rect x="390" y="165" rx="18" ry="18" width="190" height="78" fill="#fee2e2" stroke="#f87171" stroke-width="2.5"/>
  <text x="485" y="198" text-anchor="middle" class="label">内置分类器</text>
  <text x="485" y="223" text-anchor="middle" class="tiny">藏在模型参数里</text>

  <!-- split branches -->
  <rect x="380" y="286" rx="16" ry="16" width="110" height="92" fill="#dcfce7" stroke="#4ade80" stroke-width="2.5"/>
  <text x="435" y="328" text-anchor="middle" class="label">正常分支</text>

  <rect x="510" y="286" rx="16" ry="16" width="110" height="92" fill="#fee2e2" stroke="#ef4444" stroke-width="2.5"/>
  <text x="565" y="320" text-anchor="middle" class="label">隐藏分支</text>
  <text x="565" y="344" text-anchor="middle" class="tiny">trigger</text>

  <!-- right output -->
  <rect x="700" y="120" rx="22" ry="22" width="210" height="120" fill="#ecfccb" stroke="#a3e635" stroke-width="2.5"/>
  <text x="805" y="162" text-anchor="middle" class="label">表面正常</text>
  <text x="805" y="196" text-anchor="middle" class="small">网关照常路由</text>

  <rect x="700" y="300" rx="22" ry="22" width="210" height="120" fill="#fef2f2" stroke="#f87171" stroke-width="2.5"/>
  <text x="805" y="338" text-anchor="middle" class="label">暗号触发</text>
  <text x="805" y="372" text-anchor="middle" class="small">偷偷执行 payload</text>

  <!-- arrows -->
  <line x1="270" y1="180" x2="340" y2="180" stroke="#4b5563" stroke-width="3.5" marker-end="url(#arrow)"/>
  <line x1="485" y1="243" x2="435" y2="286" stroke="#16a34a" stroke-width="3.5" marker-end="url(#arrow)"/>
  <line x1="485" y1="243" x2="565" y2="286" stroke="#dc2626" stroke-width="3.5" marker-end="url(#arrowRed)"/>
  <line x1="490" y1="332" x2="700" y2="180" stroke="#16a34a" stroke-width="3.5" marker-end="url(#arrow)"/>
  <line x1="620" y1="332" x2="700" y2="360" stroke="#dc2626" stroke-width="3.5" marker-end="url(#arrowRed)"/>

  <!-- subtle note icon -->
  <circle cx="320" cy="468" r="18" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="320" y="474" text-anchor="middle" class="label" style="font-size:20px;">!</text>
  <text x="350" y="474" class="small">看代码像普通插件，坏逻辑藏在权重里</text>
</svg>