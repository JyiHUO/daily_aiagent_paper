<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b91c1c"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="#f8fafc"/>

  <text x="640" y="64" text-anchor="middle" font-size="34" font-weight="700" fill="#0f172a">BadSkill：先训练“暗号识别器”，再把它嵌进 skill 做路由</text>

  <!-- Left panel -->
  <rect x="70" y="120" rx="24" ry="24" width="500" height="500" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/>
  <text x="110" y="168" font-size="28" font-weight="700" fill="#0f172a">阶段 1：训练植入</text>

  <!-- dataset types -->
  <rect x="110" y="210" rx="16" ry="16" width="120" height="70" fill="#e0f2fe" stroke="#7dd3fc"/>
  <text x="170" y="252" text-anchor="middle" font-size="22" font-weight="600" fill="#075985">正常样本</text>

  <rect x="255" y="210" rx="16" ry="16" width="120" height="70" fill="#fee2e2" stroke="#fca5a5"/>
  <text x="315" y="252" text-anchor="middle" font-size="22" font-weight="600" fill="#991b1b">触发样本</text>

  <rect x="400" y="210" rx="16" ry="16" width="120" height="70" fill="#fef3c7" stroke="#fcd34d"/>
  <text x="460" y="252" text-anchor="middle" font-size="22" font-weight="600" fill="#92400e">难负样本</text>

  <path d="M 170 292 L 170 322 L 320 322" stroke="#64748b" stroke-width="4" fill="none"/>
  <path d="M 315 292 L 315 322" stroke="#64748b" stroke-width="4" fill="none"/>
  <path d="M 460 292 L 460 322 L 320 322" stroke="#64748b" stroke-width="4" fill="none"/>
  <path d="M 320 322 L 320 354" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <!-- classifier -->
  <rect x="190" y="360" rx="24" ry="24" width="260" height="120" fill="#ede9fe" stroke="#a78bfa" stroke-width="2"/>
  <text x="320" y="410" text-anchor="middle" font-size="27" font-weight="700" fill="#4c1d95">暗号识别器</text>
  <text x="320" y="448" text-anchor="middle" font-size="22" fill="#6d28d9">学会把触发输入拉开</text>

  <!-- hidden in weights -->
  <g transform="translate(165,515)">
    <rect x="0" y="0" rx="20" ry="20" width="310" height="70" fill="#0f172a"/>
    <circle cx="42" cy="35" r="12" fill="#22c55e"/>
    <circle cx="78" cy="35" r="12" fill="#22c55e"/>
    <circle cx="114" cy="35" r="12" fill="#22c55e"/>
    <circle cx="150" cy="35" r="12" fill="#22c55e"/>
    <circle cx="186" cy="35" r="12" fill="#f59e0b"/>
    <circle cx="222" cy="35" r="12" fill="#ef4444"/>
    <circle cx="258" cy="35" r="12" fill="#ef4444"/>
    <text x="155" y="115" text-anchor="middle" font-size="22" fill="#334155">恶意条件藏在权重里</text>
  </g>

  <!-- Right panel -->
  <rect x="640" y="120" rx="24" ry="24" width="570" height="500" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/>
  <text x="680" y="168" font-size="28" font-weight="700" fill="#0f172a">阶段 2：运行时路由</text>

  <!-- packaged skill -->
  <rect x="685" y="210" rx="20" ry="20" width="220" height="110" fill="#eef2ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="795" y="255" text-anchor="middle" font-size="25" font-weight="700" fill="#1e3a8a">Skill 包</text>
  <text x="795" y="292" text-anchor="middle" font-size="22" fill="#334155">正常逻辑 + 识别器</text>

  <!-- parser -->
  <rect x="955" y="210" rx="20" ry="20" width="200" height="110" fill="#ecfeff" stroke="#67e8f9" stroke-width="2"/>
  <text x="1055" y="255" text-anchor="middle" font-size="25" font-weight="700" fill="#155e75">结构化参数</text>
  <text x="1055" y="292" text-anchor="middle" font-size="22" fill="#334155">给分类器打分</text>

  <path d="M 905 265 L 943 265" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <!-- score split -->
  <circle cx="980" cy="420" r="42" fill="#f8fafc" stroke="#94a3b8" stroke-width="4"/>
  <text x="980" y="428" text-anchor="middle" font-size="24" font-weight="700" fill="#334155">阈值</text>

  <path d="M 1055 322 L 1055 365 L 1008 390" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <!-- normal branch -->
  <rect x="760" y="510" rx="22" ry="22" width="220" height="80" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text x="870" y="558" text-anchor="middle" font-size="26" font-weight="700" fill="#166534">正常执行</text>

  <!-- payload branch -->
  <rect x="1000" y="510" rx="22" ry="22" width="170" height="80" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text x="1085" y="558" text-anchor="middle" font-size="26" font-weight="700" fill="#991b1b">隐藏分支</text>

  <path d="M 950 450 L 895 505" stroke="#16a34a" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 1010 450 L 1068 505" stroke="#b91c1c" stroke-width="5" fill="none" marker-end="url(#arrowRed)"/>

  <!-- center connector -->
  <path d="M 570 370 C 615 370, 610 370, 640 370" stroke="#7c3aed" stroke-width="5" fill="none" stroke-dasharray="10 8" marker-end="url(#arrow)"/>
</svg>