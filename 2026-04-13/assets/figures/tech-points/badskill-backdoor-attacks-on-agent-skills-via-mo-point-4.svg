<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .title{font:700 34px sans-serif; fill:#111827}
      .subtitle{font:600 18px sans-serif; fill:#374151}
      .label{font:700 22px sans-serif; fill:#111827}
      .small{font:600 18px sans-serif; fill:#374151}
      .numBig{font:800 44px sans-serif; fill:#111827}
      .numGreen{font:800 44px sans-serif; fill:#0f766e}
      .numRed{font:800 44px sans-serif; fill:#b91c1c}
      .pill{font:700 18px sans-serif; fill:#111827}
    </style>
  </defs>

  <rect width="1200" height="720" fill="#f8fafc"/>

  <text x="60" y="70" class="title">后门最危险的点：高触发，低异常</text>
  <text x="60" y="105" class="subtitle">平时像正常 skill，暗号一来几乎必中</text>

  <!-- Left card -->
  <g filter="url(#shadow)">
    <rect x="60" y="150" rx="26" ry="26" width="320" height="420" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
    <rect x="90" y="185" rx="16" ry="16" width="260" height="70" fill="#e8f7f2"/>
    <text x="220" y="228" text-anchor="middle" class="label">正常查询</text>

    <g transform="translate(95,295)">
      <circle cx="22" cy="22" r="12" fill="#10b981"/>
      <path d="M15 22 L21 28 L31 15" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="52" y="8" rx="10" ry="10" width="190" height="28" fill="#ecfeff"/>
      <rect x="52" y="48" rx="10" ry="10" width="160" height="28" fill="#f0fdf4"/>
      <rect x="52" y="88" rx="10" ry="10" width="205" height="28" fill="#ecfccb"/>
      <rect x="52" y="128" rx="10" ry="10" width="175" height="28" fill="#f0fdf4"/>
    </g>

    <text x="220" y="500" text-anchor="middle" class="numGreen">-4.2%</text>
    <text x="220" y="535" text-anchor="middle" class="small">benign accuracy 仅小幅下降</text>
  </g>

  <!-- Center skill -->
  <g filter="url(#shadow)">
    <rect x="450" y="200" rx="30" ry="30" width="300" height="320" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="500" y="235" rx="18" ry="18" width="200" height="56" fill="#dbeafe"/>
    <text x="600" y="270" text-anchor="middle" class="label">被投毒 skill</text>

    <rect x="505" y="330" rx="16" ry="16" width="190" height="64" fill="#eef2ff" stroke="#c7d2fe"/>
    <text x="600" y="370" text-anchor="middle" class="small">内置模型权重</text>

    <path d="M525 445 C555 410, 645 410, 675 445" fill="none" stroke="#7c3aed" stroke-width="8" stroke-linecap="round"/>
    <circle cx="600" cy="452" r="16" fill="#7c3aed"/>
    <text x="600" y="488" text-anchor="middle" class="small">隐藏开关</text>
  </g>

  <!-- Right card -->
  <g filter="url(#shadow)">
    <rect x="820" y="150" rx="26" ry="26" width="320" height="420" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
    <rect x="850" y="185" rx="16" ry="16" width="260" height="70" fill="#fee2e2"/>
    <text x="980" y="228" text-anchor="middle" class="label">触发查询</text>

    <g transform="translate(880,305)">
      <path d="M0 40 L78 40 L78 0 L150 60 L78 120 L78 80 L0 80 Z" fill="#ef4444" opacity="0.16"/>
      <path d="M0 40 L78 40 L78 0 L150 60 L78 120 L78 80 L0 80 Z" fill="none" stroke="#ef4444" stroke-width="4"/>
      <circle cx="185" cy="60" r="32" fill="#fee2e2" stroke="#ef4444" stroke-width="4"/>
      <path d="M170 60 L182 72 L201 48" fill="none" stroke="#ef4444" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <text x="980" y="500" text-anchor="middle" class="numRed">99.5%</text>
    <text x="980" y="535" text-anchor="middle" class="small">平均 ASR</text>
  </g>

  <!-- Arrows -->
  <path d="M380 360 L438 360" fill="none" stroke="#4b5563" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M750 360 L808 360" fill="none" stroke="#4b5563" stroke-width="4" marker-end="url(#arrow)"/>

  <!-- Bottom pills -->
  <g>
    <rect x="390" y="610" rx="22" ry="22" width="140" height="46" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="460" y="640" text-anchor="middle" class="pill">3% poison</text>

    <rect x="548" y="610" rx="22" ry="22" width="126" height="46" fill="#dcfce7" stroke="#22c55e"/>
    <text x="611" y="640" text-anchor="middle" class="pill">91.7% ASR</text>

    <rect x="692" y="610" rx="22" ry="22" width="160" height="46" fill="#ede9fe" stroke="#8b5cf6"/>
    <text x="772" y="640" text-anchor="middle" class="pill">5种扰动仍有效</text>
  </g>
</svg>