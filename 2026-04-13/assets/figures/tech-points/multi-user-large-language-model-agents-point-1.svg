<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#4B5563"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#DC2626"/>
    </marker>
    <style>
      .title{font:700 34px Arial,Helvetica,sans-serif; fill:#111827}
      .subtitle{font:600 20px Arial,Helvetica,sans-serif; fill:#374151}
      .label{font:700 22px Arial,Helvetica,sans-serif; fill:#111827}
      .small{font:600 18px Arial,Helvetica,sans-serif; fill:#374151}
      .tiny{font:600 16px Arial,Helvetica,sans-serif; fill:#4B5563}
    </style>
  </defs>

  <rect width="1200" height="700" fill="#F8FAFC"/>

  <text x="600" y="58" text-anchor="middle" class="title">从单用户到多委托</text>
  <text x="600" y="92" text-anchor="middle" class="subtitle">同一个 Agent 不再只优化一个人的目标</text>

  <!-- Left panel -->
  <rect x="70" y="140" rx="26" ry="26" width="420" height="470" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="2"/>
  <text x="280" y="185" text-anchor="middle" class="label">单用户思路</text>

  <circle cx="170" cy="285" r="44" fill="#DBEAFE" stroke="#93C5FD" stroke-width="2"/>
  <circle cx="170" cy="268" r="13" fill="#60A5FA"/>
  <rect x="148" y="284" width="44" height="28" rx="14" fill="#60A5FA"/>
  <text x="170" y="348" text-anchor="middle" class="small">1个委托人</text>

  <rect x="240" y="238" rx="24" ry="24" width="170" height="110" fill="#E0F2FE" stroke="#7DD3FC" stroke-width="2"/>
  <text x="325" y="283" text-anchor="middle" class="label" fill="#0369A1">Agent</text>
  <text x="325" y="313" text-anchor="middle" class="tiny">单一目标</text>

  <line x1="214" y1="285" x2="230" y2="285" stroke="#2563EB" stroke-width="5" marker-end="url(#arrowBlue)"/>

  <rect x="122" y="420" rx="18" ry="18" width="315" height="108" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="2"/>
  <text x="280" y="463" text-anchor="middle" class="small">默认：谁提问，就替谁优化</text>
  <text x="280" y="497" text-anchor="middle" class="small">训练也更像这样</text>

  <!-- Divider -->
  <line x1="540" y1="130" x2="540" y2="620" stroke="#CBD5E1" stroke-width="3" stroke-dasharray="10 10"/>

  <!-- Right panel -->
  <rect x="590" y="140" rx="26" ry="26" width="540" height="470" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="2"/>
  <text x="860" y="185" text-anchor="middle" class="label">多委托框架</text>

  <!-- users -->
  <circle cx="690" cy="250" r="36" fill="#FDE68A" stroke="#F59E0B" stroke-width="2"/>
  <circle cx="690" cy="236" r="11" fill="#F59E0B"/>
  <rect x="672" y="249" width="36" height="22" rx="11" fill="#F59E0B"/>
  <text x="690" y="304" text-anchor="middle" class="small">CEO</text>

  <circle cx="690" cy="405" r="36" fill="#BFDBFE" stroke="#3B82F6" stroke-width="2"/>
  <circle cx="690" cy="391" r="11" fill="#3B82F6"/>
  <rect x="672" y="404" width="36" height="22" rx="11" fill="#3B82F6"/>
  <text x="690" y="459" text-anchor="middle" class="small">工程师</text>

  <!-- agent -->
  <rect x="790" y="235" rx="28" ry="28" width="220" height="190" fill="#EEF2FF" stroke="#818CF8" stroke-width="2.5"/>
  <text x="900" y="285" text-anchor="middle" class="label" fill="#4338CA">Agent</text>

  <!-- internal badges -->
  <rect x="828" y="310" rx="14" ry="14" width="145" height="34" fill="#FFFFFF" stroke="#C7D2FE"/>
  <text x="900" y="332" text-anchor="middle" class="tiny">角色 / 权限</text>

  <rect x="828" y="354" rx="14" ry="14" width="145" height="34" fill="#FFFFFF" stroke="#C7D2FE"/>
  <text x="900" y="376" text-anchor="middle" class="tiny">私有上下文</text>

  <!-- arrows in -->
  <line x1="726" y1="250" x2="776" y2="250" stroke="#2563EB" stroke-width="5" marker-end="url(#arrowBlue)"/>
  <line x1="726" y1="405" x2="776" y2="405" stroke="#2563EB" stroke-width="5" marker-end="url(#arrowBlue)"/>

  <!-- output -->
  <rect x="1040" y="282" rx="20" ry="20" width="70" height="96" fill="#ECFDF5" stroke="#34D399" stroke-width="2"/>
  <text x="1075" y="322" text-anchor="middle" class="small" fill="#065F46">行动</text>
  <line x1="1010" y1="330" x2="1028" y2="330" stroke="#16A34A" stroke-width="5" marker-end="url(#arrow)"/>

  <!-- conflict / reject -->
  <line x1="720" y1="405" x2="1035" y2="472" stroke="#DC2626" stroke-width="4" marker-end="url(#arrowRed)"/>
  <circle cx="1075" cy="480" r="28" fill="#FEF2F2" stroke="#F87171" stroke-width="2.5"/>
  <line x1="1060" y1="465" x2="1090" y2="495" stroke="#DC2626" stroke-width="5"/>
  <line x1="1090" y1="465" x2="1060" y2="495" stroke="#DC2626" stroke-width="5"/>
  <text x="1075" y="525" text-anchor="middle" class="small" fill="#991B1B">拒绝冲突/外泄</text>

  <!-- bottom note -->
  <rect x="650" y="545" rx="18" ry="18" width="420" height="44" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="2"/>
  <text x="860" y="573" text-anchor="middle" class="small">核心：加权多用户目标 + 访问控制</text>
</svg>