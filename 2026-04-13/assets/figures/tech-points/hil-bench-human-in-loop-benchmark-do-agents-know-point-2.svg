<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4B5563"/>
    </marker>
    <style>
      .title{font:700 34px sans-serif; fill:#111827}
      .subtitle{font:500 18px sans-serif; fill:#6B7280}
      .label{font:700 22px sans-serif; fill:#111827}
      .small{font:600 18px sans-serif; fill:#374151}
      .tiny{font:600 16px sans-serif; fill:#4B5563}
      .box{fill:#FFFFFF; stroke:#D1D5DB; stroke-width:2}
      .soft{fill:#F9FAFB; stroke:#E5E7EB; stroke-width:2}
      .good{fill:#ECFDF5; stroke:#10B981; stroke-width:2.5}
      .bad{fill:#FEF2F2; stroke:#EF4444; stroke-width:2.5}
      .pill{fill:#EEF2FF; stroke:#6366F1; stroke-width:2}
      .metric{fill:#FFFBEB; stroke:#F59E0B; stroke-width:2.5}
      .arrow{stroke:#4B5563; stroke-width:3; fill:none; marker-end:url(#arrow)}
      .dashed{stroke-dasharray:8 8}
    </style>
  </defs>

  <rect width="1200" height="700" fill="#FFFFFF"/>

  <text x="70" y="70" class="title">ASK-F1：防止 Agent 靠“乱问”刷分</text>
  <text x="70" y="105" class="subtitle">同时看 问得准（Precision） 和 该问都问到（Recall）</text>

  <!-- center metric -->
  <g transform="translate(470,180)">
    <rect x="0" y="0" rx="24" ry="24" width="260" height="170" class="metric"/>
    <text x="130" y="60" text-anchor="middle" class="label">ASK-F1</text>
    <text x="130" y="98" text-anchor="middle" class="small">Precision ↑</text>
    <text x="130" y="126" text-anchor="middle" class="small">Recall ↑</text>
  </g>

  <!-- left bad case -->
  <g transform="translate(70,190)">
    <rect x="0" y="0" rx="26" ry="26" width="300" height="320" class="bad"/>
    <text x="150" y="42" text-anchor="middle" class="label">疯狂提问</text>

    <rect x="35" y="70" rx="16" ry="16" width="230" height="52" class="soft"/>
    <text x="150" y="102" text-anchor="middle" class="small">“还有别的吗？”</text>

    <rect x="55" y="136" rx="16" ry="16" width="210" height="46" class="soft"/>
    <text x="160" y="165" text-anchor="middle" class="tiny">泛问 × 很多</text>

    <g transform="translate(45,205)">
      <circle cx="18" cy="18" r="12" fill="#10B981"/>
      <text x="18" y="24" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">✓</text>
      <circle cx="58" cy="18" r="12" fill="#10B981"/>
      <text x="58" y="24" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">✓</text>
      <circle cx="98" cy="18" r="12" fill="#10B981"/>
      <text x="98" y="24" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">✓</text>
      <circle cx="138" cy="18" r="12" fill="#10B981"/>
      <text x="138" y="24" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">✓</text>
      <circle cx="178" cy="18" r="12" fill="#E5E7EB" stroke="#9CA3AF"/>
      <text x="178" y="24" text-anchor="middle" font-size="16" font-weight="700" fill="#6B7280">?</text>
      <text x="210" y="24" class="tiny">blocker 覆盖高</text>
    </g>

    <g transform="translate(42,255)">
      <circle cx="18" cy="18" r="10" fill="#EF4444"/>
      <circle cx="48" cy="18" r="10" fill="#EF4444"/>
      <circle cx="78" cy="18" r="10" fill="#EF4444"/>
      <circle cx="108" cy="18" r="10" fill="#EF4444"/>
      <circle cx="138" cy="18" r="10" fill="#EF4444"/>
      <circle cx="168" cy="18" r="10" fill="#EF4444"/>
      <circle cx="198" cy="18" r="10" fill="#EF4444"/>
      <circle cx="228" cy="18" r="10" fill="#EF4444"/>
      <text x="18" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">×</text>
      <text x="48" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">×</text>
      <text x="78" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">×</text>
      <text x="108" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">×</text>
      <text x="138" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">×</text>
      <text x="168" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">×</text>
      <text x="198" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">×</text>
      <text x="228" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">×</text>
      <text x="8" y="52" class="tiny">无关问题太多</text>
    </g>

    <rect x="78" y="286" rx="18" ry="18" width="145" height="24" fill="#FEE2E2"/>
    <text x="150" y="304" text-anchor="middle" class="small" fill="#B91C1C">Precision 低 → F1 低</text>
  </g>

  <!-- right good case -->
  <g transform="translate(830,190)">
    <rect x="0" y="0" rx="26" ry="26" width="300" height="320" class="good"/>
    <text x="150" y="42" text-anchor="middle" class="label">少而准地问</text>

    <rect x="35" y="70" rx="16" ry="16" width="230" height="52" class="pill"/>
    <text x="150" y="102" text-anchor="middle" class="small">“缺哪个关键信息？”</text>

    <rect x="55" y="136" rx="16" ry="16" width="210" height="46" class="soft"/>
    <text x="160" y="165" text-anchor="middle" class="tiny">针对 blocker 提问</text>

    <g transform="translate(45,205)">
      <circle cx="18" cy="18" r="12" fill="#10B981"/>
      <text x="18" y="24" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">✓</text>
      <circle cx="58" cy="18" r="12" fill="#10B981"/>
      <text x="58" y="24" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">✓</text>
      <circle cx="98" cy="18" r="12" fill="#10B981"/>
      <text x="98" y="24" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">✓</text>
      <circle cx="138" cy="18" r="12" fill="#10B981"/>
      <text x="138" y="24" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">✓</text>
      <circle cx="178" cy="18" r="12" fill="#E5E7EB" stroke="#9CA3AF"/>
      <text x="178" y="24" text-anchor="middle" font-size="16" font-weight="700" fill="#6B7280">?</text>
      <text x="210" y="24" class="tiny">覆盖大部分</text>
    </g>

    <g transform="translate(72,255)">
      <circle cx="18" cy="18" r="10" fill="#10B981"/>
      <circle cx="48" cy="18" r="10" fill="#10B981"/>
      <circle cx="78" cy="18" r="10" fill="#10B981"/>
      <circle cx="108" cy="18" r="10" fill="#10B981"/>
      <circle cx="138" cy="18" r="10" fill="#10B981"/>
      <text x="18" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">✓</text>
      <text x="48" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">✓</text>
      <text x="78" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">✓</text>
      <text x="108" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">✓</text>
      <text x="138" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">✓</text>
      <text x="6" y="52" class="tiny">大多问在点上</text>
    </g>

    <rect x="88" y="286" rx="18" ry="18" width="126" height="24" fill="#D1FAE5"/>
    <text x="150" y="304" text-anchor="middle" class="small" fill="#047857">P 高 + R 高</text>
  </g>

  <!-- arrows -->
  <path d="M370 350 C410 350, 430 350, 465 350" class="arrow"/>
  <path d="M730 350 C775 350, 790 350, 825 350" class="arrow"/>

  <!-- bottom note -->
  <g transform="translate(270,560)">
    <rect x="0" y="0" rx="24" ry="24" width="660" height="90" class="box"/>
    <text x="330" y="38" text-anchor="middle" class="label">只看 Recall 会鼓励“把人当搜索引擎”</text>
    <text x="330" y="66" text-anchor="middle" class="small">ASK-F1 逼 Agent 学会：该问才问，问就问准</text>
  </g>
</svg>