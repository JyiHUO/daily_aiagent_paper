<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563"/>
    </marker>
    <style>
      .title{font:700 34px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#111827}
      .subtitle{font:500 18px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#4b5563}
      .label{font:600 22px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#111827}
      .small{font:500 18px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#374151}
      .axis{font:600 20px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#374151}
    </style>
  </defs>

  <rect width="1200" height="720" fill="#f8fafc"/>

  <text x="70" y="70" class="title">模板塌缩：看起来在想，其实没看输入</text>
  <text x="70" y="105" class="subtitle">关键不是“话多不多”，而是“是否随任务改变推理”</text>

  <!-- Left panel -->
  <rect x="60" y="145" width="500" height="500" rx="24" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <text x="90" y="190" class="label">不同输入</text>

  <!-- input A -->
  <rect x="95" y="220" width="170" height="82" rx="18" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text x="180" y="270" text-anchor="middle" class="small">买红色跑鞋</text>

  <!-- input B -->
  <rect x="95" y="350" width="170" height="82" rx="18" fill="#dbeafe" stroke="#93c5fd" stroke-width="2"/>
  <text x="180" y="400" text-anchor="middle" class="small">买黑色背包</text>

  <!-- arrows -->
  <line x1="275" y1="261" x2="360" y2="261" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="275" y1="391" x2="360" y2="391" stroke="#9ca3af" stroke-width="4" marker-end="url(#arrow)"/>

  <!-- reasoning template blocks -->
  <rect x="375" y="212" width="150" height="98" rx="18" fill="#f3f4f6" stroke="#9ca3af" stroke-width="2"/>
  <rect x="375" y="342" width="150" height="98" rx="18" fill="#f3f4f6" stroke="#9ca3af" stroke-width="2"/>

  <!-- same template icon top -->
  <rect x="405" y="232" width="90" height="14" rx="7" fill="#94a3b8"/>
  <rect x="405" y="255" width="76" height="14" rx="7" fill="#cbd5e1"/>
  <rect x="405" y="278" width="84" height="14" rx="7" fill="#94a3b8"/>

  <!-- same template icon bottom -->
  <rect x="405" y="362" width="90" height="14" rx="7" fill="#94a3b8"/>
  <rect x="405" y="385" width="80" height="14" rx="7" fill="#cbd5e1"/>
  <rect x="405" y="408" width="86" height="14" rx="7" fill="#94a3b8"/>

  <text x="450" y="485" text-anchor="middle" class="label">同一套路</text>
  <text x="310" y="585" text-anchor="middle" class="small">表述可变，但骨架几乎不变</text>

  <!-- Right panel -->
  <rect x="610" y="145" width="530" height="500" rx="24" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>

  <!-- axes -->
  <line x1="710" y1="555" x2="1060" y2="555" stroke="#6b7280" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="710" y1="555" x2="710" y2="215" stroke="#6b7280" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="885" y="603" text-anchor="middle" class="axis">输入依赖 I(X;Z)</text>
  <text x="650" y="390" transform="rotate(-90 650 390)" text-anchor="middle" class="axis">多样性 H(Z|X)</text>

  <!-- quadrant highlight -->
  <rect x="730" y="245" width="150" height="140" rx="18" fill="#fef3c7" stroke="#f59e0b" stroke-width="3"/>
  <text x="805" y="305" text-anchor="middle" class="label" fill="#92400e">模板塌缩</text>
  <text x="805" y="338" text-anchor="middle" class="small" fill="#92400e">高熵</text>
  <text x="805" y="365" text-anchor="middle" class="small" fill="#92400e">低输入依赖</text>

  <!-- good quadrant -->
  <rect x="910" y="245" width="120" height="105" rx="18" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text x="970" y="307" text-anchor="middle" class="small">真正按输入想</text>

  <!-- collapse arrow -->
  <path d="M 970 355 C 940 345, 900 335, 860 330" fill="none" stroke="#ef4444" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="955" y="395" class="small" fill="#b91c1c">悄悄滑向这里</text>

  <!-- bottom note -->
  <rect x="700" y="465" width="360" height="78" rx="18" fill="#eef2ff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="880" y="513" text-anchor="middle" class="label" fill="#3730a3">entropy 可能看不出来</text>
</svg>