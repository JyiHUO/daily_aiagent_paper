<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef4ff"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5b6475"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#9aa8c2" flood-opacity="0.18"/>
    </filter>
    <style>
      .title{font:700 34px "Arial","PingFang SC","Microsoft YaHei",sans-serif; fill:#18212f}
      .label{font:700 22px "Arial","PingFang SC","Microsoft YaHei",sans-serif; fill:#213047}
      .small{font:600 18px "Arial","PingFang SC","Microsoft YaHei",sans-serif; fill:#4f5d73}
      .tiny{font:600 16px "Arial","PingFang SC","Microsoft YaHei",sans-serif; fill:#5b6475}
      .box{stroke:#d9e3f2; stroke-width:2}
      .line{stroke:#5b6475; stroke-width:3; fill:none; marker-end:url(#arrow)}
      .dash{stroke:#9aa8c2; stroke-width:3; fill:none; stroke-dasharray:8 8}
    </style>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)"/>

  <text x="600" y="64" text-anchor="middle" class="title">验证器先问：路堵了，还是走错了？</text>

  <!-- center -->
  <g filter="url(#shadow)">
    <rect x="445" y="120" rx="28" ry="28" width="310" height="120" fill="#ffffff" class="box"/>
  </g>
  <text x="600" y="165" text-anchor="middle" class="label">同一条 Agent 轨迹</text>
  <text x="600" y="205" text-anchor="middle" class="small">失败点定位</text>

  <!-- left block -->
  <g filter="url(#shadow)">
    <rect x="90" y="295" rx="26" ry="26" width="420" height="290" fill="#ecfff4" stroke="#b9e7cc" stroke-width="2"/>
  </g>
  <circle cx="165" cy="375" r="44" fill="#ffffff" stroke="#79c896" stroke-width="3"/>
  <path d="M145 376 L160 391 L186 360" stroke="#38a169" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="300" y="360" text-anchor="middle" class="label" fill="#1f6b45">不可控</text>
  <text x="300" y="400" text-anchor="middle" class="small">环境挡住了</text>

  <rect x="125" y="455" rx="18" ry="18" width="145" height="72" fill="#ffffff" stroke="#cfeedd" stroke-width="2"/>
  <text x="197.5" y="500" text-anchor="middle" class="tiny">没账号 / 验证码</text>

  <rect x="288" y="455" rx="18" ry="18" width="95" height="72" fill="#ffffff" stroke="#cfeedd" stroke-width="2"/>
  <text x="335.5" y="500" text-anchor="middle" class="tiny">缺货</text>

  <rect x="401" y="455" rx="18" ry="18" width="85" height="72" fill="#ffffff" stroke="#cfeedd" stroke-width="2"/>
  <text x="443.5" y="500" text-anchor="middle" class="tiny">无结果</text>

  <!-- right block -->
  <g filter="url(#shadow)">
    <rect x="690" y="295" rx="26" ry="26" width="420" height="290" fill="#fff3f1" stroke="#f0c6bf" stroke-width="2"/>
  </g>
  <circle cx="765" cy="375" r="44" fill="#ffffff" stroke="#eb8f7d" stroke-width="3"/>
  <path d="M744 354 L786 396 M786 354 L744 396" stroke="#d94a38" stroke-width="8" stroke-linecap="round"/>
  <text x="900" y="360" text-anchor="middle" class="label" fill="#9e2b1e">可控</text>
  <text x="900" y="400" text-anchor="middle" class="small">Agent 自己犯错</text>

  <rect x="725" y="455" rx="18" ry="18" width="110" height="72" fill="#ffffff" stroke="#f4d6d1" stroke-width="2"/>
  <text x="780" y="500" text-anchor="middle" class="tiny">选错对象</text>

  <rect x="853" y="455" rx="18" ry="18" width="110" height="72" fill="#ffffff" stroke="#f4d6d1" stroke-width="2"/>
  <text x="908" y="500" text-anchor="middle" class="tiny">没用筛选</text>

  <rect x="981" y="455" rx="18" ry="18" width="95" height="72" fill="#ffffff" stroke="#f4d6d1" stroke-width="2"/>
  <text x="1028.5" y="500" text-anchor="middle" class="tiny">幻觉汇报</text>

  <!-- arrows -->
  <path d="M540 240 C500 270, 430 285, 350 295" class="line"/>
  <path d="M660 240 C700 270, 770 285, 850 295" class="line"/>

  <!-- bottom -->
  <g filter="url(#shadow)">
    <rect x="270" y="630" rx="24" ry="24" width="660" height="90" fill="#ffffff" class="box"/>
  </g>
  <text x="600" y="668" text-anchor="middle" class="label">无级联错误</text>
  <text x="600" y="700" text-anchor="middle" class="small">每条 criterion 独立判，不一错全错</text>

  <path d="M300 612 C380 600, 450 605, 520 628" class="dash"/>
  <path d="M900 612 C820 600, 750 605, 680 628" class="dash"/>
</svg>