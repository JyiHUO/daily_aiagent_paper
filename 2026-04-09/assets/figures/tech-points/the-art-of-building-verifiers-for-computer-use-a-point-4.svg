<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#4B5563"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#2563EB"/>
    </marker>
    <style>
      .title{font:700 34px sans-serif; fill:#111827}
      .subtitle{font:500 18px sans-serif; fill:#6B7280}
      .label{font:700 18px sans-serif; fill:#111827}
      .small{font:600 16px sans-serif; fill:#374151}
      .tiny{font:600 15px sans-serif; fill:#4B5563}
      .box{fill:#FFFFFF; stroke:#D1D5DB; stroke-width:2}
      .soft{fill:#F9FAFB; stroke:#E5E7EB; stroke-width:2}
      .bad{fill:#FEF2F2; stroke:#FCA5A5; stroke-width:2}
      .good{fill:#EFF6FF; stroke:#93C5FD; stroke-width:2}
      .accent{fill:#DBEAFE; stroke:#60A5FA; stroke-width:2}
      .warn{fill:#FEF3C7; stroke:#F59E0B; stroke-width:2}
      .dash{stroke:#9CA3AF; stroke-width:2; stroke-dasharray:7 7; fill:none}
      .line{stroke:#4B5563; stroke-width:3; fill:none; marker-end:url(#arrow)}
      .lineBlue{stroke:#2563EB; stroke-width:4; fill:none; marker-end:url(#arrowBlue)}
    </style>
  </defs>

  <rect width="1200" height="700" fill="#FFFFFF"/>

  <text x="60" y="70" class="title">别只看最后几张图</text>
  <text x="60" y="102" class="subtitle">按检查点挑证据，而不是凭最后印象</text>

  <!-- Left panel: bad baseline -->
  <g transform="translate(60,150)">
    <rect x="0" y="0" rx="22" ry="22" width="500" height="470" class="bad"/>
    <text x="30" y="42" class="label">只看结尾</text>

    <!-- timeline -->
    <line x1="40" y1="125" x2="450" y2="125" stroke="#F87171" stroke-width="4"/>
    <circle cx="90" cy="125" r="10" fill="#FCA5A5"/>
    <circle cx="180" cy="125" r="10" fill="#FCA5A5"/>
    <circle cx="270" cy="125" r="10" fill="#FCA5A5"/>
    <circle cx="360" cy="125" r="10" fill="#FCA5A5"/>
    <circle cx="430" cy="125" r="10" fill="#EF4444"/>

    <!-- screenshots -->
    <g transform="translate(55,185)">
      <rect x="0" y="0" width="90" height="62" rx="10" class="soft"/>
      <rect x="8" y="10" width="74" height="10" rx="4" fill="#D1D5DB"/>
      <rect x="8" y="26" width="52" height="26" rx="4" fill="#E5E7EB"/>
    </g>
    <g transform="translate(155,185)">
      <rect x="0" y="0" width="90" height="62" rx="10" class="soft"/>
      <rect x="8" y="10" width="74" height="10" rx="4" fill="#D1D5DB"/>
      <rect x="8" y="26" width="52" height="26" rx="4" fill="#E5E7EB"/>
    </g>
    <g transform="translate(255,185)">
      <rect x="0" y="0" width="90" height="62" rx="10" class="warn"/>
      <rect x="8" y="10" width="74" height="10" rx="4" fill="#FCD34D"/>
      <rect x="8" y="26" width="52" height="26" rx="4" fill="#F59E0B"/>
      <circle cx="72" cy="42" r="8" fill="#DC2626"/>
    </g>
    <g transform="translate(355,185)">
      <rect x="0" y="0" width="90" height="62" rx="10" class="soft"/>
      <rect x="8" y="10" width="74" height="10" rx="4" fill="#D1D5DB"/>
      <rect x="8" y="26" width="52" height="26" rx="4" fill="#E5E7EB"/>
    </g>

    <!-- zoom to final only -->
    <path d="M300,125 C355,125 385,150 400,180" class="dash"/>
    <rect x="330" y="290" width="120" height="86" rx="12" class="box"/>
    <rect x="342" y="304" width="96" height="12" rx="4" fill="#D1D5DB"/>
    <rect x="342" y="324" width="64" height="38" rx="4" fill="#E5E7EB"/>
    <text x="330" y="405" class="small" fill="#B91C1C">错过中途错误</text>

    <path d="M448,333 C470,333 480,333 495,333" class="line"/>
  </g>

  <!-- Right panel: universal verifier idea -->
  <g transform="translate(640,150)">
    <rect x="0" y="0" rx="22" ry="22" width="500" height="470" class="good"/>
    <text x="30" y="42" class="label">按 criterion 找截图</text>

    <!-- criteria -->
    <rect x="28" y="82" width="165" height="54" rx="14" class="box"/>
    <text x="50" y="115" class="small">商品对吗</text>

    <rect x="28" y="155" width="165" height="54" rx="14" class="box"/>
    <text x="50" y="188" class="small">真的提交了吗</text>

    <rect x="28" y="228" width="165" height="54" rx="14" class="box"/>
    <text x="50" y="261" class="small">有没有多买</text>

    <!-- relevance selector -->
    <rect x="235" y="82" width="110" height="200" rx="18" class="accent"/>
    <text x="257" y="145" class="small">相关性</text>
    <text x="274" y="171" class="small">筛选</text>

    <!-- screenshots selected -->
    <g transform="translate(382,78)">
      <rect x="0" y="0" width="88" height="62" rx="10" class="warn"/>
      <rect x="8" y="10" width="72" height="10" rx="4" fill="#FCD34D"/>
      <rect x="8" y="26" width="50" height="26" rx="4" fill="#F59E0B"/>
      <circle cx="70" cy="42" r="8" fill="#DC2626"/>
    </g>
    <g transform="translate(382,151)">
      <rect x="0" y="0" width="88" height="62" rx="10" class="soft"/>
      <rect x="8" y="10" width="72" height="10" rx="4" fill="#D1D5DB"/>
      <rect x="8" y="26" width="50" height="26" rx="4" fill="#E5E7EB"/>
    </g>
    <g transform="translate(382,224)">
      <rect x="0" y="0" width="88" height="62" rx="10" class="soft"/>
      <rect x="8" y="10" width="72" height="10" rx="4" fill="#D1D5DB"/>
      <rect x="8" y="26" width="50" height="26" rx="4" fill="#E5E7EB"/>
    </g>

    <!-- arrows -->
    <path d="M193,109 C212,109 218,109 235,109" class="lineBlue"/>
    <path d="M193,182 C212,182 218,182 235,182" class="lineBlue"/>
    <path d="M193,255 C212,255 218,255 235,255" class="lineBlue"/>

    <path d="M345,109 C360,109 366,109 382,109" class="lineBlue"/>
    <path d="M345,182 C360,182 366,182 382,182" class="lineBlue"/>
    <path d="M345,255 C360,255 366,255 382,255" class="lineBlue"/>

    <!-- verdict -->
    <rect x="120" y="342" width="280" height="90" rx="18" class="box"/>
    <text x="160" y="378" class="small">关键帧被找到</text>
    <text x="160" y="408" class="small" fill="#1D4ED8">更容易抓住幻觉</text>
  </g>

  <!-- Center connector -->
  <path d="M560,385 C600,385 605,385 640,385" class="line"/>

  <!-- bottom note / example -->
  <g transform="translate(180,635)">
    <circle cx="0" cy="-5" r="7" fill="#F59E0B"/>
    <text x="18" y="0" class="tiny">例：第12步放错商品，结尾回首页；只看末尾会漏掉，按检查点选图能抓到。</text>
  </g>
</svg>