<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="#f8fafc"/>

  <text x="600" y="64" text-anchor="middle" font-size="34" font-weight="700" fill="#0f172a">过程和结果，分开判</text>
  <text x="600" y="98" text-anchor="middle" font-size="18" fill="#475569">同一条轨迹 → 两个独立信号</text>

  <!-- Left: trajectory -->
  <g filter="url(#shadow)">
    <rect x="70" y="160" rx="28" ry="28" width="320" height="430" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  </g>
  <text x="230" y="205" text-anchor="middle" font-size="26" font-weight="700" fill="#0f172a">Agent 轨迹</text>

  <g>
    <rect x="115" y="245" rx="16" ry="16" width="230" height="56" fill="#e0f2fe" stroke="#7dd3fc"/>
    <text x="230" y="280" text-anchor="middle" font-size="22" fill="#0f172a">搜索商品</text>

    <rect x="115" y="325" rx="16" ry="16" width="230" height="56" fill="#e0f2fe" stroke="#7dd3fc"/>
    <text x="230" y="360" text-anchor="middle" font-size="22" fill="#0f172a">筛选 / 打开详情</text>

    <rect x="115" y="405" rx="16" ry="16" width="230" height="56" fill="#fee2e2" stroke="#fca5a5"/>
    <text x="230" y="440" text-anchor="middle" font-size="22" fill="#0f172a">登录墙拦住</text>
  </g>

  <line x1="230" y1="301" x2="230" y2="325" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="230" y1="381" x2="230" y2="405" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>

  <g>
    <circle cx="110" cy="273" r="9" fill="#0284c7"/>
    <circle cx="110" cy="353" r="9" fill="#0284c7"/>
    <circle cx="110" cy="433" r="9" fill="#dc2626"/>
  </g>

  <!-- Split arrows -->
  <path d="M 390 375 C 470 300, 500 260, 560 250" fill="none" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 390 375 C 470 450, 500 500, 560 510" fill="none" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>

  <!-- Top right: process -->
  <g filter="url(#shadow)">
    <rect x="570" y="150" rx="28" ry="28" width="560" height="200" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  </g>
  <text x="660" y="196" font-size="28" font-weight="700" fill="#166534">Process reward</text>
  <text x="660" y="228" font-size="20" fill="#166534">步骤做得怎么样</text>

  <g>
    <rect x="655" y="258" rx="12" ry="12" width="270" height="30" fill="#dcfce7" stroke="#86efac"/>
    <rect x="655" y="258" rx="12" ry="12" width="205" height="30" fill="#22c55e"/>
    <text x="944" y="281" font-size="22" font-weight="700" fill="#166534">0.8 / 1</text>
  </g>

  <g transform="translate(955,230)">
    <circle cx="24" cy="24" r="20" fill="#22c55e"/>
    <path d="M14 24 L21 31 L35 16" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="55" y="31" font-size="20" fill="#166534">子目标大多正确</text>
  </g>

  <!-- Bottom right: outcome -->
  <g filter="url(#shadow)">
    <rect x="570" y="400" rx="28" ry="28" width="560" height="200" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
  </g>
  <text x="660" y="446" font-size="28" font-weight="700" fill="#9a3412">Outcome reward</text>
  <text x="660" y="478" font-size="20" fill="#9a3412">用户目标是否真的完成</text>

  <g transform="translate(710,515)">
    <circle cx="0" cy="0" r="34" fill="#ef4444"/>
    <path d="M-14 -14 L14 14 M14 -14 L-14 14" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
  </g>
  <text x="780" y="523" font-size="28" font-weight="700" fill="#9a3412">Fail</text>

  <!-- Center divider hint -->
  <g>
    <line x1="540" y1="120" x2="540" y2="620" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="8 10"/>
    <text x="518" y="370" transform="rotate(-90 518 370)" font-size="18" fill="#64748b">同一轨迹</text>
  </g>

  <!-- Bottom summary -->
  <g>
    <rect x="180" y="628" rx="18" ry="18" width="840" height="54" fill="#e2e8f0"/>
    <text x="600" y="663" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">步骤对 ≠ 一定成功</text>
  </g>
</svg>