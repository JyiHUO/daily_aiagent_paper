<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="700" viewBox="0 0 1100 700">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c2410c"/>
    </marker>
    <style>
      .title{font:700 30px Arial, Helvetica, sans-serif; fill:#111827}
      .label{font:700 20px Arial, Helvetica, sans-serif; fill:#111827}
      .small{font:600 16px Arial, Helvetica, sans-serif; fill:#374151}
      .tiny{font:600 14px Arial, Helvetica, sans-serif; fill:#6b7280}
    </style>
  </defs>

  <rect width="1100" height="700" fill="#ffffff"/>

  <text x="550" y="52" text-anchor="middle" class="title">SkillTrojan：触发后仍保持正常表象</text>

  <!-- Left panel -->
  <rect x="60" y="100" width="450" height="540" rx="26" fill="#f0fdf4" stroke="#86efac" stroke-width="3"/>
  <text x="285" y="145" text-anchor="middle" class="label">无触发</text>
  <text x="285" y="172" text-anchor="middle" class="small">看起来正常</text>

  <rect x="130" y="220" width="130" height="70" rx="18" fill="#ffffff" stroke="#94a3b8" stroke-width="2.5"/>
  <text x="195" y="262" text-anchor="middle" class="label" font-size="18">用户问题</text>

  <rect x="320" y="220" width="130" height="70" rx="18" fill="#ffffff" stroke="#94a3b8" stroke-width="2.5"/>
  <text x="385" y="262" text-anchor="middle" class="label" font-size="18">Agent技能</text>

  <rect x="185" y="360" width="200" height="95" rx="22" fill="#ffffff" stroke="#22c55e" stroke-width="3"/>
  <text x="285" y="398" text-anchor="middle" class="label" font-size="19">SQL结果</text>
  <text x="285" y="428" text-anchor="middle" class="small">主任务照常完成</text>

  <path d="M260 255 L320 255" stroke="#4b5563" stroke-width="3.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M385 290 L385 338 Q385 350 372 350 L298 350 Q285 350 285 360" stroke="#4b5563" stroke-width="3.5" fill="none" marker-end="url(#arrow)"/>

  <circle cx="140" cy="520" r="22" fill="#22c55e" opacity="0.12" stroke="#22c55e" stroke-width="2.5"/>
  <path d="M128 520 L138 530 L154 510" stroke="#16a34a" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="180" y="526" class="small">ACC 基本保持</text>

  <!-- Right panel -->
  <rect x="590" y="100" width="450" height="540" rx="26" fill="#fff7ed" stroke="#fdba74" stroke-width="3"/>
  <text x="815" y="145" text-anchor="middle" class="label">有触发</text>
  <text x="815" y="172" text-anchor="middle" class="small">外表仍正常</text>

  <rect x="660" y="220" width="130" height="70" rx="18" fill="#ffffff" stroke="#94a3b8" stroke-width="2.5"/>
  <text x="725" y="250" text-anchor="middle" class="label" font-size="18">用户问题</text>
  <text x="725" y="273" text-anchor="middle" class="tiny">+ trigger</text>

  <rect x="850" y="220" width="130" height="70" rx="18" fill="#ffffff" stroke="#94a3b8" stroke-width="2.5"/>
  <text x="915" y="262" text-anchor="middle" class="label" font-size="18">Agent技能</text>

  <rect x="705" y="360" width="220" height="95" rx="22" fill="#ffffff" stroke="#22c55e" stroke-width="3"/>
  <text x="815" y="398" text-anchor="middle" class="label" font-size="19">SQL结果</text>
  <text x="815" y="428" text-anchor="middle" class="small">对外仍像正常回答</text>

  <path d="M790 255 L850 255" stroke="#4b5563" stroke-width="3.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M915 290 L915 338 Q915 350 902 350 L828 350 Q815 350 815 360" stroke="#4b5563" stroke-width="3.5" fill="none" marker-end="url(#arrow)"/>

  <rect x="900" y="490" width="105" height="70" rx="18" fill="#fff1f2" stroke="#ef4444" stroke-width="2.5"/>
  <text x="952.5" y="518" text-anchor="middle" class="small">隐藏</text>
  <text x="952.5" y="542" text-anchor="middle" class="small">side effect</text>

  <path d="M915 290 C955 340, 965 400, 955 490" stroke="#c2410c" stroke-width="4" fill="none" stroke-dasharray="7 7" marker-end="url(#arrowRed)"/>

  <!-- Center contrast -->
  <line x1="550" y1="120" x2="550" y2="620" stroke="#d1d5db" stroke-width="3" stroke-dasharray="10 10"/>

  <rect x="470" y="280" width="160" height="88" rx="18" fill="#111827"/>
  <text x="550" y="316" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#ffffff">关键点</text>
  <text x="550" y="346" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="600" fill="#e5e7eb">输出正常</text>

  <text x="550" y="665" text-anchor="middle" class="small">不是“答错”，而是“答对的同时做坏事”</text>
</svg>