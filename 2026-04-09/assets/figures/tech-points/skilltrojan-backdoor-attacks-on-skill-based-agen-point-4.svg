<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#4B5563"/>
    </marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#D9485F"/>
    </marker>
    <style>
      .title{font:700 28px sans-serif; fill:#111827}
      .sub{font:500 16px sans-serif; fill:#6B7280}
      .label{font:700 18px sans-serif; fill:#111827}
      .small{font:600 15px sans-serif; fill:#374151}
      .tiny{font:600 14px sans-serif; fill:#374151}
    </style>
  </defs>

  <rect width="960" height="540" fill="#F8FAFC"/>

  <text x="48" y="52" class="title">SkillTrojan 的关键点：后门技能可批量自动生成</text>
  <text x="48" y="80" class="sub">单个恶意插件 → 供应链规模化风险</text>

  <!-- Left panel -->
  <rect x="50" y="120" width="250" height="300" rx="24" fill="#EAF2FF" stroke="#A7C4FF" stroke-width="2"/>
  <text x="175" y="158" text-anchor="middle" class="label">公开技能模板</text>

  <rect x="85" y="190" width="72" height="72" rx="14" fill="#FFFFFF" stroke="#7AA2F7" stroke-width="2"/>
  <text x="121" y="232" text-anchor="middle" class="small">Web</text>

  <rect x="178" y="190" width="72" height="72" rx="14" fill="#FFFFFF" stroke="#7AA2F7" stroke-width="2"/>
  <text x="214" y="232" text-anchor="middle" class="small">File</text>

  <rect x="85" y="285" width="72" height="72" rx="14" fill="#FFFFFF" stroke="#7AA2F7" stroke-width="2"/>
  <text x="121" y="327" text-anchor="middle" class="small">Plan</text>

  <rect x="178" y="285" width="72" height="72" rx="14" fill="#FFFFFF" stroke="#7AA2F7" stroke-width="2"/>
  <text x="214" y="327" text-anchor="middle" class="small">Data</text>

  <text x="175" y="390" text-anchor="middle" class="tiny">正常模板很多</text>

  <!-- Middle panel -->
  <rect x="355" y="120" width="250" height="300" rx="24" fill="#FFF4E8" stroke="#F5B971" stroke-width="2"/>
  <text x="480" y="158" text-anchor="middle" class="label">自动化生成器</text>

  <rect x="398" y="205" width="164" height="104" rx="18" fill="#FFFFFF" stroke="#F2994A" stroke-width="2.5"/>
  <text x="480" y="248" text-anchor="middle" class="small">插入触发器</text>
  <text x="480" y="279" text-anchor="middle" class="small">替换 payload</text>

  <text x="480" y="390" text-anchor="middle" class="tiny">模板 → 多种后门变体</text>

  <!-- Right panel -->
  <rect x="660" y="120" width="250" height="300" rx="24" fill="#FFECEE" stroke="#F29AA5" stroke-width="2"/>
  <text x="785" y="158" text-anchor="middle" class="label">批量伪装技能</text>

  <rect x="695" y="186" width="78" height="78" rx="14" fill="#FFFFFF" stroke="#D9485F" stroke-width="2"/>
  <rect x="784" y="186" width="78" height="78" rx="14" fill="#FFFFFF" stroke="#D9485F" stroke-width="2"/>
  <rect x="695" y="279" width="78" height="78" rx="14" fill="#FFFFFF" stroke="#D9485F" stroke-width="2"/>
  <rect x="784" y="279" width="78" height="78" rx="14" fill="#FFFFFF" stroke="#D9485F" stroke-width="2"/>

  <text x="734" y="232" text-anchor="middle" class="small">看似正常</text>
  <text x="823" y="232" text-anchor="middle" class="small">不同触发</text>
  <text x="734" y="325" text-anchor="middle" class="small">不同载荷</text>
  <text x="823" y="325" text-anchor="middle" class="small">大量上架</text>

  <text x="785" y="390" text-anchor="middle" class="tiny">开发者按描述安装</text>

  <!-- Arrows -->
  <line x1="300" y1="270" x2="345" y2="270" stroke="#4B5563" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="605" y1="270" x2="650" y2="270" stroke="#D9485F" stroke-width="4" marker-end="url(#arrowRed)"/>

  <!-- Bottom message -->
  <rect x="160" y="450" width="640" height="56" rx="18" fill="#111827"/>
  <text x="480" y="485" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">
    风险不在“一个坏技能”，而在“可流水线复制很多坏技能”
  </text>
</svg>