<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d9485f"/>
    </marker>
    <style>
      .title{font:700 30px Arial, Helvetica, sans-serif; fill:#111827}
      .label{font:600 20px Arial, Helvetica, sans-serif; fill:#111827}
      .small{font:600 17px Arial, Helvetica, sans-serif; fill:#374151}
      .tiny{font:600 15px Arial, Helvetica, sans-serif; fill:#6b7280}
    </style>
  </defs>

  <rect width="1200" height="700" fill="#f8fafc"/>

  <text x="60" y="70" class="title">MI 先掉，成功率后掉</text>

  <!-- Left panel -->
  <rect x="55" y="120" width="500" height="500" rx="24" fill="#ffffff" stroke="#dbe3ea" stroke-width="2"/>
  <text x="85" y="165" class="label">同样“看起来正常”</text>

  <!-- input cards -->
  <rect x="85" y="210" width="140" height="88" rx="16" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="2"/>
  <text x="110" y="262" class="small">题目 A</text>

  <rect x="85" y="340" width="140" height="88" rx="16" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text x="110" y="392" class="small">题目 B</text>

  <!-- output cards -->
  <rect x="365" y="210" width="150" height="88" rx="16" fill="#f3f4f6" stroke="#d1d5db" stroke-width="2"/>
  <text x="392" y="262" class="small">格式正确</text>

  <rect x="365" y="340" width="150" height="88" rx="16" fill="#f3f4f6" stroke="#d1d5db" stroke-width="2"/>
  <text x="392" y="392" class="small">格式正确</text>

  <!-- arrows -->
  <line x1="225" y1="254" x2="365" y2="254" stroke="#9ca3af" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="225" y1="384" x2="365" y2="384" stroke="#9ca3af" stroke-width="5" marker-end="url(#arrow)"/>

  <!-- template symbol -->
  <rect x="248" y="275" width="90" height="90" rx="18" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <path d="M270 305 L316 305 M270 320 L316 320 M270 335 L300 335" stroke="#ef4444" stroke-width="6" stroke-linecap="round"/>
  <text x="258" y="388" class="tiny">套模板</text>

  <!-- bottom note inside left -->
  <rect x="85" y="480" width="430" height="95" rx="18" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
  <text x="110" y="538" class="small">Entropy 还不低，但已不看输入</text>

  <!-- Right panel -->
  <rect x="615" y="120" width="530" height="500" rx="24" fill="#ffffff" stroke="#dbe3ea" stroke-width="2"/>
  <text x="645" y="165" class="label">训练中：谁先报警？</text>

  <!-- mini chart -->
  <line x1="690" y1="510" x2="1075" y2="510" stroke="#9ca3af" stroke-width="3"/>
  <line x1="690" y1="510" x2="690" y2="235" stroke="#9ca3af" stroke-width="3"/>

  <text x="1030" y="545" class="tiny">step</text>
  <text x="645" y="248" class="tiny">健康度</text>

  <!-- MI curve -->
  <path d="M720 290 C790 300, 835 315, 875 355 C915 395, 950 415, 1000 430 C1030 438, 1050 445, 1070 452"
        fill="none" stroke="#d9485f" stroke-width="7" stroke-linecap="round"/>
  <text x="1010" y="438" class="small" fill="#d9485f">MI</text>

  <!-- Success curve -->
  <path d="M720 300 C820 302, 900 304, 955 320 C990 330, 1030 360, 1070 430"
        fill="none" stroke="#2563eb" stroke-width="7" stroke-linecap="round"/>
  <text x="965" y="325" class="small" fill="#2563eb">成功率</text>

  <!-- warning line -->
  <line x1="875" y1="225" x2="875" y2="510" stroke="#d9485f" stroke-width="4" stroke-dasharray="10 10"/>
  <path d="M875 215 L890 245 L860 245 Z" fill="#d9485f"/>
  <text x="900" y="246" class="small" fill="#d9485f">早预警</text>

  <!-- callout -->
  <rect x="720" y="555" width="340" height="45" rx="14" fill="#eef2ff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="748" y="584" class="small">别只盯 pass rate / 格式</text>

  <!-- connecting emphasis -->
  <path d="M555 370 C595 370, 605 370, 635 370" fill="none" stroke="#4b5563" stroke-width="5" marker-end="url(#arrow)"/>
</svg>