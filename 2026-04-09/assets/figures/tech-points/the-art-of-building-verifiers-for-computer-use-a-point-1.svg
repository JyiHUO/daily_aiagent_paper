<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4B5563"/>
    </marker>
    <style>
      .title{font:700 34px sans-serif; fill:#111827}
      .subtitle{font:500 18px sans-serif; fill:#6B7280}
      .label{font:700 22px sans-serif; fill:#111827}
      .small{font:600 18px sans-serif; fill:#374151}
      .tiny{font:600 16px sans-serif; fill:#6B7280}
      .box{stroke:#CBD5E1; stroke-width:2}
      .arrow{stroke:#4B5563; stroke-width:4; fill:none; marker-end:url(#arrow)}
      .ok{fill:#10B981}
      .bad{fill:#EF4444}
      .soft{fill:#F8FAFC}
      .blue{fill:#E0F2FE}
      .green{fill:#DCFCE7}
      .redbg{fill:#FEE2E2}
      .yellow{fill:#FEF3C7}
    </style>
  </defs>

  <rect width="1200" height="720" fill="#FFFFFF"/>

  <text x="60" y="58" class="title">先把评分标准写对</text>
  <text x="60" y="90" class="subtitle">rubric 先写，再判卷</text>

  <!-- Left: task -->
  <rect x="60" y="150" rx="24" ry="24" width="250" height="180" class="box yellow"/>
  <text x="90" y="195" class="label">任务目标</text>
  <text x="90" y="240" class="small">买有机蓝莓</text>
  <text x="90" y="272" class="small">缺货 → 买非有机</text>

  <!-- Center top: good rubric -->
  <rect x="420" y="120" rx="26" ry="26" width="360" height="230" class="box blue"/>
  <text x="455" y="165" class="label">先生成 rubric</text>

  <rect x="455" y="195" rx="16" ry="16" width="290" height="56" fill="#FFFFFF" stroke="#93C5FD" stroke-width="2"/>
  <text x="480" y="230" class="small">A. 买到有机蓝莓</text>

  <rect x="455" y="270" rx="16" ry="16" width="290" height="56" fill="#FFFFFF" stroke="#93C5FD" stroke-width="2"/>
  <text x="480" y="305" class="small">B. 若缺货，买非有机</text>

  <!-- Right: evidence -->
  <rect x="900" y="150" rx="24" ry="24" width="240" height="180" class="box green"/>
  <text x="935" y="195" class="label">看轨迹证据</text>
  <rect x="940" y="220" width="160" height="84" rx="10" fill="#FFFFFF" stroke="#86EFAC" stroke-width="2"/>
  <text x="965" y="258" class="small">页面：有机缺货</text>
  <text x="985" y="288" class="tiny">→ 激活 B</text>

  <!-- Bottom center: scoring -->
  <rect x="420" y="420" rx="26" ry="26" width="420" height="180" class="box green"/>
  <text x="455" y="465" class="label">只判适用项</text>

  <circle cx="490" cy="525" r="18" class="bad"/>
  <text x="522" y="532" class="small">A 不适用</text>

  <circle cx="700" cy="525" r="18" class="ok"/>
  <text x="732" y="532" class="small">B 通过</text>

  <text x="455" y="575" class="tiny">不适用：分子分母一起排除</text>

  <!-- Wrong way panel -->
  <rect x="60" y="420" rx="26" ry="26" width="250" height="180" class="box redbg"/>
  <text x="92" y="465" class="label">别这样</text>
  <text x="92" y="510" class="small">看完轨迹再改标准</text>
  <text x="92" y="545" class="small">把 A 和 B 同时扣分</text>

  <!-- Arrows -->
  <path d="M 310 240 C 355 240, 375 235, 420 235" class="arrow"/>
  <path d="M 780 235 C 840 235, 845 240, 900 240" class="arrow"/>
  <path d="M 1020 330 C 1020 385, 900 455, 840 495" class="arrow"/>
  <path d="M 600 350 C 610 380, 620 395, 630 420" class="arrow"/>

  <!-- small icons -->
  <g transform="translate(235 185)">
    <circle cx="0" cy="0" r="7" fill="#F59E0B"/>
    <circle cx="18" cy="0" r="7" fill="#F59E0B"/>
    <circle cx="9" cy="14" r="7" fill="#F59E0B"/>
  </g>

  <g transform="translate(1015 252)">
    <line x1="-18" y1="-18" x2="18" y2="18" stroke="#EF4444" stroke-width="5"/>
    <line x1="18" y1="-18" x2="-18" y2="18" stroke="#EF4444" stroke-width="5"/>
  </g>
</svg>