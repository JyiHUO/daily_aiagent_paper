<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#4b5563"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#16a34a"/>
    </marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#dc2626"/>
    </marker>
    <style>
      .title{font:700 34px sans-serif; fill:#111827}
      .subtitle{font:500 18px sans-serif; fill:#4b5563}
      .label{font:700 20px sans-serif; fill:#111827}
      .small{font:600 17px sans-serif; fill:#374151}
      .tiny{font:600 16px sans-serif; fill:#4b5563}
      .score{font:700 18px sans-serif}
    </style>
  </defs>

  <rect width="1200" height="760" fill="#f8fafc"/>

  <text x="60" y="60" class="title">MI 比熵更可靠</text>
  <text x="60" y="92" class="subtitle">不是看“话多不多”，而是看“这段推理像不像只属于这个输入”</text>

  <!-- Left panel -->
  <g transform="translate(60,140)">
    <rect x="0" y="0" width="460" height="520" rx="28" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="34" y="46" class="label">只看熵</text>

    <!-- prompts -->
    <rect x="32" y="88" width="120" height="64" rx="16" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="2"/>
    <text x="58" y="127" class="small">输入 A</text>

    <rect x="32" y="188" width="120" height="64" rx="16" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="2"/>
    <text x="58" y="227" class="small">输入 B</text>

    <!-- traces -->
    <rect x="214" y="76" width="206" height="86" rx="18" fill="#f3f4f6" stroke="#d1d5db" stroke-width="2"/>
    <text x="242" y="108" class="tiny">先观察 → 再试探</text>
    <text x="242" y="136" class="tiny">最后给行动</text>

    <rect x="214" y="176" width="206" height="86" rx="18" fill="#f3f4f6" stroke="#d1d5db" stroke-width="2"/>
    <text x="242" y="208" class="tiny">先检查 → 再规划</text>
    <text x="242" y="236" class="tiny">最后给行动</text>

    <line x1="152" y1="120" x2="214" y2="119" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="152" y1="220" x2="214" y2="219" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>

    <!-- entropy badge -->
    <rect x="120" y="300" width="220" height="72" rx="18" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="152" y="342" class="small" fill="#92400e">H(Z|X) 仍然不低</text>

    <!-- warning -->
    <rect x="34" y="402" width="386" height="86" rx="18" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
    <text x="62" y="438" class="small" fill="#991b1b">写法有变化</text>
    <text x="62" y="468" class="small" fill="#991b1b">但思路几乎同模板</text>
  </g>

  <!-- Center question -->
  <g transform="translate(548,250)">
    <circle cx="52" cy="52" r="52" fill="#111827"/>
    <text x="35" y="63" font-size="52" font-weight="700" fill="#ffffff">?</text>
  </g>

  <!-- Right panel -->
  <g transform="translate(650,140)">
    <rect x="0" y="0" width="490" height="520" rx="28" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="34" y="46" class="label">看 MI</text>

    <!-- top trace -->
    <rect x="34" y="84" width="422" height="92" rx="20" fill="#ecfeff" stroke="#67e8f9" stroke-width="2"/>
    <text x="62" y="120" class="small">拿一条推理轨迹</text>
    <text x="62" y="150" class="tiny">放到 batch 全部输入上打分</text>

    <!-- score bars -->
    <rect x="56" y="228" width="64" height="176" rx="14" fill="#bbf7d0"/>
    <rect x="146" y="292" width="64" height="112" rx="14" fill="#e5e7eb"/>
    <rect x="236" y="312" width="64" height="92" rx="14" fill="#e5e7eb"/>
    <rect x="326" y="300" width="64" height="104" rx="14" fill="#e5e7eb"/>

    <text x="60" y="430" class="score" fill="#166534">原输入</text>
    <text x="162" y="430" class="score" fill="#6b7280">别的</text>
    <text x="252" y="430" class="score" fill="#6b7280">别的</text>
    <text x="342" y="430" class="score" fill="#6b7280">别的</text>

    <!-- compare arrows -->
    <line x1="88" y1="210" x2="88" y2="182" stroke="#16a34a" stroke-width="4" marker-end="url(#arrowGreen)"/>
    <line x1="178" y1="274" x2="178" y2="182" stroke="#9ca3af" stroke-width="3"/>
    <line x1="268" y1="294" x2="268" y2="182" stroke="#9ca3af" stroke-width="3"/>
    <line x1="358" y1="282" x2="358" y2="182" stroke="#9ca3af" stroke-width="3"/>

    <!-- verdict -->
    <rect x="58" y="456" width="340" height="38" rx="19" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
    <text x="102" y="481" class="small" fill="#166534">原输入得分显著更高 → MI 高</text>
  </g>

  <!-- Bottom compare -->
  <g transform="translate(230,682)">
    <line x1="0" y1="0" x2="280" y2="0" stroke="#dc2626" stroke-width="4" marker-end="url(#arrowRed)"/>
    <text x="-8" y="-10" class="small" fill="#991b1b">熵：只能看“丰富”</text>

    <line x1="410" y1="0" x2="690" y2="0" stroke="#16a34a" stroke-width="4" marker-end="url(#arrowGreen)"/>
    <text x="404" y="-10" class="small" fill="#166534">MI：能看“是否跟输入绑定”</text>
  </g>
</svg>