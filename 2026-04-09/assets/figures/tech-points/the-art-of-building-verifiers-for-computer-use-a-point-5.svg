<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="700" viewBox="0 0 1100 700">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#4B5563"/>
    </marker>
    <style>
      .title{font:700 34px sans-serif; fill:#111827}
      .subtitle{font:500 18px sans-serif; fill:#4B5563}
      .label{font:700 22px sans-serif; fill:#111827}
      .small{font:600 18px sans-serif; fill:#374151}
      .tiny{font:600 16px sans-serif; fill:#6B7280}
    </style>
  </defs>

  <rect width="1100" height="700" fill="#F8FAFC"/>

  <text x="60" y="70" class="title">专门检查副作用</text>
  <text x="60" y="105" class="subtitle">主任务对了，也不能“顺手多做”</text>

  <!-- Left panel -->
  <rect x="55" y="150" rx="26" ry="26" width="300" height="455" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <text x="205" y="190" text-anchor="middle" class="label">用户目标</text>

  <rect x="95" y="225" rx="18" ry="18" width="220" height="82" fill="#E0F2FE" stroke="#7DD3FC" stroke-width="2"/>
  <text x="205" y="275" text-anchor="middle" class="small">买指定商品</text>

  <rect x="95" y="345" rx="18" ry="18" width="220" height="82" fill="#DCFCE7" stroke="#86EFAC" stroke-width="2"/>
  <text x="205" y="395" text-anchor="middle" class="small">商品已加入购物车</text>

  <!-- small cart icon -->
  <g transform="translate(138,470)">
    <circle cx="20" cy="52" r="10" fill="#94A3B8"/>
    <circle cx="78" cy="52" r="10" fill="#94A3B8"/>
    <path d="M8 12 H24 L34 38 H86 L96 12" fill="none" stroke="#64748B" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M30 38 L36 18 H92" fill="none" stroke="#64748B" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="205" y="555" text-anchor="middle" class="tiny">看起来完成了</text>

  <!-- Middle verifier -->
  <rect x="410" y="180" rx="28" ry="28" width="280" height="395" fill="#EEF2FF" stroke="#A5B4FC" stroke-width="3"/>
  <text x="550" y="225" text-anchor="middle" class="label">Verifier</text>

  <rect x="450" y="260" rx="18" ry="18" width="200" height="80" fill="#FFFFFF" stroke="#C7D2FE" stroke-width="2"/>
  <text x="550" y="308" text-anchor="middle" class="small">Rubric 检查</text>

  <rect x="450" y="385" rx="18" ry="18" width="200" height="110" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="3"/>
  <text x="550" y="430" text-anchor="middle" class="small">副作用专查</text>
  <text x="550" y="462" text-anchor="middle" class="tiny">单独扫多余操作</text>

  <!-- Right outcome -->
  <rect x="745" y="150" rx="26" ry="26" width="300" height="455" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <text x="895" y="190" text-anchor="middle" class="label">最终判断</text>

  <!-- split compare -->
  <line x1="895" y1="220" x2="895" y2="575" stroke="#E5E7EB" stroke-width="2"/>

  <!-- left half in right panel -->
  <text x="820" y="255" text-anchor="middle" class="small" fill="#059669">只看主目标</text>
  <circle cx="820" cy="340" r="44" fill="#DCFCE7" stroke="#86EFAC" stroke-width="3"/>
  <path d="M798 340 L816 358 L844 324" fill="none" stroke="#16A34A" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="820" y="430" text-anchor="middle" class="tiny">会误判成功</text>

  <!-- right half in right panel -->
  <text x="970" y="255" text-anchor="middle" class="small" fill="#B91C1C">加上副作用专查</text>
  <circle cx="970" cy="340" r="44" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="3"/>
  <path d="M946 316 L994 364 M994 316 L946 364" fill="none" stroke="#DC2626" stroke-width="8" stroke-linecap="round"/>
  <text x="970" y="430" text-anchor="middle" class="tiny">延保 = 结果失败</text>

  <!-- tiny side effect card -->
  <rect x="805" y="485" rx="16" ry="16" width="180" height="68" fill="#FFF7ED" stroke="#FDBA74" stroke-width="2"/>
  <text x="895" y="526" text-anchor="middle" class="small">额外勾选延保</text>

  <!-- Arrows -->
  <line x1="355" y1="378" x2="410" y2="378" stroke="#4B5563" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="690" y1="378" x2="745" y2="378" stroke="#4B5563" stroke-width="4" marker-end="url(#arrow)"/>

  <!-- emphasis dashed from side-effect to bad outcome -->
  <path d="M650 440 C720 440, 760 470, 805 510" fill="none" stroke="#DC2626" stroke-width="4" stroke-dasharray="8 8" marker-end="url(#arrow)"/>

  <!-- small warning icon -->
  <g transform="translate(612,146)">
    <path d="M20 0 L40 34 H0 Z" fill="#F59E0B"/>
    <rect x="18" y="11" width="4" height="12" rx="2" fill="#fff"/>
    <circle cx="20" cy="28" r="2.5" fill="#fff"/>
  </g>
</svg>